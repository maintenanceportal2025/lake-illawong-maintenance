<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Document Library - Lake Illawong</title>
    
    <!-- Include VerificationModal Component -->
    <script src="VerificationModal_V1_0.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            background: transparent;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .header-divider { height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%, transparent 100%); border-radius: 2px; margin-top: 15px; }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* Back Button & User Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .user-info-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info-text {
            font-size: 0.9rem;
        }

        .user-info-text strong {
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Search Bar */
        .search-section {
            margin-bottom: 25px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 25px;
            align-items: start;
        }

        /* Filter Sidebar */
        .filter-sidebar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            padding: 20px;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .filter-title {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }

        .clear-filters {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .clear-filters:hover {
            color: white;
        }

        .mobile-close-filters {
            display: none;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group-title {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .filter-option:hover {
            color: white;
        }

        .filter-option input[type="checkbox"] {
            cursor: pointer;
            accent-color: white;
        }

        .filter-count {
            margin-left: auto;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        /* Document List */
        .document-list {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .list-header {
            display: grid;
            grid-template-columns: 1fr 150px 120px 60px;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .list-header-cell {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .list-header-cell:hover {
            color: white;
        }

        .sort-icon {
            opacity: 0.5;
            font-size: 0.7rem;
        }

        .sort-icon.active {
            opacity: 1;
        }

        .list-body {
            max-height: 600px;
            overflow-y: auto;
        }

        .document-row {
            display: grid;
            grid-template-columns: 1fr 150px 120px 60px;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .document-row:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .document-row:last-child {
            border-bottom: none;
        }

        .doc-title {
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .doc-category {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .doc-date {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .doc-type {
            font-size: 1.3rem;
            text-align: center;
        }

        /* Mobile Card View */
        .mobile-card-view {
            display: none;
        }

        .mobile-doc-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-doc-card:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .mobile-doc-title {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.4;
        }

        .mobile-doc-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            gap: 10px;
        }

        .mobile-doc-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }

        .mobile-doc-type {
            font-size: 1.2rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Mobile Filter Toggle */
        .filter-toggle {
            display: none;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .container {
                padding: 0;
            }
            
            .header {
                margin-bottom: 15px;
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.4rem;
            }
            
            .header-subtitle {
                font-size: 0.85rem;
            }
            
            .logo-section {
                flex-direction: column;
                gap: 10px;
            }
            
            .logo {
                width: 60px;
                height: 60px;
            }
            
            .content-card {
                padding: 15px;
                border-radius: 0;
                min-height: calc(100vh - 200px);
            }
            
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .filter-sidebar {
                display: none;
            }
            
            .filter-sidebar.mobile-open {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1000;
                margin: 0;
                border-radius: 0;
                max-height: 100vh;
            }
            
            .filter-sidebar.mobile-open .mobile-close-filters {
                display: block;
            }
            
            .filter-toggle {
                display: block;
            }
            
            /* Hide table view on mobile */
            .list-header {
                display: none;
            }
            
            .document-row {
                display: none;
            }
            
            .document-list {
                border-radius: 0;
            }
            
            /* Show card view on mobile */
            .mobile-card-view {
                display: block;
                padding: 0;
            }
            
            .mobile-doc-card {
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: none;
                padding: 18px 15px;
                margin-bottom: 0;
            }
            
            .mobile-doc-title {
                font-size: 1.05rem;
                line-height: 1.4;
                margin-bottom: 10px;
            }
            
            .mobile-doc-meta {
                font-size: 0.9rem;
            }
            
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                margin-bottom: 15px;
            }
            
            .back-btn {
                text-align: center;
                font-size: 0.9rem;
                padding: 10px;
            }
            
            .user-info-bar {
                justify-content: space-between;
                font-size: 0.85rem;
                padding: 10px 15px;
            }
            
            .user-info-text {
                font-size: 0.85rem;
            }
            
            .logout-btn {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
            
            .search-section {
                margin-bottom: 15px;
            }
            
            .search-input {
                padding: 12px 15px 12px 45px;
                font-size: 0.95rem;
            }
            
            .filter-toggle {
                margin-bottom: 15px;
                font-size: 0.95rem;
            }
            
            .list-body {
                max-height: none;
            }
            
            .empty-state {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <img src="logo.png" alt="Lake Illawong Logo" class="logo">
            <div>
                <h1>📚 Document Library</h1>
                <div class="header-subtitle">Secure Access to Community Documents</div>
            </div>
        </div>
        <div class="header-divider"></div>
    </div>

    <!-- Main Content (Hidden until verified) -->
    <div id="mainContent" class="container hidden">
        <div class="content-card">
            <!-- Top Bar -->
            <div class="top-bar">
                <a href="ResidentPortal.html" class="back-btn">← Back to Portal</a>
                
                <div class="user-info-bar">
                    <div class="user-info-text">
                        <strong id="userName"></strong> (<span id="userUnit"></span>)
                    </div>
                    <button class="logout-btn" onclick="logout()">🔓 Log Out</button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-section">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" 
                           class="search-input" 
                           id="searchInput"
                           placeholder="Search documents by title, category, or description..."
                           oninput="performSearch()">
                </div>
            </div>

            <!-- Mobile Filter Toggle -->
            <button class="filter-toggle" onclick="toggleMobileFilters()">
                🔽 Filters & Categories
            </button>

            <!-- Main Layout -->
            <div class="main-layout">
                <!-- Filter Sidebar -->
                <div class="filter-sidebar" id="filterSidebar">
                    <div class="filter-header">
                        <div class="filter-title">Filters</div>
                        <button class="clear-filters" onclick="clearAllFilters()">Clear All</button>
                    </div>

                    <!-- Categories Filter -->
                    <div class="filter-group">
                        <div class="filter-group-title">Categories</div>
                        <div id="categoryFilters"></div>
                    </div>

                    <!-- Type Filter -->
                    <div class="filter-group">
                        <div class="filter-group-title">Type</div>
                        <div id="typeFilters"></div>
                    </div>

                    <!-- Year Filter -->
                    <div class="filter-group">
                        <div class="filter-group-title">Year Added</div>
                        <div id="yearFilters"></div>
                    </div>

                    <!-- Mobile Close Button -->
                    <button class="mobile-close-filters" onclick="toggleMobileFilters()">
                        Done
                    </button>
                </div>

                <!-- Document List -->
                <div class="document-list">
                    <!-- Loading State -->
                    <div id="loadingState" class="loading">
                        <div class="spinner"></div>
                        <p>Loading your documents...</p>
                    </div>

                    <!-- Desktop: List Header -->
                    <div id="listHeader" class="list-header hidden">
                        <div class="list-header-cell" onclick="sortBy('title')">
                            Title <span class="sort-icon" id="sortTitle">▼</span>
                        </div>
                        <div class="list-header-cell" onclick="sortBy('category')">
                            Category <span class="sort-icon" id="sortCategory">▼</span>
                        </div>
                        <div class="list-header-cell" onclick="sortBy('date')">
                            Date <span class="sort-icon active" id="sortDate">▼</span>
                        </div>
                        <div class="list-header-cell">Type</div>
                    </div>

                    <!-- Desktop: List Body -->
                    <div id="listBody" class="list-body hidden"></div>

                    <!-- Mobile: Card View -->
                    <div id="mobileCardView" class="mobile-card-view hidden"></div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-state-icon">📭</div>
                        <h3>No documents found</h3>
                        <p>Try adjusting your search or filters</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            DOCLIB_API: 'https://script.google.com/macros/s/AKfycbxH9YUs18W2euFxGUcIJU_zRmlDuxT-Glo5-MJfNErFzD0cL2ICm8__xBgnrNizB94/exec',
            SESSION_KEY: 'lakeIllawongVerified'
        };

        let allDocuments = [];
        let filteredDocuments = [];
        let currentUserData = null;
        let currentSort = { field: 'date', direction: 'desc' };
        let activeFilters = {
            categories: new Set(),
            types: new Set(),
            years: new Set()
        };

        // Initialize verification on page load
        window.addEventListener('DOMContentLoaded', function() {
            const alreadyVerified = VerificationModal.init({
                moduleName: 'Document Library',
                moduleIcon: '📚',
                sessionKey: CONFIG.SESSION_KEY,
                onSuccess: handleVerificationSuccess
            });

            if (!alreadyVerified) {
                VerificationModal.show();
            }
        });

        function handleVerificationSuccess(userData) {
            currentUserData = userData;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userUnit').textContent = userData.unit;
            loadDocuments();
        }

        function logout() {
            if (confirm('Are you sure you want to log out?')) {
                VerificationModal.clearVerification();
                location.reload();
            }
        }

        // Load documents from backend
        async function loadDocuments() {
            try {
                // Get PUBLIC documents
                const publicResponse = await callAPI('getDocuments', {
                    data: JSON.stringify({
                        userRoles: currentUserData.roleTags,
                        accessLevel: 'PUBLIC'
                    })
                });
                
                if (!publicResponse.success) {
                    throw new Error(publicResponse.error || 'Failed to load public documents');
                }
                
                const publicDocs = publicResponse.documents || [];
                
                // Get PRIVATE documents
                const privateResponse = await callAPI('getDocuments', {
                    data: JSON.stringify({
                        userRoles: currentUserData.roleTags,
                        accessLevel: 'PRIVATE'
                    })
                });
                
                const privateDocs = privateResponse.success ? (privateResponse.documents || []) : [];
                
                // Merge both sets
                allDocuments = [...publicDocs, ...privateDocs];
                filteredDocuments = [...allDocuments];
                
                // Build filters
                buildFilters();
                
                // Sort and display
                sortDocuments();
                displayDocuments();
                
                // Show UI
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('listHeader').classList.remove('hidden');
                document.getElementById('listBody').classList.remove('hidden');
                document.getElementById('mobileCardView').classList.remove('hidden');
                
            } catch (error) {
                console.error('Load documents error:', error);
                document.getElementById('loadingState').innerHTML = 
                    '<p style="color: rgba(255,255,255,0.9);">Failed to load documents. Please refresh the page.</p>';
            }
        }

        // Build filter options from documents
        function buildFilters() {
            // Categories
            const categories = {};
            const types = {};
            const years = {};
            
            allDocuments.forEach(doc => {
                // Count categories
                const cat = doc.category || 'Uncategorized';
                categories[cat] = (categories[cat] || 0) + 1;
                
                // Count types
                const type = doc.sourceType || 'Unknown';
                types[type] = (types[type] || 0) + 1;
                
                // Count years
                const year = doc.dateAdded ? new Date(doc.dateAdded).getFullYear() : 'Unknown';
                years[year] = (years[year] || 0) + 1;
            });
            
            // Render category filters
            const categoryHTML = Object.keys(categories).sort().map(cat => `
                <label class="filter-option">
                    <input type="checkbox" value="${escapeHtml(cat)}" onchange="toggleFilter('categories', '${escapeHtml(cat)}')">
                    <span>${escapeHtml(cat)}</span>
                    <span class="filter-count">${categories[cat]}</span>
                </label>
            `).join('');
            document.getElementById('categoryFilters').innerHTML = categoryHTML;
            
            // Render type filters
            const typeIcons = { 'Drive': '📄', 'Link': '🔗', 'Physical': '📦' };
            const typeHTML = Object.keys(types).sort().map(type => `
                <label class="filter-option">
                    <input type="checkbox" value="${escapeHtml(type)}" onchange="toggleFilter('types', '${escapeHtml(type)}')">
                    <span>${typeIcons[type] || ''} ${escapeHtml(type)}</span>
                    <span class="filter-count">${types[type]}</span>
                </label>
            `).join('');
            document.getElementById('typeFilters').innerHTML = typeHTML;
            
            // Render year filters
            const yearHTML = Object.keys(years).sort().reverse().map(year => `
                <label class="filter-option">
                    <input type="checkbox" value="${year}" onchange="toggleFilter('years', '${year}')">
                    <span>${year}</span>
                    <span class="filter-count">${years[year]}</span>
                </label>
            `).join('');
            document.getElementById('yearFilters').innerHTML = yearHTML;
        }

        // Toggle filter
        function toggleFilter(filterType, value) {
            if (activeFilters[filterType].has(value)) {
                activeFilters[filterType].delete(value);
            } else {
                activeFilters[filterType].add(value);
            }
            applyFilters();
        }

        // Clear all filters
        function clearAllFilters() {
            activeFilters = {
                categories: new Set(),
                types: new Set(),
                years: new Set()
            };
            
            // Uncheck all checkboxes
            document.querySelectorAll('.filter-option input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        // Apply filters
        function applyFilters() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredDocuments = allDocuments.filter(doc => {
                // Search filter
                const matchesSearch = !searchQuery || 
                    doc.title.toLowerCase().includes(searchQuery) ||
                    doc.category.toLowerCase().includes(searchQuery) ||
                    (doc.description && doc.description.toLowerCase().includes(searchQuery));
                
                // Category filter
                const matchesCategory = activeFilters.categories.size === 0 || 
                    activeFilters.categories.has(doc.category);
                
                // Type filter
                const matchesType = activeFilters.types.size === 0 || 
                    activeFilters.types.has(doc.sourceType);
                
                // Year filter
                const docYear = doc.dateAdded ? new Date(doc.dateAdded).getFullYear().toString() : 'Unknown';
                const matchesYear = activeFilters.years.size === 0 || 
                    activeFilters.years.has(docYear);
                
                return matchesSearch && matchesCategory && matchesType && matchesYear;
            });
            
            sortDocuments();
            displayDocuments();
        }

        // Search
        function performSearch() {
            applyFilters();
        }

        // Sort documents
        function sortBy(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'asc';
            }
            
            // Update sort icons
            document.querySelectorAll('.sort-icon').forEach(icon => {
                icon.classList.remove('active');
                icon.textContent = '▼';
            });
            
            const icon = document.getElementById('sort' + field.charAt(0).toUpperCase() + field.slice(1));
            icon.classList.add('active');
            icon.textContent = currentSort.direction === 'asc' ? '▲' : '▼';
            
            sortDocuments();
            displayDocuments();
        }

        function sortDocuments() {
            filteredDocuments.sort((a, b) => {
                let aVal, bVal;
                
                if (currentSort.field === 'title') {
                    aVal = a.title.toLowerCase();
                    bVal = b.title.toLowerCase();
                } else if (currentSort.field === 'category') {
                    aVal = a.category.toLowerCase();
                    bVal = b.category.toLowerCase();
                } else if (currentSort.field === 'date') {
                    aVal = new Date(a.dateAdded || 0);
                    bVal = new Date(b.dateAdded || 0);
                }
                
                if (aVal < bVal) return currentSort.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // Display documents
        function displayDocuments() {
            const listBody = document.getElementById('listBody');
            const mobileCardView = document.getElementById('mobileCardView');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredDocuments.length === 0) {
                listBody.classList.add('hidden');
                mobileCardView.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            listBody.classList.remove('hidden');
            mobileCardView.classList.remove('hidden');
            
            const typeIcons = { 'Drive': '📄', 'Link': '🔗', 'Physical': '📦' };
            
            // Desktop table view
            listBody.innerHTML = filteredDocuments.map(doc => {
                const dateStr = doc.dateAdded ? new Date(doc.dateAdded).toLocaleDateString() : 'N/A';
                return `
                    <div class="document-row" onclick="openDocument('${escapeHtml(doc.documentId)}', '${escapeHtml(doc.sourceType)}', '${escapeHtml(doc.sourceLocation || '')}', '${escapeHtml(doc.title)}')">
                        <div class="doc-title">${escapeHtml(doc.title)}</div>
                        <div class="doc-category">${escapeHtml(doc.category)}</div>
                        <div class="doc-date">${dateStr}</div>
                        <div class="doc-type">${typeIcons[doc.sourceType] || '📄'}</div>
                    </div>
                `;
            }).join('');
            
            // Mobile card view
            mobileCardView.innerHTML = filteredDocuments.map(doc => {
                const dateStr = doc.dateAdded ? new Date(doc.dateAdded).toLocaleDateString() : 'N/A';
                return `
                    <div class="mobile-doc-card" onclick="openDocument('${escapeHtml(doc.documentId)}', '${escapeHtml(doc.sourceType)}', '${escapeHtml(doc.sourceLocation || '')}', '${escapeHtml(doc.title)}')">
                        <div class="mobile-doc-title">${escapeHtml(doc.title)}</div>
                        <div class="mobile-doc-meta">
                            <div class="mobile-doc-info">
                                <span>${escapeHtml(doc.category)}</span>
                                <span>•</span>
                                <span>${dateStr}</span>
                            </div>
                            <div class="mobile-doc-type">${typeIcons[doc.sourceType] || '📄'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Open document
        function openDocument(documentId, sourceType, sourceLink, title) {
            if (sourceType === 'Link' && sourceLink) {
                window.open(sourceLink, '_blank');
            } else if (sourceType === 'Drive' && sourceLink) {
                let driveUrl;
                if (sourceLink.startsWith('http')) {
                    driveUrl = sourceLink;
                } else {
                    driveUrl = `https://drive.google.com/file/d/${sourceLink}/view`;
                }
                window.open(driveUrl, '_blank');
            } else if (sourceType === 'Physical') {
                alert('📦 Physical Document\n\n"' + title + '"\n\nThis is a physical document stored at the management office. Please contact management for access.');
            } else {
                alert('Unable to open document. Please contact management.');
            }
        }

        // Mobile filter toggle
        function toggleMobileFilters() {
            document.getElementById('filterSidebar').classList.toggle('mobile-open');
        }

        // Helper functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // API Helper (JSONP)
        async function callAPI(action, params = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = 'apiCallback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const queryParams = new URLSearchParams({
                    action: action,
                    callback: callbackName,
                    ...params
                });
                
                const script = document.createElement('script');
                script.src = CONFIG.DOCLIB_API + '?' + queryParams.toString();
                
                let timeoutId = setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                        reject(new Error('Request timeout'));
                    }
                }, 30000);
                
                window[callbackName] = function(response) {
                    clearTimeout(timeoutId);
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    delete window[callbackName];
                    resolve(response);
                };
                
                script.onerror = function() {
                    clearTimeout(timeoutId);
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    delete window[callbackName];
                    reject(new Error('Network request failed'));
                };
                
                document.head.appendChild(script);
            });
        }
    </script>
</body>
</html>
