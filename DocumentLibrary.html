<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Document Library - Lake Illawong</title>
    
    <!-- Include VerificationModal Component -->
    <script src="VerificationModal_V1_0.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            background: transparent;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
        }

        .header h1 {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* User Info Bar */
        .user-info-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info-bar strong {
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Back Button */
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Search and Filters */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Documents Grid */
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .document-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .document-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .document-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .document-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .document-category {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .document-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .document-type {
            display: inline-block;
            background: #e7f0ff;
            color: #1e40af;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            color: #666;
            margin-bottom: 8px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .logo {
                width: 80px;
                height: 80px;
            }
            
            .logo-section {
                flex-direction: column;
                gap: 10px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .filter-group {
                flex-direction: column;
            }
            
            .filter-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <img src="logo.png" alt="Lake Illawong Logo" class="logo">
            <div>
                <h1>📚 Document Library</h1>
                <div class="header-subtitle">Secure Access to Community Documents</div>
            </div>
        </div>
    </div>

    <!-- Main Content (Hidden until verified) -->
    <div id="mainContent" class="container hidden">
        <div style="text-align: center;">
            <a href="ResidentPortal.html" class="back-btn">← Back to Portal</a>
        </div>

        <div class="content-card">
            <!-- User Info Bar -->
            <div class="user-info-bar">
                <div>
                    <strong id="userName"></strong> (<span id="userUnit"></span>)
                    <div style="font-size: 12px; opacity: 0.9; margin-top: 3px;">
                        Access Level: <span id="userRoles"></span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">🔓 Log Out</button>
            </div>

            <!-- Search Controls -->
            <div class="controls">
                <div class="search-box">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" 
                               id="searchInput" 
                               placeholder="Search documents..." 
                               oninput="performSearch()">
                    </div>
                </div>
                
                <div class="filter-group">
                    <select id="categoryFilter" onchange="applyFilters()">
                        <option value="">All Categories</option>
                    </select>
                    
                    <select id="typeFilter" onchange="applyFilters()">
                        <option value="">All Types</option>
                        <option value="Drive">PDF</option>
                        <option value="Link">Link</option>
                        <option value="Physical">Physical</option>
                    </select>
                </div>
            </div>

            <!-- Documents Grid -->
            <div id="documentsGrid" class="documents-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading your documents...</p>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-state-icon">📭</div>
                <h3>No documents found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            DOCLIB_API: 'https://script.google.com/macros/s/AKfycbxH9YUs18W2euFxGUcIJU_zRmlDuxT-Glo5-MJfNErFzD0cL2ICm8__xBgnrNizB94/exec',
            SESSION_KEY: 'lakeIllawongVerified' // Universal key for all resident modules
        };

        let allDocuments = [];
        let filteredDocuments = [];
        let currentUserData = null;

        // Initialize verification on page load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DocumentLibrary V3.0 starting...');
            
            const alreadyVerified = VerificationModal.init({
                moduleName: 'Document Library',
                moduleIcon: '📚',
                sessionKey: CONFIG.SESSION_KEY,
                onSuccess: handleVerificationSuccess
            });

            if (!alreadyVerified) {
                console.log('Not verified - showing modal');
                VerificationModal.show();
            } else {
                console.log('Already verified this session');
            }
        });

        function handleVerificationSuccess(userData) {
            console.log('✅ User verified:', userData);
            console.log('📋 User roles:', userData.roleTags);
            currentUserData = userData;
            
            // Hide modal, show content
            document.getElementById('mainContent').classList.remove('hidden');
            console.log('👁️ Main content shown');
            
            // Update user info
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userUnit').textContent = userData.unit;
            document.getElementById('userRoles').textContent = userData.roleTags.join(', ');
            console.log('ℹ️ User info updated');
            
            // Load documents
            console.log('📚 About to call loadDocuments()...');
            loadDocuments();
        }

        function logout() {
            if (confirm('Are you sure you want to log out?')) {
                VerificationModal.clearVerification();
                location.reload();
            }
        }

        // Load documents from backend
        async function loadDocuments() {
            console.log('📚 loadDocuments() called');
            console.log('👤 Current user data:', currentUserData);
            
            const grid = document.getElementById('documentsGrid');
            
            try {
                // Call 1: Get PUBLIC documents (Public + Resident)
                console.log('🔄 Calling API for PUBLIC documents');
                const publicResponse = await callAPI('getDocuments', {
                    data: JSON.stringify({
                        userRoles: currentUserData.roleTags,
                        accessLevel: 'PUBLIC'
                    })
                });
                
                console.log('📥 PUBLIC Response:', publicResponse);
                
                if (!publicResponse.success) {
                    throw new Error(publicResponse.error || 'Failed to load public documents');
                }
                
                const publicDocs = publicResponse.documents || [];
                console.log('📄 Public documents:', publicDocs.length);
                
                // Call 2: Get PRIVATE documents (role-specific)
                console.log('🔄 Calling API for PRIVATE documents');
                const privateResponse = await callAPI('getDocuments', {
                    data: JSON.stringify({
                        userRoles: currentUserData.roleTags,
                        accessLevel: 'PRIVATE'
                    })
                });
                
                console.log('📥 PRIVATE Response:', privateResponse);
                
                if (!privateResponse.success) {
                    console.warn('Warning: Failed to load private documents:', privateResponse.error);
                }
                
                const privateDocs = privateResponse.success ? (privateResponse.documents || []) : [];
                console.log('📄 Private documents:', privateDocs.length);
                
                // Merge both sets
                allDocuments = [...publicDocs, ...privateDocs];
                filteredDocuments = [...allDocuments];
                
                console.log('📄 Total documents:', allDocuments.length);
                
                // Populate category filter
                populateCategoryFilter();
                
                // Display documents
                displayDocuments();
                
            } catch (error) {
                console.error('💥 Load documents error:', error);
                grid.innerHTML = '<div class="loading"><p style="color: #f44336;">Connection error: ' + error.message + '</p></div>';
            }
        }

        function populateCategoryFilter() {
            const categoryFilter = document.getElementById('categoryFilter');
            const categories = [...new Set(allDocuments.map(doc => doc.Category))].sort();
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        function displayDocuments() {
            const grid = document.getElementById('documentsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (!filteredDocuments || filteredDocuments.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            grid.innerHTML = filteredDocuments.map(doc => `
                <div class="document-card" onclick="openDocument('${escapeHtml(doc.DocumentID)}', '${escapeHtml(doc.SourceType)}', '${escapeHtml(doc.SourceLink || '')}', '${escapeHtml(doc.Title)}')">
                    <div class="document-icon">${getDocumentIcon(doc.SourceType)}</div>
                    <div class="document-title">${escapeHtml(doc.Title)}</div>
                    <div class="document-category">${escapeHtml(doc.Category)}</div>
                    <div class="document-meta">
                        <span class="document-type">${escapeHtml(doc.SourceType)}</span>
                    </div>
                </div>
            `).join('');
        }

        function getDocumentIcon(sourceType) {
            const icons = {
                'Drive': '📄',
                'Link': '🔗',
                'Physical': '📦'
            };
            return icons[sourceType] || '📄';
        }

        function openDocument(documentId, sourceType, sourceLink, title) {
            if (sourceType === 'Link' && sourceLink) {
                window.open(sourceLink, '_blank');
            } else if (sourceType === 'Drive' && sourceLink) {
                window.open(sourceLink, '_blank');
            } else if (sourceType === 'Physical') {
                alert('📦 Physical Document\n\n"' + title + '"\n\nThis is a physical document stored at the management office. Please contact management for access.');
            } else {
                alert('Unable to open document. Please contact management.');
            }
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            applyFilters(query);
        }

        function applyFilters(searchQuery) {
            const query = searchQuery || document.getElementById('searchInput').value.toLowerCase().trim();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            
            filteredDocuments = allDocuments.filter(doc => {
                // Search filter
                const matchesSearch = !query || 
                    doc.Title.toLowerCase().includes(query) ||
                    doc.Category.toLowerCase().includes(query);
                
                // Category filter
                const matchesCategory = !categoryFilter || doc.Category === categoryFilter;
                
                // Type filter
                const matchesType = !typeFilter || doc.SourceType === typeFilter;
                
                return matchesSearch && matchesCategory && matchesType;
            });
            
            displayDocuments();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // API Helper (JSONP)
        async function callAPI(action, params = {}) {
            console.log('📡 callAPI called:', action, params);
            
            return new Promise((resolve, reject) => {
                const callbackName = 'apiCallback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                const queryParams = new URLSearchParams({
                    action: action,
                    callback: callbackName,
                    ...params
                });
                
                const script = document.createElement('script');
                script.src = CONFIG.DOCLIB_API + '?' + queryParams.toString();
                
                console.log('🔗 API URL:', script.src);
                
                let timeoutId = setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                        console.error('⏱️ API Timeout for:', action);
                        reject(new Error('Request timeout'));
                    }
                }, 30000);
                
                window[callbackName] = function(response) {
                    console.log('✅ API Response received:', response);
                    clearTimeout(timeoutId);
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    delete window[callbackName];
                    resolve(response);
                };
                
                script.onerror = function() {
                    console.error('❌ API Script error for:', action);
                    clearTimeout(timeoutId);
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    delete window[callbackName];
                    reject(new Error('Network request failed'));
                };
                
                document.head.appendChild(script);
            });
        }
    </script>
</body>
</html>
