<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Illawong - Zone Rep Problem Submission</title>
    <!--
    =====================================================================
    LAKE ILLAWONG - ZONE REP SUBMISSION FORM
    =====================================================================
    PURPOSE: Zone Rep problem submission with zone-filtered selection
    VERSION: V1.1.0
    LAST UPDATED: May 2026
    DESIGN SYSTEM: Lake Illawong Unified v2.0
    - Glass-morphism throughout (converted from V1.4 white card design)
    - Back button: portal-back-btn standard
    AUTHENTICATION: Session guard — portalZoneRepVerified
    BACKEND: ResidentSubmissionForm_V1.2.js (getZoneUnits, submitFault)

    HOW IT WORKS:
    1. Session guard checks portalZoneRepVerified
    2. Zone and name read from session (portalZoneRepVerified_roles / _name)
    3. Units filtered by zone appear in dropdown
    4. Zone Rep name sent as "reportedBy" to backend
    5. Backend finds Zone Rep email in UnitList (Zone Reps ARE residents)
    6. Everything else works exactly like normal submission

    CHANGE LOG
    - V1.1.0 (May 2026): Glass-morphism conversion. Design System V2.0
                         applied throughout. Back button standardised to
                         portal-back-btn. All JS unchanged.
    - V1.0.0 (Oct 2025): Initial release.
    =====================================================================
    -->
    <style>
        :root {
            --glass-bg:           rgba(255, 255, 255, 0.08);
            --glass-bg-hover:     rgba(255, 255, 255, 0.12);
            --glass-bg-strong:    rgba(255, 255, 255, 0.15);
            --glass-border:       rgba(255, 255, 255, 0.15);
            --glass-border-hover: rgba(255, 255, 255, 0.30);
            --glass-blur:         blur(15px);
            --glass-text:         #ffffff;
            --glass-text-muted:   rgba(255, 255, 255, 0.70);
            --glass-text-subtle:  rgba(255, 255, 255, 0.50);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
            color: var(--glass-text);
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            background: transparent;
            text-align: center;
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-container { flex-shrink: 0; }

        .logo-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .header-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: white;
        }

        .header-subtitle {
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
        }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%, rgba(255,255,255,0.3) 10%,
                rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%,
                transparent 100%);
            border-radius: 2px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text { align-items: center; text-align: center; }
            .header-title { font-size: 1.6rem; }
            .logo-image { width: 80px; height: 80px; }
        }

        /* BACK BUTTON */
        .portal-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            transition: background 0.2s;
            min-height: 44px;
            font-family: inherit;
        }

        .portal-back-btn:hover { background: rgba(255,255,255,0.25); }

        /* GLASS PANEL */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2px;
            padding: 32px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--glass-text);
            margin-bottom: 4px;
        }

        .panel-subtitle {
            font-size: 0.9rem;
            color: var(--glass-text-muted);
            margin-bottom: 24px;
        }

        /* INFO BOX */
        .info-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-left: 4px solid rgba(255,255,255,0.5);
            border-radius: 2px;
            padding: 16px 20px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            color: var(--glass-text-muted);
            line-height: 1.6;
        }

        .info-box strong { color: var(--glass-text); }

        /* FORM */
        .form-group { margin-bottom: 24px; }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--glass-text);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.12);
            border: 1px solid var(--glass-border);
            border-radius: 2px;
            font-size: 1rem;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input::placeholder { color: var(--glass-text-subtle); }

        .form-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
        }

        .form-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        select.form-input {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 14px center;
            background-repeat: no-repeat;
            background-size: 16px;
            padding-right: 44px;
        }

        select.form-input option {
            background: #1e3a8a;
            color: white;
        }

        textarea.form-input {
            min-height: 130px;
            resize: vertical;
            line-height: 1.6;
        }

        /* SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.25s;
            min-height: 52px;
            font-family: inherit;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
        }

        .submit-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* LOADING */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* RESULT */
        .result {
            display: none;
            padding: 24px;
            border-radius: 2px;
            margin-top: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .result.success {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            border-left: 4px solid #10b981;
            color: #6ee7b7;
        }

        .result.success strong { color: #a7f3d0; }

        .result.error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
        }

        .result.error strong { color: #fecaca; }

        /* PHOTO CTA inside success result */
        .photo-cta {
            margin: 16px 0;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .photo-cta strong { color: var(--glass-text); display: block; margin-bottom: 8px; }
        .photo-cta p { color: var(--glass-text-muted); margin-bottom: 14px; font-size: 0.875rem; }

        .photo-link {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(8,145,178,0.3);
            border: 1px solid rgba(8,145,178,0.5);
            color: #67e8f9;
            text-decoration: none;
            border-radius: 2px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .photo-link:hover { background: rgba(8,145,178,0.5); }

        .hidden { display: none !important; }
    </style>
</head>

<body style="display:none">
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
                </div>
                <div class="header-text">
                    <div class="header-title">Zone Rep Submission</div>
                    <div class="header-subtitle">Lake Illawong Residential Club</div>
                </div>
            </div>
            <div class="header-divider"></div>
        </div>

        <!-- BACK BUTTON -->
        <button class="portal-back-btn" onclick="window.location.href='ZoneRepPortal.html'">&#8592; Back to Zone Rep Portal</button>

        <!-- MAIN PANEL -->
        <div class="glass-panel">
            <div class="panel-title">Submit a Problem Report</div>
            <div class="panel-subtitle">Submit problems on behalf of residents in your zone</div>

            <!-- Info Box -->
            <div class="info-box" id="infoBox">
                <strong>Zone Representative Submission</strong><br>
                <span id="infoText">Loading your zone...</span>
            </div>

            <!-- Form -->
            <form id="faultForm">
                <div class="form-group" id="unitGroup" style="display: none;">
                    <label class="form-label" for="unitNumber">Unit Number *</label>
                    <select class="form-input" id="unitNumber" required disabled>
                        <option value="">-- Select Unit --</option>
                    </select>
                </div>

                <div class="form-group" id="descriptionGroup" style="display: none;">
                    <label class="form-label" for="problemDescription">Problem Description *</label>
                    <textarea
                        class="form-input"
                        id="problemDescription"
                        required
                        disabled
                        placeholder="Please describe the problem in detail..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn" disabled>
                    Submit Problem Report
                </button>
            </form>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div style="color: var(--glass-text-muted);">Submitting your report...</div>
            </div>

            <!-- Result -->
            <div class="result" id="result">
                <div id="resultMessage"></div>
            </div>
        </div>

    </div>

    <script>
        // SESSION GUARD
        if (!sessionStorage.getItem('portalZoneRepVerified')) {
            window.location.href = 'ZoneRepPortal.html';
        } else {
            document.body.style.display = '';
        }

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyQZ2m6zSnN0LSD1BTBNn3hK81YextFLU89_DHB8ijjFi8U51Pa8QWlpu52H7AdGaXLcA/exec';

        let selectedZoneRepName = '';
        let selectedZone = '';

        document.addEventListener('DOMContentLoaded', function() {
            initialiseFromSession();
        });

        function initialiseFromSession() {
            const name = sessionStorage.getItem('portalZoneRepVerified_name') || '';
            const rolesRaw = sessionStorage.getItem('portalZoneRepVerified_roles') || '[]';
            const roles = JSON.parse(rolesRaw);

            const zoneRepTag = roles.find(r => r.startsWith('ZoneRep-'));
            if (!zoneRepTag) {
                document.getElementById('infoText').textContent = 'No zone assignment found. Please contact management.';
                return;
            }

            const zoneNumber = zoneRepTag.replace('ZoneRep-', '');
            selectedZone = 'Zone ' + zoneNumber;
            selectedZoneRepName = name;

            document.getElementById('infoText').innerHTML =
                `Submitting as <strong>${name}</strong> &mdash; ${selectedZone}`;

            loadUnitsForZone(selectedZone);
        }

        async function loadUnitsForZone(zone) {
            const unitGroup   = document.getElementById('unitGroup');
            const unitSelect  = document.getElementById('unitNumber');

            unitGroup.style.display = 'block';
            unitSelect.disabled = true;
            unitSelect.innerHTML = '<option value="">Loading units...</option>';

            try {
                const response = await callScript({ action: 'getZoneUnits', zone: zone });
                if (response.success && response.units && response.units.length > 0) {
                    populateUnitDropdown(response.units);
                    unitSelect.disabled = false;
                    document.getElementById('descriptionGroup').style.display = 'block';
                    document.getElementById('problemDescription').disabled = false;
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    unitSelect.innerHTML = '<option value="">No units found</option>';
                }
            } catch (error) {
                console.error('Error:', error);
                unitSelect.innerHTML = '<option value="">Error loading units</option>';
            }
        }

        function populateUnitDropdown(units) {
            const unitSelect = document.getElementById('unitNumber');
            unitSelect.innerHTML = '<option value="">-- Select Unit --</option>';
            units.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit;
                option.textContent = unit;
                unitSelect.appendChild(option);
            });
        }

        function hideAllGroups() {
            document.getElementById('unitGroup').style.display = 'none';
            document.getElementById('descriptionGroup').style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
        }

        async function callScript(data) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                const params = new URLSearchParams(data);
                params.append('callback', callbackName);
                script.src = `${WEB_APP_URL}?${params.toString()}`;
                window[callbackName] = function(response) {
                    document.head.removeChild(script);
                    delete window[callbackName];
                    resolve(response);
                };
                script.onerror = function() {
                    document.head.removeChild(script);
                    delete window[callbackName];
                    reject(new Error('Script loading failed'));
                };
                document.head.appendChild(script);
            });
        }

        document.getElementById('faultForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn    = document.getElementById('submitBtn');
            const loading      = document.getElementById('loading');
            const result       = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');

            submitBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            const formData = {
                action: 'submitFault',
                unitNumber: document.getElementById('unitNumber').value,
                reportedBy: selectedZoneRepName,
                problemDescription: document.getElementById('problemDescription').value
            };

            try {
                const response = await callScript(formData);
                loading.style.display = 'none';

                if (response.success) {
                    result.className = 'result success';
                    resultMessage.innerHTML = `
                        <strong>Problem Submitted Successfully!</strong><br><br>
                        <strong>Tracking Number:</strong> ${response.friendlyPID}<br>
                        <strong>Unit:</strong> ${formData.unitNumber}<br>
                        <strong>Submitted By:</strong> ${selectedZoneRepName}<br>
                        <div class="photo-cta">
                            <strong>Want to add photos?</strong>
                            <p>Email your photos to <strong>irc.mtceteam@gmail.com</strong><br>
                            Include tracking number <strong>${response.friendlyPID}</strong> in the subject line</p>
                            <a href="mailto:irc.mtceteam@gmail.com?subject=Photos ${response.friendlyPID}&body=Hi,%0A%0AAttached are photos for problem request ${response.friendlyPID}%0A%0AUnit: ${formData.unitNumber}%0A%0AThank you"
                               class="photo-link">&#128231; Email Photos Now</a>
                        </div>
                        <div style="margin-top:12px;font-size:0.85rem;color:var(--glass-text-muted);">
                            Notifications sent to Zone Rep and unit owner.<br>
                            Our maintenance team will review promptly.
                        </div>`;
                    document.getElementById('faultForm').reset();
                    loadUnitsForZone(selectedZone);
                } else {
                    result.className = 'result error';
                    resultMessage.innerHTML = `
                        <strong>Submission Failed</strong><br><br>
                        ${response.message || 'Please try again or contact management.'}`;
                }
                result.style.display = 'block';

            } catch (error) {
                loading.style.display = 'none';
                result.className = 'result error';
                result.style.display = 'block';
                resultMessage.innerHTML = `
                    <strong>Network Error</strong><br><br>
                    Please check your connection and try again.`;
            }

            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
