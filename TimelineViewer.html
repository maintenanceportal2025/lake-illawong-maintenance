<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Viewer - Lake Illawong Maintenance</title>
    <!--
    =====================================================================
    LAKE ILLAWONG - TIMELINE VIEWER
    =====================================================================
    PURPOSE: Activity history and problem tracking for Field Ops
    PORTAL: Field Operations Portal
    VERSION: V1.1.0
    LAST UPDATED: May 2026
    DESIGN SYSTEM: Lake Illawong Unified v2.0
    - Glass-morphism throughout (converted from white card design)
    - CSS variables remapped to glass equivalents so JS-generated
      HTML using var() automatically inherits correct glass styling
    AUTHENTICATION: Session guard — portalFieldOpsVerified
    BACKEND: Explorer V1.2.1 (getFaultLogData)

    CHANGE LOG
    - V1.1.0 (May 2026): Glass-morphism conversion. CSS variables
                         remapped to glass values. Back button
                         standardised to portal-back-btn. Header
                         divider added. All JS unchanged.
    =====================================================================
    -->
    <style>
        :root {
            /* Remapped to glass values — JS-generated HTML using these vars gets glass styling automatically */
            --primary-blue:    #a5b4fc;
            --primary-blue-dark: #818cf8;
            --gradient-bg:     linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            --success-green:   #10b981;
            --success-bg:      #d1fae5;
            --error-red:       #ef4444;
            --error-bg:        #fee2e2;
            --info-purple:     #c4b5fd;
            --info-bg:         rgba(196,181,253,0.15);
            --text-primary:    #ffffff;
            --text-secondary:  rgba(255,255,255,0.85);
            --text-muted:      rgba(255,255,255,0.55);
            --bg-primary:      rgba(255,255,255,0.08);
            --bg-secondary:    rgba(255,255,255,0.05);
            --border-primary:  rgba(255,255,255,0.15);

            /* Glass system */
            --glass-bg:        rgba(255,255,255,0.08);
            --glass-bg-hover:  rgba(255,255,255,0.12);
            --glass-bg-strong: rgba(255,255,255,0.15);
            --glass-border:    rgba(255,255,255,0.15);
            --glass-border-hover: rgba(255,255,255,0.30);
            --glass-blur:      blur(15px);
            --glass-text:      #ffffff;
            --glass-text-muted: rgba(255,255,255,0.70);
            --glass-text-subtle: rgba(255,255,255,0.50);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-bg);
            min-height: 100vh;
            color: var(--glass-text);
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px 30px; }

        /* HEADER */
        .header { background: transparent; text-align: center; margin-bottom: 20px; padding: 20px 0 0; }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .logo-container { flex-shrink: 0; }

        .logo-image { width: 120px; height: 120px; object-fit: contain; background: transparent; }

        .header-text { text-align: left; }

        .header-title {
            font-size: 2.25rem;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%, rgba(255,255,255,0.3) 10%,
                rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%,
                transparent 100%);
            border-radius: 2px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text { text-align: center; }
            .header-title { font-size: 1.75rem; }
            .logo-image { width: 100px; height: 100px; }
        }

        /* BACK BUTTON */
        .portal-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            transition: background 0.2s;
            min-height: 44px;
            font-family: inherit;
        }

        .portal-back-btn:hover { background: rgba(255,255,255,0.25); }

        /* GLASS PANEL */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2px;
            padding: 24px;
            margin-bottom: 24px;
        }

        /* SEARCH SECTION */
        .search-section { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 2px; padding: 24px; margin-bottom: 24px; }
        .search-form { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
        .search-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        .search-label { font-weight: 600; color: var(--glass-text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .search-input { padding: 12px 16px; background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border); border-radius: 2px; font-size: 0.95rem; color: white; font-family: inherit; transition: all 0.2s; }
        .search-input::placeholder { color: var(--glass-text-subtle); }
        .search-input:focus { outline: none; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
        .search-input option { background: #1e3a8a; color: white; }

        .btn { padding: 12px 20px; border-radius: 2px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; display: flex; align-items: center; gap: 8px; white-space: nowrap; font-family: inherit; font-size: 0.9rem; min-height: 44px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.12); color: var(--glass-text-muted); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.18); color: white; }

        .filters-section { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 2px; border: 1px solid var(--glass-border); }
        .filters-section h4 { margin-bottom: 15px; color: var(--glass-text); font-weight: 600; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }

        /* RESULTS SECTION */
        .results-section { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 2px; padding: 24px; min-height: 400px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); flex-wrap: wrap; gap: 10px; }
        .results-title { font-size: 1.3rem; font-weight: 600; color: var(--glass-text); }
        .results-count { background: rgba(196,181,253,0.2); color: #c4b5fd; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; border: 1px solid rgba(196,181,253,0.3); }

        /* EXPORT */
        .export-menu { position: relative; display: inline-block; }
        .export-dropdown { position: absolute; top: 100%; right: 0; background: rgba(30,58,138,0.95); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 2px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); min-width: 180px; z-index: 1000; display: none; }
        .export-dropdown.show { display: block; }
        .export-option { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--glass-text-muted); transition: background 0.2s; font-size: 0.9rem; }
        .export-option:hover { background: rgba(255,255,255,0.1); color: white; }

        /* PROBLEM SUMMARY */
        .problem-summary { background: rgba(255,255,255,0.06); border-radius: 2px; padding: 20px; margin-bottom: 25px; border-left: 4px solid rgba(165,180,252,0.6); border: 1px solid var(--glass-border); border-left: 4px solid var(--primary-blue); }
        .problem-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .summary-item { display: flex; flex-direction: column; gap: 4px; }
        .summary-label { font-size: 0.72rem; color: var(--glass-text-subtle); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-value { font-weight: 600; color: var(--glass-text); font-size: 0.9rem; }

        /* TIMELINE */
        .timeline-container { position: relative; }
        .timeline-item { display: flex; margin-bottom: 20px; position: relative; }
        .timeline-item:not(:last-child)::after { content: ''; position: absolute; left: 20px; top: 50px; bottom: -20px; width: 2px; background: var(--glass-border); }
        .timeline-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 20px; flex-shrink: 0; position: relative; z-index: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .timeline-icon.recent { background: linear-gradient(135deg, #10b981, #059669); }
        .timeline-content { flex: 1; background: rgba(255,255,255,0.06); border-radius: 2px; padding: 18px; border: 1px solid var(--glass-border); }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .timeline-user { font-weight: 700; color: #a5b4fc; }
        .timeline-action { color: var(--glass-text-muted); font-weight: 500; font-size: 0.9rem; }
        .timeline-time { color: var(--glass-text-subtle); font-size: 0.85rem; font-weight: 500; }
        .timeline-changes { margin-top: 12px; }
        .timeline-change { margin-bottom: 8px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 2px; border: 1px solid var(--glass-border); }
        .timeline-field { font-weight: 600; color: var(--glass-text-muted); margin-bottom: 6px; font-size: 0.85rem; }
        .timeline-values { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        /* Keep pastel red/green for old/new values — they remain readable on glass */
        .timeline-old-value { background: #fee2e2; color: #dc2626; padding: 4px 8px; border-radius: 4px; font-size: 0.875rem; font-weight: 500; }
        .timeline-new-value { background: #d1fae5; color: #047857; padding: 4px 8px; border-radius: 4px; font-size: 0.875rem; font-weight: 500; }
        .timeline-arrow { color: var(--glass-text-subtle); font-weight: bold; }
        .timeline-comment-content { background: rgba(196,181,253,0.15); color: var(--glass-text-muted); padding: 14px; border-radius: 2px; margin-top: 8px; border-left: 3px solid #c4b5fd; font-style: italic; }

        /* STATES */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--glass-text-muted); }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { color: var(--glass-text); margin-bottom: 10px; font-size: 1.2rem; }

        .status-message { padding: 16px 20px; border-radius: 2px; margin-bottom: 20px; border-left: 4px solid; }
        .status-error { background: rgba(239,68,68,0.15); border-left-color: #ef4444; color: #fca5a5; }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .search-form { flex-direction: column; }
            .search-group { min-width: auto; }
            .results-header { flex-direction: column; gap: 10px; align-items: flex-start; }
            .filters-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="display:none">
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
                </div>
                <div class="header-text">
                    <h1 class="header-title">Timeline Viewer</h1>
                    <p class="header-subtitle">Activity History &amp; Problem Tracking</p>
                </div>
            </div>
            <div class="header-divider"></div>
        </div>

        <!-- BACK BUTTON -->
        <button class="portal-back-btn" onclick="window.location.href='FieldOperationsPortal.html'">&#8592; Back to Portal</button>

        <!-- SEARCH SECTION -->
        <div class="search-section">
            <div class="search-form">
                <div class="search-group">
                    <label class="search-label">Search (Optional)</label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Enter Problem ID (222323) or Unit Number (9)">
                </div>
                <button class="btn btn-primary" onclick="performSearch()">Search</button>
                <button class="btn btn-secondary" onclick="toggleFilters()">Filters</button>
                <button class="btn btn-secondary" onclick="clearResults()">Clear</button>
            </div>

            <div id="filtersSection" class="filters-section" style="display: none;">
                <h4>Filters</h4>
                <div class="filters-grid">
                    <div class="search-group">
                        <label class="search-label">Zone</label>
                        <select id="zoneFilter" class="search-input" onchange="applyFilters()">
                            <option value="">All Zones</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <label class="search-label">Status</label>
                        <select id="statusFilter" class="search-input" onchange="applyFilters()">
                            <option value="">All Status</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <label class="search-label">Priority</label>
                        <select id="priorityFilter" class="search-input" onchange="applyFilters()">
                            <option value="">All Priority</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="clearFilters()" style="font-size: 0.85rem; padding: 8px 14px;">Clear Filters</button>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div class="results-section">
            <div class="results-header">
                <h2 class="results-title">Timeline Results</h2>
                <div id="resultsCount" class="results-count" style="display: none;">0 activities found</div>
                <div class="export-menu">
                    <button class="btn btn-secondary" onclick="toggleExportMenu()" id="exportBtn" style="display: none;">Export</button>
                    <div class="export-dropdown" id="exportDropdown">
                        <div class="export-option" onclick="exportToPDF()">Download Report</div>
                        <div class="export-option" onclick="copyToClipboard()">Copy Summary</div>
                        <div class="export-option" onclick="exportToCSV()">Export CSV</div>
                    </div>
                </div>
            </div>

            <div id="resultsContent">
                <div class="empty-state">
                    <div class="empty-state-icon">&#128269;</div>
                    <h3>Ready to Search or Filter</h3>
                    <p>Enter a Problem ID or Unit Number to search, or use filters to browse all problems</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // SESSION GUARD
        if (!sessionStorage.getItem('portalFieldOpsVerified')) {
            window.location.href = 'FieldOperationsPortal.html';
        } else {
            document.body.style.display = '';
        }

        const API_URL = 'https://script.google.com/macros/s/AKfycbxtdMfxB5b1F5K401X0lJxnK2-DGkiG2zYZNukJvAHx0K1AqgPTMIdiunwS3etm0FOL/exec';
        let currentProblems = [], currentTimeline = [], filteredProblems = [];
        let allZones = new Set(), allStatuses = new Set(), allPriorities = new Set();

        document.addEventListener('DOMContentLoaded', function() {
            loadAllProblems();
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') performSearch();
            });
        });

        async function loadAllProblems() {
            try {
                const response = await makeAPICall('getFaultLogData');
                if (response.success) {
                    currentProblems = response.data || [];
                    currentProblems.forEach(problem => {
                        if (problem.zone) allZones.add(problem.zone);
                        if (problem.problemStatus) allStatuses.add(problem.problemStatus);
                        if (problem.problemPriority) allPriorities.add(problem.problemPriority);
                    });
                    populateFilterDropdowns();
                    displayAllProblems();
                } else {
                    showError('Backend error: ' + (response.error || 'Unknown error'));
                }
            } catch (error) {
                showError('Failed to load problem data. Please check your connection and try again.');
            }
        }

        async function makeAPICall(action, params = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                const script = document.createElement('script');
                const queryParams = new URLSearchParams({ action, callback: callbackName, ...params });
                script.src = `${API_URL}?${queryParams}`;
                window[callbackName] = function(response) {
                    document.head.removeChild(script);
                    delete window[callbackName];
                    resolve(response);
                };
                script.onerror = function() {
                    document.head.removeChild(script);
                    delete window[callbackName];
                    reject(new Error('Network request failed'));
                };
                document.head.appendChild(script);
                setTimeout(() => {
                    if (window[callbackName]) {
                        document.head.removeChild(script);
                        delete window[callbackName];
                        reject(new Error('Request timeout'));
                    }
                }, 15000);
            });
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput').value.trim();
            if (!searchInput) { applyFilters(); return; }
            const isUnitKeyword = /unit/i.test(searchInput);
            const isProblemId = /PID/i.test(searchInput) || /^\d{8}-\d{6}$/.test(searchInput);
            const is6DigitPID = /^\d{6}$/.test(searchInput);
            const isShortNumber = /^\d{1,2}$/.test(searchInput);
            if (isUnitKeyword) { searchByUnit(searchInput); }
            else if (isShortNumber) { searchByUnit(searchInput); }
            else if (is6DigitPID) { if (!searchByProblemId(searchInput)) searchByUnit(searchInput); }
            else if (isProblemId) { searchByProblemId(searchInput); }
            else if (/^\d+$/.test(searchInput)) { if (!searchByUnit(searchInput)) searchByProblemId(searchInput); }
            else { if (!searchByProblemId(searchInput)) searchByUnit(searchInput); }
        }

        function searchByProblemId(problemIdInput) {
            let searchTerms = [];
            if (problemIdInput.includes('-')) searchTerms.push(problemIdInput);
            if (problemIdInput.toUpperCase().startsWith('PID')) searchTerms.push(problemIdInput.replace(/^PID\s*/i, '').trim());
            if (/^\d{6}$/.test(problemIdInput)) searchTerms.push(problemIdInput);
            if (searchTerms.length === 0) searchTerms.push(problemIdInput);
            const problem = currentProblems.find(p => {
                if (searchTerms.some(term => p.internalId === term)) return true;
                const friendlyPID = getFriendlyPID(p.internalId);
                if (searchTerms.some(term => friendlyPID.includes(term))) return true;
                if (p.internalId && p.internalId.includes('-')) {
                    const lastPart = p.internalId.split('-')[1];
                    if (searchTerms.some(term => term === lastPart)) return true;
                }
                return false;
            });
            if (problem) { displaySingleProblem(problem, `Problem ${getFriendlyPID(problem.internalId)}`); return true; }
            else { showError(`Problem ID "${problemIdInput}" not found. Try using the 6-digit format like "222323".`); return false; }
        }

        function searchByUnit(unitNumber) {
            const allUnits = [...new Set(currentProblems.map(p => p.unitNumber?.toString().trim()).filter(Boolean))];
            const normalizeUnit = (str) => { if (!str) return ''; return str.toString().trim().toLowerCase().replace(/^unit\s*/i, '').replace(/\s+/g, ''); };
            const normalizedSearch = normalizeUnit(unitNumber);
            const unitProblems = currentProblems.filter(p => { if (!p.unitNumber) return false; return normalizeUnit(p.unitNumber) === normalizedSearch; });
            if (unitProblems.length > 0) {
                const displayUnit = /^\d+$/.test(normalizedSearch) ? `Unit ${normalizedSearch}` : normalizedSearch;
                displayMultipleProblems(unitProblems, displayUnit, true);
                return true;
            } else {
                const availableUnits = allUnits.map(u => normalizeUnit(u)).filter(u => u && /^\d+$/.test(u)).sort((a, b) => parseInt(a) - parseInt(b)).slice(0, 15);
                showError(`No problems found for Unit ${normalizedSearch}. Available units with problems: ${availableUnits.length > 0 ? availableUnits.join(', ') : 'None found'}`);
                return false;
            }
        }

        function displayAllProblems() {
            if (currentProblems.length === 0) { updateResults('All Problems', 0, getEmptyStateHTML()); return; }
            displayMultipleProblems(currentProblems, 'All Problems', false);
        }

        function displaySingleProblem(problem, title) {
            let activities = [];
            try { activities = problem.activityLogParsed || JSON.parse(problem.activityLog || '[]'); } catch (e) { activities = []; }
            const summaryHTML = createProblemSummary(problem);
            const timelineHTML = createTimelineHTML(activities);
            updateResults(`${title} Timeline`, activities.length, summaryHTML + timelineHTML);
            currentTimeline = [{ problem: problem, activities: activities }];
            filteredProblems = [problem];
        }

        function displayMultipleProblems(problems, title, fromSearch) {
            let timelineHTML = '';
            let totalActivities = 0;
            const sortedProblems = [...problems].sort((a, b) => (a.internalId || '').localeCompare(b.internalId || ''));
            sortedProblems.forEach(problem => {
                let activities = [];
                try { activities = problem.activityLogParsed || JSON.parse(problem.activityLog || '[]'); } catch (e) { activities = []; }
                totalActivities += activities.length;
                timelineHTML += `
                    <div class="problem-summary" style="margin-bottom: 30px;">
                        <div class="problem-summary-grid">
                            <div class="summary-item"><span class="summary-label">Problem ID</span><span class="summary-value">${getFriendlyPID(problem.internalId)}</span></div>
                            <div class="summary-item"><span class="summary-label">Unit Number</span><span class="summary-value">${problem.unitNumber || 'Unknown'}</span></div>
                            <div class="summary-item"><span class="summary-label">Zone</span><span class="summary-value">${problem.zone || 'Unknown'}</span></div>
                            <div class="summary-item"><span class="summary-label">Status</span><span class="summary-value">${problem.problemStatus || 'Unknown'}</span></div>
                            <div class="summary-item"><span class="summary-label">Priority</span><span class="summary-value">${problem.problemPriority || 'Unknown'}</span></div>
                            <div class="summary-item"><span class="summary-label">Category</span><span class="summary-value">${problem.category || 'Not assigned'}</span></div>
                            <div class="summary-item"><span class="summary-label">Reported Date</span><span class="summary-value">${formatDate(problem.timestamp)}</span></div>
                            <div class="summary-item"><span class="summary-label">Reported By</span><span class="summary-value">${problem.reportedBy || 'Unknown'}</span></div>
                        </div>
                        <div style="margin-top:15px;padding:14px;background:rgba(255,255,255,0.05);border-radius:2px;border:1px solid rgba(255,255,255,0.1);">
                            <span class="summary-label">Description</span>
                            <div style="margin-top:8px;color:rgba(255,255,255,0.8);">${problem.problemDescription || 'No description available'}</div>
                        </div>
                        ${createTimelineHTML(activities)}
                    </div>`;
            });
            const displayTitle = fromSearch ? `${title} Timeline (${problems.length} problems)` :
                                problems.length === currentProblems.length ? `${title} (${problems.length} problems)` :
                                `${title} (${problems.length} of ${currentProblems.length} problems)`;
            updateResults(displayTitle, totalActivities, timelineHTML);
            currentTimeline = problems.map(problem => ({ problem: problem, activities: problem.activityLogParsed || [] }));
            filteredProblems = problems;
        }

        function createProblemSummary(problem) {
            return `
                <div class="problem-summary">
                    <div class="problem-summary-grid">
                        <div class="summary-item"><span class="summary-label">Problem ID</span><span class="summary-value">${getFriendlyPID(problem.internalId)}</span></div>
                        <div class="summary-item"><span class="summary-label">Unit Number</span><span class="summary-value">${problem.unitNumber || 'Unknown'}</span></div>
                        <div class="summary-item"><span class="summary-label">Zone</span><span class="summary-value">${problem.zone || 'Unknown'}</span></div>
                        <div class="summary-item"><span class="summary-label">Status</span><span class="summary-value">${problem.problemStatus || 'Unknown'}</span></div>
                        <div class="summary-item"><span class="summary-label">Priority</span><span class="summary-value">${problem.problemPriority || 'Unknown'}</span></div>
                        <div class="summary-item"><span class="summary-label">Category</span><span class="summary-value">${problem.category || 'Not assigned'}</span></div>
                        <div class="summary-item"><span class="summary-label">Reported Date</span><span class="summary-value">${formatDate(problem.timestamp)}</span></div>
                        <div class="summary-item"><span class="summary-label">Reported By</span><span class="summary-value">${problem.reportedBy || 'Unknown'}</span></div>
                    </div>
                    <div style="margin-top:15px;padding:14px;background:rgba(255,255,255,0.05);border-radius:2px;border:1px solid rgba(255,255,255,0.1);">
                        <span class="summary-label">Description</span>
                        <div style="margin-top:8px;color:rgba(255,255,255,0.8);">${problem.problemDescription || 'No description available'}</div>
                    </div>
                </div>`;
        }

        function createTimelineHTML(activities) {
            if (!activities || activities.length === 0) {
                return `<div class="empty-state"><div class="empty-state-icon">&#128221;</div><h3>No Activity History</h3><p>No activity has been recorded for this problem yet</p></div>`;
            }
            const sortedActivities = [...activities].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            let html = '<div class="timeline-container">';
            sortedActivities.forEach((activity, index) => { html += createTimelineItem(activity, index === 0); });
            html += '</div>';
            return html;
        }

        function createTimelineItem(activity, isRecent) {
            const formattedTime = new Date(activity.timestamp).toLocaleString('en-AU');
            const iconClass = isRecent ? 'recent' : '';
            let changesHTML = '';
            if (activity.changes && activity.changes.length > 0) {
                changesHTML = '<div class="timeline-changes">';
                activity.changes.forEach(change => {
                    if (change.field === 'Comments' && change.newValue) {
                        changesHTML += `<div class="timeline-change"><div class="timeline-field">&#128172; Comment Added</div><div class="timeline-comment-content">"${change.newValue}"</div></div>`;
                    } else {
                        const oldValue = change.oldValue || '(empty)';
                        const newValue = change.newValue || '(empty)';
                        changesHTML += `<div class="timeline-change"><div class="timeline-field">${change.field} Changed</div><div class="timeline-values"><span class="timeline-old-value">${oldValue}</span><span class="timeline-arrow">&#8594;</span><span class="timeline-new-value">${newValue}</span></div></div>`;
                    }
                });
                changesHTML += '</div>';
            }
            return `
                <div class="timeline-item">
                    <div class="timeline-icon ${iconClass}">&#128221;</div>
                    <div class="timeline-content">
                        <div class="timeline-header">
                            <span class="timeline-user">${activity.user || 'System'}</span>
                            <span class="timeline-action">${activity.action || 'Updated'}</span>
                            <span class="timeline-time">${formattedTime}</span>
                        </div>
                        ${changesHTML}
                    </div>
                </div>`;
        }

        function toggleFilters() {
            const f = document.getElementById('filtersSection');
            f.style.display = f.style.display !== 'none' ? 'none' : 'block';
        }

        function populateFilterDropdowns() {
            const populate = (id, values, placeholder) => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">${placeholder}</option>`;
                Array.from(values).sort().forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v; opt.textContent = v;
                    sel.appendChild(opt);
                });
            };
            populate('zoneFilter', allZones, 'All Zones');
            populate('statusFilter', allStatuses, 'All Status');
            populate('priorityFilter', allPriorities, 'All Priority');
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const zoneFilter = document.getElementById('zoneFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;
            let dataToFilter = searchTerm ? filteredProblems : currentProblems;
            let filtered = dataToFilter.filter(problem => {
                if (zoneFilter && problem.zone !== zoneFilter) return false;
                if (statusFilter && problem.problemStatus !== statusFilter) return false;
                if (priorityFilter && problem.problemPriority !== priorityFilter) return false;
                return true;
            });
            if (filtered.length > 0) {
                let titlePrefix = searchTerm ? (searchTerm.match(/^\d+$/) ? `Unit ${searchTerm}` : `Search: ${searchTerm}`) : 'Filtered Results';
                let filters = [];
                if (zoneFilter) filters.push(`Zone: ${zoneFilter}`);
                if (statusFilter) filters.push(`Status: ${statusFilter}`);
                if (priorityFilter) filters.push(`Priority: ${priorityFilter}`);
                displayMultipleProblems(filtered, `${titlePrefix}${filters.length > 0 ? ` (${filters.join(', ')})` : ''}`, false);
            } else {
                showError(searchTerm ? `No problems found matching search "${searchTerm}" with applied filters` : 'No problems found matching the selected filters');
            }
        }

        function clearFilters() {
            document.getElementById('zoneFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('priorityFilter').value = '';
            document.getElementById('searchInput').value.trim() ? performSearch() : displayAllProblems();
        }

        function updateResults(title, count, content) {
            document.querySelector('.results-title').textContent = title;
            const countEl = document.getElementById('resultsCount');
            const exportBtn = document.getElementById('exportBtn');
            if (count > 0) { countEl.textContent = `${count} activities found`; countEl.style.display = 'block'; exportBtn.style.display = 'block'; }
            else { countEl.style.display = 'none'; exportBtn.style.display = 'none'; }
            document.getElementById('resultsContent').innerHTML = content;
        }

        function clearResults() {
            ['searchInput'].forEach(id => document.getElementById(id).value = '');
            ['zoneFilter','statusFilter','priorityFilter'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('filtersSection').style.display = 'none';
            displayAllProblems();
        }

        function showError(message) {
            updateResults('Search Error', 0,
                `<div class="status-message status-error"><strong>Error:</strong> ${message}</div>
                <div class="empty-state"><div class="empty-state-icon">&#10060;</div><h3>No Results Found</h3><p>Please adjust your search or filter criteria and try again</p></div>`);
        }

        function getEmptyStateHTML() {
            return `<div class="empty-state"><div class="empty-state-icon">&#128269;</div><h3>Ready to Search or Filter</h3><p>Enter a Problem ID or Unit Number to search, or use filters to browse all problems</p></div>`;
        }

        function getFriendlyPID(internalId) {
            if (!internalId) return 'PID Unknown';
            const parts = internalId.split('-');
            return parts.length === 2 ? `PID ${parts[1]}` : `PID ${internalId}`;
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-AU') + ' ' + date.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
            } catch (e) { return dateString; }
        }

        function toggleExportMenu() { document.getElementById('exportDropdown').classList.toggle('show'); }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.export-menu')) document.getElementById('exportDropdown').classList.remove('show');
        });

        function exportToPDF() {
            document.getElementById('exportDropdown').classList.remove('show');
            if (currentTimeline.length === 0) { alert('No timeline data to export'); return; }
            let report = 'MAINTENANCE PORTAL - TIMELINE REPORT\n' + '='.repeat(60) + '\n' + `Generated: ${new Date().toLocaleString('en-AU')}\n\n`;
            currentTimeline.forEach(item => {
                const problem = item.problem;
                const activities = item.activities;
                report += `PROBLEM: ${getFriendlyPID(problem.internalId)}\n` + '-'.repeat(40) + '\n';
                report += `Unit: ${problem.unitNumber || 'Unknown'}\nZone: ${problem.zone || 'Unknown'}\nStatus: ${problem.problemStatus || 'Unknown'}\nPriority: ${problem.problemPriority || 'Unknown'}\nDescription: ${problem.problemDescription || 'No description'}\nReported: ${formatDate(problem.timestamp)}\n\n`;
                if (activities.length > 0) {
                    report += 'ACTIVITY HISTORY:\n';
                    activities.forEach(activity => {
                        report += `\n${new Date(activity.timestamp).toLocaleString('en-AU')}\nUser: ${activity.user || 'System'}\nAction: ${activity.action || 'Updated'}\n`;
                        if (activity.changes && activity.changes.length > 0) {
                            activity.changes.forEach(change => {
                                report += change.field === 'Comments' && change.newValue ? `Comment: "${change.newValue}"\n` : `${change.field}: ${change.oldValue || '(empty)'} → ${change.newValue || '(empty)'}\n`;
                            });
                        }
                        report += '\n';
                    });
                } else { report += 'No activity history available.\n'; }
                report += '\n' + '='.repeat(60) + '\n\n';
            });
            downloadFile(report, `timeline_report_${new Date().toISOString().split('T')[0]}.txt`, 'text/plain');
            alert('Timeline report downloaded');
        }

        function exportToCSV() {
            document.getElementById('exportDropdown').classList.remove('show');
            if (currentTimeline.length === 0) { alert('No timeline data to export'); return; }
            let csv = 'Problem ID,Unit,Zone,Timestamp,User,Action,Field Changed,Old Value,New Value,Comment\n';
            currentTimeline.forEach(item => {
                item.activities.forEach(activity => {
                    if (activity.changes && activity.changes.length > 0) {
                        activity.changes.forEach(change => {
                            const row = [getFriendlyPID(item.problem.internalId), item.problem.unitNumber || '', item.problem.zone || '', activity.timestamp, activity.user || 'System', activity.action || 'Updated', change.field || '', change.oldValue || '', change.newValue || '', change.field === 'Comments' ? change.newValue : ''].map(f => `"${(f || '').toString().replace(/"/g, '""')}"`).join(',');
                            csv += row + '\n';
                        });
                    }
                });
            });
            downloadFile(csv, `timeline_data_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
            alert('Timeline data exported to CSV');
        }

        function copyToClipboard() {
            document.getElementById('exportDropdown').classList.remove('show');
            if (currentTimeline.length === 0) { alert('No timeline data to copy'); return; }
            let text = 'MAINTENANCE TIMELINE SUMMARY\n===========================\n' + `Generated: ${new Date().toLocaleString('en-AU')}\n\n`;
            currentTimeline.forEach(item => {
                const p = item.problem;
                text += `Problem ${getFriendlyPID(p.internalId)} - Unit ${p.unitNumber || 'Unknown'}\nStatus: ${p.problemStatus || 'Unknown'} | Priority: ${p.problemPriority || 'Unknown'}\nDescription: ${p.problemDescription || 'No description'}\n\n`;
                if (item.activities.length > 0) {
                    text += 'Recent Activity:\n';
                    item.activities.slice(0, 3).forEach(a => { text += `• ${new Date(a.timestamp).toLocaleString('en-AU')} - ${a.user || 'System'}: ${a.action || 'Updated'}\n`; });
                    if (item.activities.length > 3) text += `• ... and ${item.activities.length - 3} more activities\n`;
                } else { text += 'No activity recorded.\n'; }
                text += '\n---\n\n';
            });
            navigator.clipboard.writeText(text).then(() => { alert('Timeline summary copied to clipboard'); }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('Timeline summary copied to clipboard');
            });
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
