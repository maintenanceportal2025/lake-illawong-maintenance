<!--
=====================================================================
ComplaintAck.html - BOARD COMPLAINT ACKNOWLEDGEMENT LANDING PAGE
=====================================================================
DOCUMENT INFORMATION:
  File Name:        ComplaintAck.html
  System:           Lake Illawong Management Central System
  Component Type:   Utility / Landing Page
  Frontend Version: V1.0.3
  Backend:          ComplaintsManager V2.0
  Status:           PRODUCTION
  Created:          May 2026
  Last Modified:    May 2026

VERSION HISTORY:
  V1.0.3 (May 2026): Structural redesign — content-card + left-border state panels
    to match ComplaintForm.html success panel exactly. statePanel target,
    state-panel-success/info/error classes, back-btn to Admin Portal.

  V1.0.2 (May 2026): Header alignment and subtitle fixes — subtitle changed to
    "Lake Illawong Residential Village", header-subtitle class applied, h1 font
    size 2rem, mobile breakpoint aligned to 768px to match ComplaintForm.html.

  V1.0.1 (May 2026): Design consistency pass — sharp corners (border-radius 2px),
    glass button style, logo 100px, header-divider removed. Now matches
    ComplaintForm.html design language exactly.

  V1.0.0 (May 2026): Initial release.
    Single-purpose Board acknowledgement landing page.
    Reads ?ref= parameter from URL.
    Calls acknowledgeComplaint action via JSONP — no OTP required.
    Three states: success (acknowledged), already actioned, error.
    Glass-morphism design on blue gradient.
    Link to Admin Portal provided on all outcome states.

AUTHENTICATION:
  None — reference number in URL is the access key.
  Accessed directly from Board alert email link.

SYSTEM CONNECTIONS:
  : ComplaintsManager V2.0
  Action:  acknowledgeComplaint
  URL:     CONFIG.BACKEND_URL

PORTAL:
  No portal dependency. Standalone landing page.
  Link to AdminPortal.html provided on result card.

TECHNICAL:
  Technology:   HTML5 + CSS3 + Vanilla JavaScript
  API Protocol: JSONP
  Design System: Lake Illawong Unified Design System v1.4 (glass variant)
  Hosting:      Netlify
=====================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Acknowledgement - Lake Illawong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header - matches ComplaintForm.html exactly */
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Content card - matches ComplaintForm.html exactly */
        .content-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* Back button - matches ComplaintForm.html exactly */
        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* State panels - tinted left-border, matches ComplaintForm success-message */
        .state-panel {
            border-radius: 2px;
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        .state-panel-success {
            background: rgba(34, 197, 94, 0.15);
            border-left: 3px solid rgba(34, 197, 94, 0.6);
        }

        .state-panel-info {
            background: rgba(14, 165, 233, 0.15);
            border-left: 3px solid rgba(14, 165, 233, 0.6);
        }

        .state-panel-error {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid rgba(239, 68, 68, 0.6);
        }

        .state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .state-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .state-text {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Status pill - system standard colours */
        .status-pill {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 10px 0;
        }

        .status-acknowledged { background: #bbf7d0; color: #047857; }
        .status-open         { background: #dbeafe; color: #1d4ed8; }
        .status-responded    { background: #e9d5ff; color: #7c3aed; }
        .status-closed       { background: #f3f4f6; color: #374151; }
        .status-other        { background: rgba(255,255,255,0.2); color: white; }

        /* Admin Portal link button - matches ComplaintForm btn-primary */
        .btn-admin {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 2px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 20px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Loading state */
        .loading-text {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-top: 12px;
            text-align: center;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { padding: 0; }
            .container { padding: 0; }
            .header { padding: 15px; margin-bottom: 15px; }
            .header h1 { font-size: 1.4rem; }
            .logo { width: 60px; height: 60px; }
            .logo-section { flex-direction: column; gap: 10px; }
            .content-card { padding: 20px; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <img src="logo.png" alt="Lake Illawong Logo" class="logo">
            <div>
                <h1>Complaint Acknowledgement</h1>
                <div class="header-subtitle">Lake Illawong Residential Village</div>
            </div>
        </div>
    </div>

    <!-- Content card -->
    <div class="content-card">
        <a href="AdminPortal.html" class="back-btn">&#8592; Admin Portal</a>

        <!-- State panel — populated by JS -->
        <div id="statePanel">
            <div class="state-panel state-panel-info">
                <div class="spinner"></div>
                <div class="loading-text">Processing acknowledgement...</div>
            </div>
        </div>
    </div>

</div>

<script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const CONFIG = {
        BACKEND_URL: 'https://script.google.com/macros/s/AKfycbwkD2K1B8hTdMHwXGNajyRr2FBR_abqhWP33rIM7LgkQzIBIPcJsDQhGOvZxXdxuQuiTA/exec',
        ADMIN_PORTAL_URL: 'AdminPortal.html'
    };

    // =====================================================================
    // INIT
    // =====================================================================
    document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        const ref    = (params.get('ref') || '').trim();

        if (!ref) {
            showError('No reference number provided.',
                'This link appears to be incomplete. Please use the link from the Board notification email.');
            return;
        }

        acknowledgeComplaint(ref);
    });

    // =====================================================================
    // JSONP CALL
    // =====================================================================
    function acknowledgeComplaint(ref) {
        const callbackName = 'ackCallback_' + Date.now();
        const url = CONFIG.BACKEND_URL
            + '?action=acknowledgeComplaint'
            + '&ref='      + encodeURIComponent(ref)
            + '&callback=' + callbackName;

        // Timeout guard — 15 seconds
        const timeout = setTimeout(function () {
            cleanup(callbackName);
            showError('Request timed out.',
                'The server did not respond in time. Please try again, or open the Admin Portal to update the complaint status manually.');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timeout);
            cleanup(callbackName);
            handleResponse(data, ref);
        };

        const script = document.createElement('script');
        script.onerror = function () {
            clearTimeout(timeout);
            cleanup(callbackName);
            showError('Could not reach the server.',
                'There may be a network issue. Please try again, or open the Admin Portal to acknowledge the complaint manually.');
        };
        script.src = url;
        document.head.appendChild(script);
    }

    function cleanup(callbackName) {
        delete window[callbackName];
        const old = document.querySelector('script[data-ack]');
        if (old) old.remove();
    }

    // =====================================================================
    // RESPONSE HANDLER
    // =====================================================================
    function handleResponse(data, ref) {
        if (!data.success) {
            // Reference not found or server error
            showError(
                'Reference not found.',
                'Complaint reference <strong>' + escHtml(ref) + '</strong> could not be located. '
                + 'Please check the link in your email, or open the Admin Portal to review complaints.'
            );
            return;
        }

        if (data.alreadyAcknowledged) {
            // Already beyond Open status
            showAlreadyActioned(ref, data.status || 'Unknown');
            return;
        }

        // Clean success — just acknowledged
        showSuccess(ref);
    }

    // =====================================================================
    // STATE RENDERERS
    // =====================================================================
    function showSuccess(ref) {
        document.getElementById('statePanel').innerHTML = `
            <div class="state-panel state-panel-success">
                <div class="state-icon">&#9989;</div>
                <div class="state-title">Complaint Acknowledged</div>
                <div class="state-text">
                    Complaint reference <strong>${escHtml(ref)}</strong> has been marked as
                    <strong>Acknowledged</strong>.<br><br>
                    A confirmation email has been sent to the resident advising them
                    that their complaint is under review and a response will follow within 14 days.
                </div>
            </div>
        `;
    }

    function showAlreadyActioned(ref, status) {
        const pillClass = statusPillClass(status);
        document.getElementById('statePanel').innerHTML = `
            <div class="state-panel state-panel-info">
                <div class="state-icon">&#8505;&#65039;</div>
                <div class="state-title">Already Actioned</div>
                <div class="state-text">
                    Complaint <strong>${escHtml(ref)}</strong> has already been actioned.<br>
                    Current status:
                </div>
                <div class="status-pill ${pillClass}">${escHtml(status)}</div>
                <div class="state-text">
                    No changes have been made. Open the Admin Portal to review
                    the complaint or record a response.
                </div>
            </div>
        `;
    }

    function showError(title, detail) {
        document.getElementById('statePanel').innerHTML = `
            <div class="state-panel state-panel-error">
                <div class="state-icon">&#9888;&#65039;</div>
                <div class="state-title">${escHtml(title)}</div>
                <div class="state-text">${detail}</div>
            </div>
        `;
    }

    // =====================================================================
    // HELPERS
    // =====================================================================
    function statusPillClass(status) {
        const map = {
            'Acknowledged': 'status-acknowledged',
            'Open':         'status-open',
            'Responded':    'status-responded',
            'Closed':       'status-closed'
        };
        return map[status] || 'status-other';
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;');
    }
</script>
</body>
</html>
