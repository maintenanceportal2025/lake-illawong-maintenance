<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dependencies - Lake Illawong</title>
    <!--
    =====================================================================
    LAKE ILLAWONG - SYSTEM DEPENDENCIES
    =====================================================================
    PURPOSE: Dynamic architecture mapping and dependency tracking
    PORTAL: SysAdmin Portal
    VERSION: V1.1.0
    LAST UPDATED: May 2026
    DESIGN SYSTEM: Lake Illawong Unified v2.0
    - Glass-morphism throughout (converted from white card design)
    - JS-generated inline styles updated to glass equivalents
    - Modals retain white background (popup detail views)
    AUTHENTICATION: Session guard — portalSysAdminVerified
    BACKEND: SystemDependencies backend (getCompleteDependencyMap)

    CHANGE LOG
    - V1.1.0 (May 2026): Glass-morphism conversion. All static CSS and
                         JS-generated inline styles updated to glass.
                         Header divider added. Back button standardised
                         to portal-back-btn. All JS logic unchanged.
    =====================================================================
    -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        .header { text-align: center; margin-bottom: 20px; color: white; }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-container { flex-shrink: 0; }

        .logo-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            margin: 0 0 5px 0;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%, rgba(255,255,255,0.3) 10%,
                rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%,
                transparent 100%);
            border-radius: 2px;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text { align-items: center; text-align: center; }
            .header-title { font-size: 1.8rem; }
        }

        /* BACK BUTTON */
        .portal-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            transition: background 0.2s;
            min-height: 44px;
            font-family: inherit;
        }

        .portal-back-btn:hover { background: rgba(255,255,255,0.25); }

        /* LOADING */
        #loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* TAB NAVIGATION */
        .tab-navigation {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            color: white;
        }

        .tab-btn.active {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.6);
            color: white;
        }

        /* MAIN GLASS PANEL */
        .main-content {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 2px;
            padding: 28px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .section-desc {
            color: rgba(255,255,255,0.6);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        /* SEARCH */
        .search-bar { margin-bottom: 24px; }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            font-size: 0.95rem;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.4); }

        .search-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
        }

        /* BACKEND/FRONTEND CARDS */
        .backends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .backend-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 2px;
            padding: 22px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .backend-card:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }

        .backend-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .backend-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
        }

        .backend-description {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
        }

        .backend-stats { text-align: center; min-width: 60px; }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #a5b4fc;
        }

        .stat-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .backend-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .meta-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            color: white;
        }

        .url-text {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            margin-top: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* FOOTER */
        .last-updated {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* MODAL — white retained for detail popup */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body style="display:none">
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
                </div>
                <div class="header-text">
                    <h1 class="header-title">System Dependencies</h1>
                    <p class="header-subtitle">Dynamic Architecture Mapping &amp; Dependency Tracking</p>
                </div>
            </div>
            <div class="header-divider"></div>
        </div>

        <!-- BACK BUTTON -->
        <button class="portal-back-btn" onclick="window.location.href='SysAdminPortal.html'">&#8592; Back to Portal</button>

        <!-- LOADING -->
        <div id="loading-indicator">
            <div class="spinner"></div>
            <p style="margin-top:20px; color:white; font-weight:600;">Loading System Dependencies...</p>
        </div>

        <!-- MAIN CONTENT -->
        <div id="main-content" style="display:none;">

            <div class="tab-navigation">
                <button class="tab-btn active" onclick="switchTab('backend-impact')">Backend Impact</button>
                <button class="tab-btn" onclick="switchTab('frontend-deps')">Frontend Dependencies</button>
                <button class="tab-btn" onclick="switchTab('url-reference')">URL Reference</button>
                <button class="tab-btn" onclick="switchTab('system-map')">System Map</button>
            </div>

            <div class="main-content">
                <div id="backend-impact" class="tab-content active">
                    <div class="section-title">&#128295; Backend Impact Analysis</div>
                    <p class="section-desc">Click any backend to see which frontends depend on it.</p>
                    <div class="search-bar">
                        <input type="text" id="backend-search" class="search-input" placeholder="Search backends...">
                    </div>
                    <div id="backends-grid" class="backends-grid"></div>
                </div>

                <div id="frontend-deps" class="tab-content">
                    <div class="section-title">&#128421; Frontend Dependencies</div>
                    <p class="section-desc">View what backends each frontend module depends on.</p>
                    <div class="search-bar">
                        <input type="text" id="frontend-search" class="search-input" placeholder="Search frontends...">
                    </div>
                    <div id="frontends-grid" class="backends-grid"></div>
                </div>

                <div id="url-reference" class="tab-content"></div>
                <div id="system-map" class="tab-content"></div>
            </div>
        </div>

    </div>

    <script>
        // SESSION GUARD
        if (!sessionStorage.getItem('portalSysAdminVerified')) {
            window.location.href = 'SysAdminPortal.html';
        } else {
            document.body.style.display = '';
        }

        const CONFIG = {
            BACKEND_URL: 'https://script.google.com/macros/s/AKfycbyu0RdVfmlQEnr1wi5tfkPi-tGNLzKcs5H3R9DAnKXzZROwqEPhnCvpNq3CsjKGeaxXwA/exec',
            TIMEOUT: 10000
        };

        let systemData = null;

        const PORTAL_COLORS = {
            'System': '#6b7280', 'residents': '#10b981', 'zonerep': '#f59e0b',
            'field': '#ef4444', 'admin': '#8b5cf6', 'sysadmin': '#ec4899', 'system/utility': '#6b7280'
        };

        function loadSystemDependencies() {
            showLoading(true);
            const script = document.createElement('script');
            const callbackName = 'handleDependencyData';
            script.src = `${CONFIG.BACKEND_URL}?action=getCompleteDependencyMap&callback=${callbackName}`;
            script.onerror = function() {
                showError('Failed to load system dependencies. Please check your connection and try again.');
                showLoading(false);
            };
            const timeout = setTimeout(() => {
                showError('Request timed out. Please refresh the page and try again.');
                showLoading(false);
                document.head.removeChild(script);
            }, CONFIG.TIMEOUT);
            window[callbackName] = function(response) {
                clearTimeout(timeout);
                document.head.removeChild(script);
                if (response.success) { systemData = response; initializeUI(); }
                else { showError('Error loading dependencies: ' + response.error); }
                showLoading(false);
            };
            document.head.appendChild(script);
        }

        function showLoading(show) {
            const loadingDiv = document.getElementById('loading-indicator');
            const mainContent = document.getElementById('main-content');
            if (loadingDiv) loadingDiv.style.display = show ? 'flex' : 'none';
            if (mainContent) mainContent.style.display = show ? 'none' : 'block';
        }

        function showError(message) { alert('Warning: ' + message); }

        function initializeUI() {
            if (!systemData) return;
            renderBackendImpact(systemData.backends);
            renderFrontendDeps(systemData.frontends);
            renderURLReference(systemData.backends);
            renderSystemMap(systemData);
            setupSearch();
            const lastUpdated = document.createElement('div');
            lastUpdated.className = 'last-updated';
            lastUpdated.textContent = `Last updated: ${new Date(systemData.generated_at).toLocaleString()}`;
            document.querySelector('.main-content').appendChild(lastUpdated);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const selectedTab = document.getElementById(tabId);
            if (selectedTab) selectedTab.classList.add('active');
            event.target.classList.add('active');
        }

        function renderBackendImpact(backends) {
            const grid = document.getElementById('backends-grid');
            if (!grid) return;
            grid.innerHTML = '';
            if (!backends || backends.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:rgba(255,255,255,0.4);">No backends found.</p>';
                return;
            }
            backends.forEach(backend => {
                const card = document.createElement('div');
                card.className = 'backend-card';
                card.onclick = () => showBackendDetails(backend);
                const statusColors = { 'production': '#10b981', 'deprecated': '#ef4444', 'development': '#f59e0b' };
                const statusColor = statusColors[backend.status] || '#6b7280';
                card.innerHTML = `
                    <div class="backend-header">
                        <div>
                            <div class="backend-name">${backend.backendname}</div>
                            <div class="backend-description">${backend.description || 'No description'}</div>
                        </div>
                        <div class="backend-stats">
                            <div class="stat-number">${backend.frontendCount}</div>
                            <div class="stat-label">Frontends</div>
                        </div>
                    </div>
                    <div class="backend-meta">
                        <span class="meta-badge" style="background:${statusColor};">${backend.status}</span>
                        <span class="meta-badge" style="background:#0891b2;">${backend.version}</span>
                        <span class="meta-badge" style="background:#d97706;">Quota: ${backend.quota || 'Unknown'}</span>
                    </div>
                    <div class="url-text">${backend.backendurl || 'URL not available'}</div>`;
                grid.appendChild(card);
            });
        }

        function showBackendDetails(backend) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            const frontendsList = backend.frontends && backend.frontends.length > 0
                ? backend.frontends.map(fe => `<div style="background:#f9fafb; padding:10px 14px; border-radius:4px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;"><span style="font-weight:600; color:#1e293b;">${fe.name}</span><span style="background:${PORTAL_COLORS[fe.portal] || '#6b7280'}; color:white; padding:4px 10px; border-radius:4px; font-size:0.75rem; font-weight:600; margin-left:8px;">${fe.portal}</span></div>`).join('')
                : '<p style="color:#9ca3af; text-align:center;">No frontends use this backend</p>';
            modal.innerHTML = `
                <div style="background:white; border-radius:4px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                    <h2 style="margin:0 0 8px 0; color:#1e40af;">${backend.backendname}</h2>
                    <p style="color:#6b7280; margin-bottom:20px;">${backend.description || ''}</p>
                    <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px;">
                        <div><strong style="color:#374151;">Version:</strong> <span style="color:#6b7280;">${backend.version}</span></div>
                        <div><strong style="color:#374151;">Status:</strong> <span style="color:#6b7280;">${backend.status}</span></div>
                        <div><strong style="color:#374151;">Quota:</strong> <span style="color:#6b7280;">${backend.quota || 'Unknown'}</span></div>
                        <div><strong style="color:#374151;">Frontends:</strong> <span style="color:#6b7280;">${backend.frontendCount}</span></div>
                    </div>
                    <div style="background:#f9fafb; padding:12px; border-radius:4px; font-family:monospace; font-size:0.75rem; color:#4b5563; word-break:break-all; margin-bottom:20px;">${backend.backendurl || 'URL not available'}</div>
                    <strong style="display:block; margin-bottom:14px; color:#374151;">Dependent Frontends (${backend.frontendCount}):</strong>
                    ${frontendsList}
                    <button onclick="this.closest('.modal-overlay').remove()" style="margin-top:16px; width:100%; padding:12px; background:#1e40af; color:white; border:none; border-radius:4px; font-weight:600; cursor:pointer; font-family:inherit;">Close</button>
                </div>`;
            document.body.appendChild(modal);
        }

        function renderFrontendDeps(frontends) {
            const grid = document.getElementById('frontends-grid');
            if (!grid) return;
            grid.innerHTML = '';
            if (!frontends || frontends.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:rgba(255,255,255,0.4);">No frontends found.</p>';
                return;
            }
            frontends.forEach(frontend => {
                const card = document.createElement('div');
                card.className = 'backend-card';
                card.onclick = () => showFrontendDetails(frontend);
                const portalColor = PORTAL_COLORS[frontend.portal?.toLowerCase()] || '#6b7280';
                card.innerHTML = `
                    <div class="backend-header">
                        <div>
                            <div class="backend-name">${frontend.frontend}</div>
                            <div class="backend-description">${frontend.portal} Portal Module</div>
                        </div>
                        <div class="backend-stats">
                            <div class="stat-number">${frontend.backendCount}</div>
                            <div class="stat-label">Backends</div>
                        </div>
                    </div>
                    <div class="backend-meta">
                        <span class="meta-badge" style="background:${portalColor};">${frontend.portal}</span>
                        ${frontend.backends.slice(0, 2).map(b => `<span class="meta-badge" style="background:rgba(165,180,252,0.3); border:1px solid rgba(165,180,252,0.4); font-size:0.72rem;">${b}</span>`).join('')}
                        ${frontend.backends.length > 2 ? `<span class="meta-badge" style="background:#6b7280; font-size:0.72rem;">+${frontend.backends.length - 2} more</span>` : ''}
                    </div>`;
                grid.appendChild(card);
            });
        }

        function showFrontendDetails(frontend) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            const backendsHTML = frontend.backends.length > 0
                ? frontend.backends.map(b => `<div style="background:#f9fafb; padding:10px 14px; border-radius:4px; margin-bottom:8px; font-weight:600; color:#1e293b;">${b}</div>`).join('')
                : '<p style="color:#9ca3af; text-align:center;">No backend dependencies</p>';
            modal.innerHTML = `
                <div style="background:white; border-radius:4px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                    <h2 style="margin:0 0 8px 0; color:#1e40af;">${frontend.frontend}</h2>
                    <p style="color:#6b7280; margin-bottom:20px;">${frontend.portal} Portal Module</p>
                    <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px;">
                        <div><strong style="color:#374151;">Portal:</strong> <span style="color:#6b7280;">${frontend.portal}</span></div>
                        <div><strong style="color:#374151;">Dependencies:</strong> <span style="color:#6b7280;">${frontend.backendCount}</span></div>
                    </div>
                    <strong style="display:block; margin-bottom:14px; color:#374151;">Backend Dependencies (${frontend.backendCount}):</strong>
                    ${backendsHTML}
                    <button onclick="this.closest('.modal-overlay').remove()" style="margin-top:16px; width:100%; padding:12px; background:#1e40af; color:white; border:none; border-radius:4px; font-weight:600; cursor:pointer; font-family:inherit;">Close</button>
                </div>`;
            document.body.appendChild(modal);
        }

        function renderURLReference(backends) {
            const container = document.getElementById('url-reference');
            if (!container) return;
            container.innerHTML = `
                <div class="section-title">&#128279; Quick URL Reference</div>
                <p class="section-desc">All backend URLs. Click to copy.</p>`;
            if (!backends || backends.length === 0) {
                container.innerHTML += '<p style="text-align:center; color:rgba(255,255,255,0.4);">No backend URLs available.</p>';
                return;
            }
            const urlList = document.createElement('div');
            urlList.style.cssText = 'display:flex; flex-direction:column; gap:14px;';
            backends.forEach(backend => {
                const urlCard = document.createElement('div');
                urlCard.style.cssText = 'background:rgba(255,255,255,0.08); padding:18px; border-radius:2px; border:1px solid rgba(255,255,255,0.15); transition:all 0.2s; cursor:pointer;';
                urlCard.onmouseover = () => { urlCard.style.background = 'rgba(255,255,255,0.12)'; urlCard.style.borderColor = 'rgba(255,255,255,0.3)'; };
                urlCard.onmouseout = () => { urlCard.style.background = 'rgba(255,255,255,0.08)'; urlCard.style.borderColor = 'rgba(255,255,255,0.15)'; };
                urlCard.onclick = () => copyToClipboard(backend.backendurl, backend.backendname);
                urlCard.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">
                        <div>
                            <strong style="color:white;">${backend.backendname}</strong>
                            <div style="color:rgba(255,255,255,0.55); font-size:0.85rem; margin-top:4px;">${backend.description}</div>
                        </div>
                        <span style="background:#0891b2; color:white; padding:4px 10px; border-radius:4px; font-size:0.75rem; white-space:nowrap; margin-left:12px; font-weight:600;">${backend.version}</span>
                    </div>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:2px; font-family:monospace; font-size:0.72rem; color:rgba(255,255,255,0.6); word-break:break-all;">${backend.backendurl}</div>
                    <div style="margin-top:8px; font-size:0.75rem; color:rgba(255,255,255,0.35);">Click to copy URL</div>`;
                urlList.appendChild(urlCard);
            });
            container.appendChild(urlList);
        }

        function copyToClipboard(text, name) {
            navigator.clipboard.writeText(text).then(() => { showToast(name + ' URL copied!'); }).catch(() => { showToast('Failed to copy'); });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed; bottom:30px; right:30px; background:rgba(30,58,138,0.95); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2); color:white; padding:14px 22px; border-radius:2px; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:10000; animation:slideIn 0.3s ease;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideOut 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 2000);
        }

        function renderSystemMap(data) {
            const container = document.getElementById('system-map');
            if (!container) return;
            container.innerHTML = `
                <div class="section-title">&#128506; System Architecture Map</div>
                <p class="section-desc">Visual overview of system dependencies.</p>`;
            if (!data || !data.summary) {
                container.innerHTML += '<p style="text-align:center; color:rgba(255,255,255,0.4);">No system data available.</p>';
                return;
            }
            const statsGrid = document.createElement('div');
            statsGrid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px;';
            const stats = [
                { label: 'Total Backends', value: data.summary.totalBackends, color: '#a5b4fc' },
                { label: 'Total Frontends', value: data.summary.totalFrontends, color: '#6ee7b7' },
                { label: 'Active Backends', value: data.summary.activeBackends, color: '#6ee7b7' },
                { label: 'Deprecated', value: data.summary.deprecatedBackends, color: '#fca5a5' }
            ];
            stats.forEach(stat => {
                const statCard = document.createElement('div');
                statCard.style.cssText = 'background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:2px; padding:20px; text-align:center;';
                statCard.innerHTML = `
                    <div style="font-size:2rem; font-weight:700; color:${stat.color}; margin-bottom:6px;">${stat.value}</div>
                    <div style="color:rgba(255,255,255,0.6); font-size:0.85rem;">${stat.label}</div>`;
                statsGrid.appendChild(statCard);
            });
            container.appendChild(statsGrid);
            if (data.summary.mostUsedBackend) {
                const mostUsed = document.createElement('div');
                mostUsed.style.cssText = 'background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-left:4px solid #a5b4fc; padding:22px; border-radius:2px;';
                mostUsed.innerHTML = `
                    <div style="font-size:1.1rem; font-weight:600; color:white; margin-bottom:8px;">Most Used Backend</div>
                    <div style="font-size:1.4rem; font-weight:700; color:#a5b4fc; margin-bottom:4px;">${data.summary.mostUsedBackend.backendname} ${data.summary.mostUsedBackend.version}</div>
                    <div style="color:rgba(255,255,255,0.6);">Used by ${data.summary.mostUsedBackend.frontendCount} frontend modules</div>`;
                container.appendChild(mostUsed);
            }
        }

        function setupSearch() {
            const backendSearch = document.getElementById('backend-search');
            const frontendSearch = document.getElementById('frontend-search');
            if (backendSearch) backendSearch.addEventListener('input', (e) => filterCards('backends-grid', e.target.value));
            if (frontendSearch) frontendSearch.addEventListener('input', (e) => filterCards('frontends-grid', e.target.value));
        }

        function filterCards(gridId, searchTerm) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            const term = searchTerm.toLowerCase();
            grid.querySelectorAll('.backend-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadSystemDependencies();
        });
    </script>
</body>
</html>
