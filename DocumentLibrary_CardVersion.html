<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Document Library - Lake Illawong</title>

    <!-- VerificationModal V1.0 -->
    <script src="VerificationModal_V1_0.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hidden { display: none !important; }

        /* ============================================================
           HEADER
        ============================================================ */
        .header {
            background: transparent;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
        }

        .header-text {
            text-align: left;
        }

        .header-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%, transparent 100%);
            border-radius: 2px;
            margin-top: 15px;
        }

        /* ============================================================
           TOP BAR (back button + user info)
        ============================================================ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s;
            backdrop-filter: blur(10px);
            min-height: 44px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .user-info-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-info-text {
            font-size: 0.9rem;
        }

        .user-info-text strong {
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.2s;
            min-height: 44px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ============================================================
           SEARCH BAR
        ============================================================ */
        .search-section {
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            min-height: 44px;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 2px;
            display: none;
        }

        .search-clear:hover {
            color: white;
        }

        /* ============================================================
           LOADING STATE
        ============================================================ */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.8);
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================================
           CATEGORY GRID VIEW (default landing)
        ============================================================ */

        /* Quick Access strip */
        .quick-access-section {
            margin-bottom: 30px;
        }

        .section-label {
            color: rgba(255,255,255,0.85);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .quick-access-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .quick-card {
            background: linear-gradient(135deg, rgba(251,191,36,0.2) 0%, rgba(245,158,11,0.15) 100%);
            border: 1px solid rgba(251,191,36,0.4);
            border-radius: 2px;
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 44px;
        }

        .quick-card:hover {
            background: linear-gradient(135deg, rgba(251,191,36,0.3) 0%, rgba(245,158,11,0.25) 100%);
            border-color: rgba(251,191,36,0.6);
            transform: translateY(-1px);
        }

        .quick-card-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .quick-card-title {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Category grid */
        .categories-section {
            margin-bottom: 20px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .category-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 2px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .category-card:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .category-card.all-docs {
            border-style: dashed;
            border-color: rgba(255,255,255,0.25);
        }

        .category-icon {
            font-size: 2rem;
        }

        .category-name {
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        /* ============================================================
           DRILL-DOWN (document list inside a category / search results)
        ============================================================ */
        .drill-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .drill-back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s;
            min-height: 44px;
        }

        .drill-back-btn:hover {
            background: rgba(255,255,255,0.18);
        }

        .drill-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .drill-count {
            color: rgba(255,255,255,0.65);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Desktop list */
        .doc-list-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .doc-list-header {
            display: grid;
            grid-template-columns: 1fr 160px 50px;
            gap: 15px;
            padding: 13px 20px;
            background: rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .doc-list-header-cell {
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .doc-row {
            display: grid;
            grid-template-columns: 1fr 160px 50px;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.15s;
            align-items: center;
        }

        .doc-row:last-child {
            border-bottom: none;
        }

        .doc-row:hover {
            background: rgba(255,255,255,0.08);
        }

        .doc-row-title {
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .doc-row-desc {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            margin-top: 3px;
            line-height: 1.3;
        }

        .doc-row-category {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        .doc-row-type {
            font-size: 1.3rem;
            text-align: center;
        }

        /* Mobile card list (inside drill-down) */
        .mobile-doc-list {
            display: none;
        }

        .mobile-doc-item {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .mobile-doc-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .mobile-doc-item-title {
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .mobile-doc-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.65);
            font-size: 0.82rem;
            gap: 10px;
        }

        .mobile-doc-item-desc {
            color: rgba(255,255,255,0.55);
            font-size: 0.8rem;
            margin-top: 5px;
            line-height: 1.3;
        }

        /* Empty states */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.7);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .empty-state h3 {
            color: rgba(255,255,255,0.9);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        /* ============================================================
           SEARCH RESULTS label
        ============================================================ */
        .search-results-label {
            color: rgba(255,255,255,0.75);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .search-results-label strong {
            color: white;
        }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 12px;
            }

            .header-text {
                text-align: center;
            }

            .header-title {
                font-size: 1.6rem;
            }

            .logo-image {
                width: 70px;
                height: 70px;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .user-info-bar {
                justify-content: space-between;
            }

            .quick-access-grid {
                grid-template-columns: 1fr 1fr;
            }

            .category-grid {
                grid-template-columns: 1fr 1fr;
            }

            /* Hide desktop list, show mobile items */
            .doc-list-container {
                display: none;
            }

            .mobile-doc-list {
                display: block;
            }
        }

        @media (max-width: 420px) {
            .quick-access-grid {
                grid-template-columns: 1fr;
            }

            .category-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container" id="mainContent" style="display:none;">

    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
            <div class="header-text">
                <div class="header-title">📚 Document Library</div>
                <div class="header-subtitle">Lake Illawong Residential Club</div>
            </div>
        </div>
        <div class="header-divider"></div>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="back-btn" onclick="goBackToPortal()">← Back to Portal</button>
        <div class="user-info-bar">
            <div class="user-info-text">
                Welcome, <strong id="userName">–</strong> &nbsp;|&nbsp; Unit <strong id="userUnit">–</strong>
            </div>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-section">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text"
                   id="searchInput"
                   class="search-input"
                   placeholder="Search all documents..."
                   oninput="handleSearch(this.value)">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Loading documents...</p>
    </div>

    <!-- ============================================================
         CATEGORY GRID VIEW (default)
    ============================================================ -->
    <div id="categoryView" class="hidden">

        <!-- Quick Access -->
        <div class="quick-access-section" id="quickAccessSection">
            <div class="section-label">⭐ Quick Access</div>
            <div class="quick-access-grid" id="quickAccessGrid"></div>
        </div>

        <!-- Category Cards -->
        <div class="categories-section">
            <div class="section-label">Browse by Category</div>
            <div class="category-grid" id="categoryGrid"></div>
        </div>

    </div>

    <!-- ============================================================
         DRILL-DOWN / SEARCH RESULTS VIEW
    ============================================================ -->
    <div id="drillView" class="hidden">

        <!-- Drill header -->
        <div class="drill-header">
            <button class="drill-back-btn" onclick="backToCategories()">← All Categories</button>
            <div>
                <div class="drill-title" id="drillTitle"></div>
                <div class="drill-count" id="drillCount"></div>
            </div>
        </div>

        <!-- Search results label (shown only in search mode) -->
        <div id="searchResultsLabel" class="search-results-label hidden"></div>

        <!-- Desktop list -->
        <div class="doc-list-container" id="docListContainer">
            <div class="doc-list-header">
                <div class="doc-list-header-cell">Document</div>
                <div class="doc-list-header-cell">Category</div>
                <div class="doc-list-header-cell" style="text-align:center;">Type</div>
            </div>
            <div id="docListBody"></div>
        </div>

        <!-- Mobile card list -->
        <div class="mobile-doc-list" id="mobileDocList"></div>

        <!-- Empty state -->
        <div id="drillEmpty" class="empty-state hidden">
            <div class="empty-state-icon">📭</div>
            <h3>No documents found</h3>
            <p>Try a different search term</p>
        </div>

    </div>

</div><!-- /mainContent -->

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
    DOCLIB_API:  'https://script.google.com/macros/s/AKfycbxH9YUs18W2euFxGUcIJU_zRmlDuxT-Glo5-MJfNErFzD0cL2ICm8__xBgnrNizB94/exec',
    SESSION_KEY: 'lakeIllawongVerified',
    PORTAL_URL:  'ResidentPortal_V2_0.html'
};

// ============================================================
// QUICK ACCESS CONFIG
// Populate with DocumentIDs from your sheet.
// Each entry: { id: 'DOC-xxx', icon: '📄', label: 'Short name' }
// Leave array empty to hide the Quick Access section entirely.
// ============================================================
const QUICK_ACCESS = [
    // Examples — replace with real DocumentIDs once library is populated:
     { id: 'DOC-001', icon: '🚨', label: 'Pool Rules' },
    // { id: 'DOC-002', icon: '🔊', label: 'Noise & Amenity Rules' },
    // { id: 'DOC-003', icon: '🏊', label: 'Pool / Facilities Rules' },
    // { id: 'DOC-004', icon: '📋', label: 'Latest AGM Minutes' },
];

// ============================================================
// CATEGORY ICONS
// Maps category names (as stored in sheet) to an emoji.
// Add entries here to customise icons for your categories.
// Fallback: 📁
// ============================================================
const CATEGORY_ICONS = {
    'AGM Documents':        '🏛️',
    'By-Laws & Rules':      '📜',
    'Policies & By-Laws':   '📜',
    'Maintenance Guides':   '🔧',
    'Newsletters':          '📰',
    'Minutes & Reports':    '📋',
    'Forms & Applications': '📝',
    'Emergency':            '🚨',
    'Facilities':           '🏊',
    'Financial':            '💰',
    'Social Events':        '🎉',
    'Health & Safety':      '⛑️',
    'Village Information':  '🏘️',
    'Uncategorized':        '📁',
};

// ============================================================
// STATE
// ============================================================
let allDocuments    = [];
let currentUserData = null;
let currentCategory = null; // null = grid view, string = drill-down, 'SEARCH' = search results
let searchTimeout   = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function () {
    // Show body (was hidden to prevent flash)
    document.body.style.display = '';

    const alreadyVerified = VerificationModal.init({
        moduleName: 'Document Library',
        moduleIcon: '📚',
        sessionKey:  CONFIG.SESSION_KEY,
        onSuccess:   handleVerificationSuccess
    });

    if (!alreadyVerified) {
        VerificationModal.show();
    }
});

function handleVerificationSuccess(userData) {
    currentUserData = userData;
    document.getElementById('userName').textContent = userData.name;
    document.getElementById('userUnit').textContent = userData.unit;
    document.getElementById('mainContent').style.display = 'block';
    loadDocuments();
}

// ============================================================
// DATA LOAD
// ============================================================
async function loadDocuments() {
    showLoading(true);

    try {
        // Public documents
        const pubResp = await callAPI('getDocuments', {
            userRoles:   currentUserData.roleTags,
            accessLevel: 'PUBLIC'
        });

        const publicDocs = (pubResp.success && pubResp.documents) ? pubResp.documents : [];

        // Private documents (best-effort — don't fail page if unavailable)
        let privateDocs = [];
        try {
            const privResp = await callAPI('getDocuments', {
                userRoles:   currentUserData.roleTags,
                accessLevel: 'PRIVATE'
            });
            if (privResp.success && privResp.documents) {
                privateDocs = privResp.documents;
            }
        } catch (e) {
            console.warn('Could not load private documents:', e);
        }

        allDocuments = [...publicDocs, ...privateDocs];

        showLoading(false);
        renderCategoryView();

    } catch (err) {
        console.error('loadDocuments error:', err);
        document.getElementById('loadingState').innerHTML =
            '<p style="color:rgba(255,255,255,0.9);font-size:1rem;">Failed to load documents. Please refresh the page.</p>';
    }
}

// ============================================================
// CATEGORY GRID VIEW
// ============================================================
function renderCategoryView() {
    currentCategory = null;

    // Ensure search is cleared when returning to grid
    const searchEl = document.getElementById('searchInput');
    if (searchEl.value) {
        // Keep search value but switch view
    }

    showView('categoryView');

    // Quick Access
    renderQuickAccess();

    // Build category map
    const catMap = {}; // category -> [docs]
    allDocuments.forEach(doc => {
        const cat = (doc.category || 'Uncategorized').trim();
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(doc);
    });

    const grid = document.getElementById('categoryGrid');
    const sortedCats = Object.keys(catMap).sort();

    let html = '';

    // One card per category
    sortedCats.forEach(cat => {
        const icon = CATEGORY_ICONS[cat] || '📁';
        html += `
            <div class="category-card" onclick="drillIntoCategory('${escHtml(cat)}')">
                <div class="category-icon">${icon}</div>
                <div class="category-name">${escHtml(cat)}</div>
            </div>
        `;
    });

    // "All Documents" card — always present
    html += `
        <div class="category-card all-docs" onclick="drillIntoCategory('__ALL__')">
            <div class="category-icon">📚</div>
            <div class="category-name">All Documents</div>
        </div>
    `;

    grid.innerHTML = html;
}

function renderQuickAccess() {
    const section = document.getElementById('quickAccessSection');
    const grid    = document.getElementById('quickAccessGrid');

    // Filter QUICK_ACCESS list to only items that actually exist in allDocuments
    const validItems = QUICK_ACCESS.filter(qa =>
        allDocuments.some(d => d.documentId === qa.id)
    );

    if (validItems.length === 0) {
        section.classList.add('hidden');
        return;
    }

    section.classList.remove('hidden');

    grid.innerHTML = validItems.map(qa => {
        const doc = allDocuments.find(d => d.documentId === qa.id);
        return `
            <div class="quick-card" onclick="openDocument('${escHtml(doc.documentId)}', '${escHtml(doc.sourceType)}', '${escHtml(doc.sourceLocation || '')}', '${escHtml(doc.title)}')">
                <div class="quick-card-icon">${qa.icon}</div>
                <div class="quick-card-title">${qa.label || escHtml(doc.title)}</div>
            </div>
        `;
    }).join('');
}

// ============================================================
// DRILL-DOWN VIEW
// ============================================================
function drillIntoCategory(category) {
    currentCategory = category;

    // Clear search when drilling by category
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').style.display = 'none';

    const docs = category === '__ALL__'
        ? [...allDocuments]
        : allDocuments.filter(d => (d.category || 'Uncategorized').trim() === category);

    const label = category === '__ALL__' ? 'All Documents' : category;
    renderDrillView(docs, label, false);
}

function backToCategories() {
    currentCategory = null;

    // Clear search
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').style.display = 'none';
    document.getElementById('searchResultsLabel').classList.add('hidden');

    renderCategoryView();
}

function renderDrillView(docs, title, isSearch) {
    showView('drillView');

    document.getElementById('drillTitle').textContent = title;
    document.getElementById('drillCount').textContent =
        docs.length === 0 ? 'No documents' :
        docs.length === 1 ? '1 document' :
        docs.length + ' documents';

    const searchLabel = document.getElementById('searchResultsLabel');
    if (isSearch) {
        searchLabel.classList.remove('hidden');
        searchLabel.innerHTML = 'Showing results across all categories for <strong>' + escHtml(title) + '</strong>';
    } else {
        searchLabel.classList.add('hidden');
    }

    if (docs.length === 0) {
        document.getElementById('docListContainer').classList.add('hidden');
        document.getElementById('mobileDocList').innerHTML = '';
        document.getElementById('drillEmpty').classList.remove('hidden');
        return;
    }

    document.getElementById('drillEmpty').classList.add('hidden');
    document.getElementById('docListContainer').classList.remove('hidden');

    const typeIcons = { 'Drive': '📄', 'Link': '🔗', 'Physical': '📦' };

    // Desktop list rows
    const listHTML = docs.map(doc => `
        <div class="doc-row" onclick="openDocument('${escHtml(doc.documentId)}', '${escHtml(doc.sourceType)}', '${escHtml(doc.sourceLocation || '')}', '${escHtml(doc.title)}')">
            <div>
                <div class="doc-row-title">${escHtml(doc.title)}</div>
                ${doc.description ? `<div class="doc-row-desc">${escHtml(doc.description)}</div>` : ''}
            </div>
            <div class="doc-row-category">${escHtml(doc.category || 'Uncategorized')}</div>
            <div class="doc-row-type">${typeIcons[doc.sourceType] || '📄'}</div>
        </div>
    `).join('');
    document.getElementById('docListBody').innerHTML = listHTML;

    // Mobile items
    const mobileHTML = docs.map(doc => `
        <div class="mobile-doc-item" onclick="openDocument('${escHtml(doc.documentId)}', '${escHtml(doc.sourceType)}', '${escHtml(doc.sourceLocation || '')}', '${escHtml(doc.title)}')">
            <div class="mobile-doc-item-title">${escHtml(doc.title)}</div>
            ${doc.description ? `<div class="mobile-doc-item-desc">${escHtml(doc.description)}</div>` : ''}
            <div class="mobile-doc-item-meta">
                <span>${escHtml(doc.category || 'Uncategorized')}</span>
                <span>${typeIcons[doc.sourceType] || '📄'}</span>
            </div>
        </div>
    `).join('');
    document.getElementById('mobileDocList').innerHTML = mobileHTML;
}

// ============================================================
// SEARCH — always across all documents
// ============================================================
function handleSearch(value) {
    const q = value.trim().toLowerCase();

    // Toggle clear button
    document.getElementById('searchClear').style.display = q ? 'block' : 'none';

    clearTimeout(searchTimeout);

    if (!q) {
        // Return to wherever the user was
        if (currentCategory && currentCategory !== 'SEARCH') {
            // Re-render the category they were in
            drillIntoCategory(currentCategory);
        } else {
            renderCategoryView();
        }
        return;
    }

    searchTimeout = setTimeout(function () {
        const results = allDocuments.filter(doc => {
            const haystack = [
                doc.title,
                doc.category,
                doc.description,
                doc.tags
            ].join(' ').toLowerCase();
            return haystack.includes(q);
        });

        currentCategory = 'SEARCH';
        renderDrillView(results, value.trim(), true);
    }, 250);
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').style.display = 'none';
    handleSearch('');
}

// ============================================================
// OPEN DOCUMENT
// ============================================================
function openDocument(documentId, sourceType, sourceLink, title) {
    if (sourceType === 'Drive' && sourceLink) {
        const url = sourceLink.startsWith('http')
            ? sourceLink
            : 'https://drive.google.com/file/d/' + sourceLink + '/view';
        window.open(url, '_blank');
    } else if (sourceType === 'Link' && sourceLink) {
        window.open(sourceLink, '_blank');
    } else if (sourceType === 'Physical') {
        alert('📦 Physical Document\n\n"' + title + '"\n\nThis is a physical document stored at the management office. Please contact management for access.');
    } else {
        alert('Unable to open this document. Please contact management.');
    }
}

// ============================================================
// NAVIGATION & AUTH
// ============================================================
function goBackToPortal() {
    // Respect ?portal= parameter for correct back-button routing
    const params = new URLSearchParams(window.location.search);
    const portal = params.get('portal');
    if (portal) {
        window.location.href = portal;
    } else {
        window.location.href = CONFIG.PORTAL_URL;
    }
}

function logout() {
    if (confirm('Are you sure you want to log out?')) {
        VerificationModal.clearVerification();
        location.reload();
    }
}

// ============================================================
// VIEW SWITCHER
// ============================================================
function showLoading(show) {
    document.getElementById('loadingState').style.display = show ? 'block' : 'none';
    document.getElementById('categoryView').classList.add('hidden');
    document.getElementById('drillView').classList.add('hidden');
}

function showView(viewId) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('categoryView').classList.toggle('hidden', viewId !== 'categoryView');
    document.getElementById('drillView').classList.toggle('hidden', viewId !== 'drillView');
}

// ============================================================
// JSONP API HELPER
// ============================================================
function callAPI(action, params) {
    return new Promise(function (resolve, reject) {
        const cbName = 'docLibCb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        let script;

        const timeoutId = setTimeout(function () {
            cleanup();
            reject(new Error('Request timeout'));
        }, 30000);

        function cleanup() {
            clearTimeout(timeoutId);
            delete window[cbName];
            if (script && script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function (response) {
            cleanup();
            resolve(response);
        };

        const url = new URL(CONFIG.DOCLIB_API);
        url.searchParams.append('action',   action);
        url.searchParams.append('callback', cbName);
        url.searchParams.append('data',     JSON.stringify(params));

        script = document.createElement('script');
        script.src = url.toString();
        script.onerror = function () {
            cleanup();
            reject(new Error('Network request failed'));
        };
        document.head.appendChild(script);
    });
}

// ============================================================
// UTILITY
// ============================================================
function escHtml(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = String(text);
    return d.innerHTML;
}
