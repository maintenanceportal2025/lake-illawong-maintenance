<!--
=====================================================================
ComplaintStatus.html - RESIDENT COMPLAINT STATUS LOOKUP
=====================================================================
DOCUMENT INFORMATION:
  File Name:        ComplaintStatus.html
  System:           Lake Illawong Management Central System
  Component Type:   Resident Module
  Frontend Version: V1.0.0
  Backend:          ComplaintsManager V1.1
  Status:           PRODUCTION
  Created:          May 2026
  Last Modified:    May 2026

VERSION HISTORY:
  V1.0.0 (May 2026): Initial release.
    OTP verification via VerificationModal_V1_0.js.
    On verification, unit number from session used to call
    getComplaintsByUnit — no manual reference number entry required.
    Displays all complaints for the verified resident, newest first.
    Shows status, category, submitted date, response due date,
    and Board response text if recorded.
    internalNotes never shown to resident (stripped by backend).
    Empty state handled — message shown if no complaints on file.
    Back to Resident Portal button.

AUTHENTICATION:
  OTP via VerificationModal_V1_0.js
  Session Key: lakeIllawongVerified
  Shared session with ComplaintForm.html and ResidentDirectory.html

SYSTEM CONNECTIONS:
  Backend: ComplaintsManager V1.1
  Action:  getComplaintsByUnit
  URL:     CONFIG.BACKEND_URL

PORTAL:
  Accessed from ResidentPortal.html
  Back button returns to ResidentPortal.html

TECHNICAL:
  Technology:   HTML5 + CSS3 + Vanilla JavaScript
  API Protocol: JSONP
  Design System: Lake Illawong Unified Design System v1.4
  Hosting:      Netlify
=====================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints - Lake Illawong</title>

    <script src="VerificationModal_V1_0.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header - matches ComplaintForm.html exactly */
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Content card - matches ComplaintForm.html exactly */
        .content-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        /* Back button - matches ComplaintForm.html exactly */
        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Section heading inside card */
        .section-heading {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        /* Loading state */
        .loading-panel {
            text-align: center;
            padding: 30px 0;
            color: rgba(255,255,255,0.8);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-panel {
            background: rgba(14, 165, 233, 0.15);
            border-left: 3px solid rgba(14, 165, 233, 0.6);
            border-radius: 2px;
            padding: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Error state */
        .error-panel {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid rgba(239, 68, 68, 0.6);
            border-radius: 2px;
            padding: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Complaint cards */
        .complaint-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            padding: 20px;
            margin-bottom: 16px;
            color: white;
        }

        .complaint-card:last-child {
            margin-bottom: 0;
        }

        .complaint-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .complaint-ref {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }

        .complaint-category {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-top: 4px;
        }

        /* Status pills - system standard colours */
        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-open         { background: #dbeafe; color: #1d4ed8; }
        .status-acknowledged { background: #bbf7d0; color: #047857; }
        .status-responded    { background: #e9d5ff; color: #7c3aed; }
        .status-closed       { background: #f3f4f6; color: #374151; }
        .status-other        { background: rgba(255,255,255,0.2); color: white; }

        /* Complaint meta row */
        .complaint-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .meta-item {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.65);
        }

        .meta-item strong {
            color: rgba(255,255,255,0.85);
        }

        /* Description */
        .complaint-description {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Board response panel */
        .board-response {
            background: rgba(34, 197, 94, 0.12);
            border-left: 3px solid rgba(34, 197, 94, 0.5);
            border-radius: 2px;
            padding: 14px 16px;
            margin-top: 12px;
        }

        .board-response-label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(34, 197, 94, 0.9);
            margin-bottom: 6px;
        }

        .board-response-text {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.88);
            line-height: 1.5;
        }

        /* CAV escalation info */
        .cav-info {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            padding: 16px 20px;
            color: rgba(255,255,255,0.75);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-top: 20px;
        }

        .cav-info strong {
            color: rgba(255,255,255,0.9);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            body { padding: 0; }
            .container { padding: 0; }
            .header { padding: 15px; margin-bottom: 15px; }
            .header h1 { font-size: 1.4rem; }
            .logo { width: 60px; height: 60px; }
            .logo-section { flex-direction: column; gap: 10px; }
            .content-card { padding: 20px; border-radius: 0; margin-bottom: 0; }
            .complaint-card-header { flex-direction: column; }
            .complaint-meta { gap: 12px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo-section">
        <img src="logo.png" alt="Lake Illawong Logo" class="logo">
        <div>
            <h1>My Complaints</h1>
            <div class="header-subtitle">Lake Illawong Retirement Village</div>
        </div>
    </div>
</div>

<!-- Main content — hidden until verified -->
<div id="mainContent" class="container hidden">

    <div class="content-card">
        <a href="ResidentPortal.html" class="back-btn">&#8592; Back to Resident Portal</a>

        <div class="section-heading" id="sectionHeading">Your Complaints</div>

        <!-- Complaint list — populated by JS -->
        <div id="complaintList">
            <div class="loading-panel">
                <div class="spinner"></div>
                <div>Loading your complaints...</div>
            </div>
        </div>
    </div>

    <!-- CAV escalation info — always shown -->
    <div class="cav-info">
        <strong>Not satisfied with the Board's response?</strong> You may contact Consumer Affairs Victoria
        on <strong>1300 55 81 81</strong> or visit <strong>consumer.vic.gov.au</strong> to escalate your complaint.
    </div>

</div>

<script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const CONFIG = {
        BACKEND_URL:     'https://script.google.com/macros/s/AKfycbwqg6BiKYAhLNfpawCC5d5gS2uuc_IxVmPx_Da6HIXuKgSs5zvxHNP3Kr8_ySFqVSx5BQ/exec',
        SESSION_KEY:     'lakeIllawongVerified'
    };

    let currentUnit = '';

    // =====================================================================
    // INIT
    // =====================================================================
    window.addEventListener('DOMContentLoaded', function () {
        const alreadyVerified = VerificationModal.init({
            moduleName: 'My Complaints',
            moduleIcon: '📋',
            sessionKey: CONFIG.SESSION_KEY,
            onSuccess:  handleVerificationSuccess
        });

        if (!alreadyVerified) {
            VerificationModal.show();
        }
    });

    function handleVerificationSuccess(userData) {
        currentUnit = (userData.unit || '').toString().trim();
        document.getElementById('mainContent').classList.remove('hidden');

        // Personalise heading
        const firstName = (userData.name || '').split(' ')[0];
        if (firstName) {
            document.getElementById('sectionHeading').textContent =
                firstName + "'s Complaints";
        }

        if (!currentUnit) {
            showError('Unit number not found in your session. Please log out and try again.');
            return;
        }

        loadComplaints(currentUnit);
    }

    // =====================================================================
    // JSONP CALL
    // =====================================================================
    function loadComplaints(unit) {
        const callbackName = 'statusCallback_' + Date.now();
        const url = CONFIG.BACKEND_URL
            + '?action=getComplaintsByUnit'
            + '&unit='     + encodeURIComponent(unit)
            + '&callback=' + callbackName;

        const timeout = setTimeout(function () {
            cleanup(callbackName);
            showError('The server did not respond in time. Please try again shortly.');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timeout);
            cleanup(callbackName);
            renderComplaints(data);
        };

        const script   = document.createElement('script');
        script.onerror = function () {
            clearTimeout(timeout);
            cleanup(callbackName);
            showError('Could not reach the server. Please check your connection and try again.');
        };
        script.src = url;
        document.head.appendChild(script);
    }

    function cleanup(callbackName) {
        delete window[callbackName];
    }

    // =====================================================================
    // RENDER
    // =====================================================================
    function renderComplaints(data) {
        const list = document.getElementById('complaintList');

        if (!data.success) {
            showError(data.error || 'An unexpected error occurred.');
            return;
        }

        if (!data.complaints || data.complaints.length === 0) {
            list.innerHTML = `
                <div class="empty-panel">
                    No complaints have been submitted from your unit.
                    If you believe this is incorrect, please contact the Residents Committee.
                </div>`;
            return;
        }

        list.innerHTML = data.complaints.map(function (c) {
            return buildComplaintCard(c);
        }).join('');
    }

    function buildComplaintCard(c) {
        const statusClass = statusPillClass(c.status);
        const submitted   = formatDate(c.submittedAt);
        const responseDue = c.responseDue ? formatDate(c.responseDue) : '';
        const respondedAt = c.respondedAt ? formatDate(c.respondedAt) : '';

        // Meta items — only show non-empty values
        const metaItems = [];
        if (submitted)   metaItems.push('<span class="meta-item">Submitted: <strong>' + submitted + '</strong></span>');
        if (responseDue && c.status !== 'Closed' && c.status !== 'Responded') {
            metaItems.push('<span class="meta-item">Response due: <strong>' + responseDue + '</strong></span>');
        }
        if (respondedAt) metaItems.push('<span class="meta-item">Board responded: <strong>' + respondedAt + '</strong></span>');

        // Board response panel — only if text recorded
        const boardResponseHtml = c.boardResponse
            ? `<div class="board-response">
                   <div class="board-response-label">Board Response</div>
                   <div class="board-response-text">${escHtml(c.boardResponse)}</div>
               </div>`
            : '';

        return `
            <div class="complaint-card">
                <div class="complaint-card-header">
                    <div>
                        <div class="complaint-ref">${escHtml(c.referenceNumber)}</div>
                        <div class="complaint-category">${escHtml(c.category)}</div>
                    </div>
                    <div class="status-pill ${statusClass}">${escHtml(c.status)}</div>
                </div>
                <div class="complaint-meta">
                    ${metaItems.join('')}
                </div>
                <div class="complaint-description">${escHtml(c.description)}</div>
                ${boardResponseHtml}
            </div>`;
    }

    // =====================================================================
    // ERROR STATE
    // =====================================================================
    function showError(message) {
        document.getElementById('complaintList').innerHTML =
            '<div class="error-panel">' + escHtml(message) + '</div>';
    }

    // =====================================================================
    // HELPERS
    // =====================================================================
    function statusPillClass(status) {
        const map = {
            'Open':         'status-open',
            'Acknowledged': 'status-acknowledged',
            'Responded':    'status-responded',
            'Closed':       'status-closed'
        };
        return map[status] || 'status-other';
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;');
    }
</script>
</body>
</html>
