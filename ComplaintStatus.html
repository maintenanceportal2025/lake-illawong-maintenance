<!--
=====================================================================
ComplaintStatus.html - RESIDENT COMPLAINT & DISPUTE STATUS
=====================================================================
DOCUMENT INFORMATION:
  File Name:        ComplaintStatus.html
  System:           Lake Illawong Management Central System
  Component Type:   Resident Module
  Frontend Version: V1.3.0
  Backend:          ComplaintsManager V2.3.35 / DisputesManager V3.0.0
  Status:           PRODUCTION
  Created:          May 2026
  Last Modified:    June 2026

VERSION HISTORY:
  V1.3.0 (Jun 2026): Dispute records added alongside complaints.
    After loading complaints via getComplaintsByUnit (ComplaintsManager),
    also calls getDisputesByUnit (DisputesManager V3.0.0) and renders
    dispute records in a separate section below complaints.
    Dispute cards use teal left-border accent to distinguish from
    complaint cards. Dispute display is read-only: reference number,
    status pill, parties (unit only -- no names shown to parties),
    logged date, review due date, process statement (if sent),
    resolution summary or referral narrative (if applicable).
    Activity Log not shown to residents. unitRole field used to
    personalise display (Party A / Party B label).
    Both sections share the same OTP session (lakeIllawongVerified).
    Page title updated to "My Complaints & Disputes".
    DisputesManager backend URL added to CONFIG.

  V1.2.2 (May 2026): normaliseStatus() added -- maps legacy 'Closed'
    to 'Closed - Resolved' for display. statusPillClass() and
    cardBorderClass() updated to handle both Closed - Resolved and
    Closed - Unresolved. Filter dropdown updated to include both.
    Applies to all complaint cards rendered from sheet data.

  V1.2.1 (May 2026): Board Response display added to expanded card.
    formatBoardResponse() parses timestamp markers and renders
    each entry with date attribution. Read-only -- no editing.

  V1.2.0 (May 2026): Complaint card accordion expand/collapse added.
    Complaint details shown in collapsible panel below card header.
    Status, category, submitted date, response due, Board Response.

  V1.1.0 (May 2026): Print this complaint button added.
    Opens formatted print view in new window.

  V1.0.4 (May 2026): Print function added (Print Register).

  V1.0.2 (May 2026): Initial release with OTP lookup by unit.
    Shows all complaints for the verified unit. Read-only.

AUTHENTICATION:
  STANDALONE OTP within module.
  Session Key: lakeIllawongVerified
  smsOnly: false (email or mobile)
  Shared with: ComplaintForm.html, DocumentLibrary.html,
               ResidentDirectory.html, ResidentDetailsUpdate.html

SYSTEM CONNECTIONS:
  Complaints: ComplaintsManager V2.3.35 — getComplaintsByUnit
  Disputes:   DisputesManager V3.0.0 — getDisputesByUnit
  Auth:       ManagementCentral (via VerificationModal)

PORTAL:
  Launched from ResidentPortal.html ("My Complaints" card).
  Back button returns to ResidentPortal.html.

TECHNICAL:
  Technology:   HTML5 + CSS3 + Vanilla JavaScript
  API Protocol: JSONP (both backends)
  Design:       Glass-morphism — Lake Illawong Unified Design System v2.1
  Hosting:      Netlify
=====================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints & Disputes - Lake Illawong</title>
    <script src="VerificationModal_V1_0.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            color: white;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* ── HEADER ─────────────────────────────────────────────── */
        .header { text-align: center; margin-bottom: 24px; }

        .header-content {
            display: flex; align-items: center;
            justify-content: center; gap: 20px; margin-bottom: 15px;
        }

        .logo-image {
            width: 110px; height: 110px;
            border-radius: 50%; object-fit: cover; flex-shrink: 0;
        }

        .header-text {
            display: flex; flex-direction: column;
            align-items: flex-start; justify-content: center;
        }

        .header-title {
            font-size: 2.2rem; font-weight: 700; color: white;
            margin: 0 0 5px 0; line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle { font-size: 1rem; color: rgba(255,255,255,0.9); font-weight: 500; }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 10%,
                rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%, transparent 100%);
            border-radius: 2px; margin-top: 15px;
        }

        /* ── BACK BUTTON ─────────────────────────────────────────── */
        .portal-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 18px; border-radius: 2px;
            font-size: 0.88rem; font-weight: 600; cursor: pointer;
            display: block; margin: 0 auto 20px auto; transition: background 0.2s;
        }
        .portal-back-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── SECTION HEADING ─────────────────────────────────────── */
        .section-heading {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: rgba(255,255,255,0.55);
            margin: 24px 0 10px; padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .section-heading.disputes { color: #5eead4; border-color: rgba(13,148,136,0.3); }

        /* ── COMPLAINT CARDS ─────────────────────────────────────── */
        .complaint-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-left: 4px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            border-radius: 2px; margin-bottom: 10px; overflow: hidden;
        }

        /* Complaint card border colours */
        .complaint-card.status-open            { border-left: 4px solid #60a5fa; }
        .complaint-card.status-acknowledged    { border-left: 4px solid #10b981; background: rgba(16,185,129,0.2);   backdrop-filter: none; }
        .complaint-card.status-responded       { border-left: 4px solid #a855f7; background: rgba(168,85,247,0.2);   backdrop-filter: none; }
        .complaint-card.status-escalated       { border-left: 4px solid #f97316; background: rgba(249,115,22,0.12);  backdrop-filter: none; }
        .complaint-card.status-closed-resolved { border-left: 4px solid #cbd5e1; background: rgba(203,213,225,0.25); backdrop-filter: none; }
        .complaint-card.status-closed-unresolved { border-left: 4px solid #9ca3af; background: rgba(156,163,175,0.2); backdrop-filter: none; }
        .complaint-card.status-closed-resolved-escalated   { border-left: 4px solid #a78bfa; background: rgba(167,139,250,0.12); backdrop-filter: none; }
        .complaint-card.status-closed-unresolved-escalated { border-left: 4px solid #7c3aed; background: rgba(124,58,237,0.12);  backdrop-filter: none; }

        /* ── DISPUTE CARDS ───────────────────────────────────────── */
        .dispute-card {
            background: rgba(13,148,136,0.08);
            border: 1px solid rgba(13,148,136,0.2);
            border-left: 4px solid rgba(13,148,136,0.5);
            border-radius: 2px; margin-bottom: 10px; overflow: hidden;
        }

        .dispute-card.status-open          { border-left: 4px solid #2dd4bf; }
        .dispute-card.status-under-review  { border-left: 4px solid #fbbf24; background: rgba(251,191,36,0.08); }
        .dispute-card.status-resolved      { border-left: 4px solid #94a3b8; background: rgba(148,163,184,0.15); }
        .dispute-card.status-referred      { border-left: 4px solid #f97316; background: rgba(249,115,22,0.08); }
        .dispute-card.status-closed        { border-left: 4px solid #6b7280; background: rgba(107,114,128,0.15); }

        /* ── SHARED CARD STRUCTURE ───────────────────────────────── */
        .card-summary {
            padding: 13px 16px; display: flex; align-items: center;
            gap: 12px; cursor: pointer; user-select: none; flex-wrap: wrap;
        }
        .card-summary:hover { background: rgba(255,255,255,0.04); }

        .card-ref {
            font-family: monospace; font-size: 0.8rem;
            font-weight: 700; color: rgba(255,255,255,0.6); white-space: nowrap;
        }

        .card-title {
            font-size: 0.92rem; font-weight: 600; color: white;
            flex: 1; min-width: 100px;
        }

        .card-date {
            font-size: 0.78rem; color: rgba(255,255,255,0.45); white-space: nowrap;
        }

        .card-chevron {
            color: rgba(255,255,255,0.4); font-size: 0.85rem;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .complaint-card.expanded .card-chevron,
        .dispute-card.expanded .card-chevron { transform: rotate(180deg); }

        /* ── STATUS PILLS ────────────────────────────────────────── */
        .status-pill {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.4px; white-space: nowrap;
        }

        /* Complaint pills (glass context) */
        .pill-open                       { background: rgba(59,130,246,0.35);  color: #bfdbfe; border: 1px solid rgba(96,165,250,0.6); }
        .pill-acknowledged               { background: rgba(16,185,129,0.3);   color: #6ee7b7; border: 1px solid rgba(52,211,153,0.6); }
        .pill-responded                  { background: rgba(168,85,247,0.35);  color: #e9d5ff; border: 1px solid rgba(168,85,247,0.7); }
        .pill-escalated                  { background: rgba(249,115,22,0.3);   color: #fed7aa; border: 1px solid rgba(249,115,22,0.6); }
        .pill-closed-resolved            { background: rgba(148,163,184,0.25); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.5); }
        .pill-closed-unresolved          { background: rgba(107,114,128,0.3);  color: #d1d5db; border: 1px solid rgba(107,114,128,0.6); }
        .pill-closed-resolved-escalated  { background: rgba(167,139,250,0.2);  color: #c4b5fd; border: 1px solid rgba(167,139,250,0.5); }
        .pill-closed-unresolved-escalated{ background: rgba(124,58,237,0.2);   color: #a78bfa; border: 1px solid rgba(124,58,237,0.5); }

        /* Dispute pills (teal context) */
        .dpill-open         { background: rgba(20,184,166,0.35);  color: #99f6e4; border: 1px solid rgba(45,212,191,0.6); }
        .dpill-under-review { background: rgba(234,179,8,0.3);    color: #fef08a; border: 1px solid rgba(234,179,8,0.6); }
        .dpill-resolved     { background: rgba(148,163,184,0.25); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.5); }
        .dpill-referred     { background: rgba(249,115,22,0.3);   color: #fed7aa; border: 1px solid rgba(249,115,22,0.6); }
        .dpill-closed       { background: rgba(107,114,128,0.3);  color: #d1d5db; border: 1px solid rgba(107,114,128,0.6); }

        /* ── CARD DETAIL ─────────────────────────────────────────── */
        .card-detail {
            display: none; border-top: 1px solid rgba(255,255,255,0.1);
            padding: 14px 16px;
        }
        .complaint-card.expanded .card-detail,
        .dispute-card.expanded .card-detail { display: block; }

        .detail-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px 20px; margin-bottom: 12px;
        }
        .detail-field.full-width { grid-column: 1 / -1; }

        .detail-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: rgba(255,255,255,0.4); margin-bottom: 3px;
        }

        .detail-value {
            font-size: 0.87rem; color: rgba(255,255,255,0.85);
            line-height: 1.5; white-space: pre-wrap;
        }

        /* Board response block */
        .board-response-block {
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: 2px; padding: 10px 12px; margin-top: 10px;
        }
        .board-response-block .detail-label { color: #6ee7b7; }
        .board-response-block .detail-value { white-space: pre-wrap; }

        /* Dispute info block */
        .dispute-info-block {
            background: rgba(13,148,136,0.1);
            border: 1px solid rgba(13,148,136,0.25);
            border-radius: 2px; padding: 10px 12px; margin-top: 10px;
        }
        .dispute-info-block .detail-label { color: #5eead4; }

        /* Dispute type badge */
        .dispute-type-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.3px; margin-bottom: 8px;
            background: rgba(13,148,136,0.25); color: #5eead4;
            border: 1px solid rgba(13,148,136,0.4);
        }

        /* ── BOARD RESPONSE FORMATTING ───────────────────────────── */
        .br-entry { margin-bottom: 10px; white-space: pre-wrap; font-size: 0.87rem; color: rgba(255,255,255,0.85); line-height: 1.5; }
        .br-timestamp { color: rgba(255,255,255,0.45); font-size: 0.78rem; display: block; margin-bottom: 3px; }

        /* ── STATES ──────────────────────────────────────────────── */
        .loading-state, .empty-state {
            text-align: center; padding: 36px 20px;
        }
        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-text { color: rgba(255,255,255,0.65); font-size: 0.88rem; }
        .state-icon { font-size: 2rem; margin-bottom: 8px; }

        /* Dispute empty state */
        .dispute-empty {
            font-size: 0.85rem; color: rgba(255,255,255,0.4);
            padding: 14px 0; font-style: italic;
        }

        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text    { align-items: center; text-align: center; }
            .header-title   { font-size: 1.8rem; }
            .logo-image     { width: 70px; height: 70px; }
            .detail-grid    { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header - system standard -->
    <div class="header">
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
            </div>
            <div class="header-text">
                <h1 class="header-title">My Complaints &amp; Disputes</h1>
                <p class="header-subtitle">Lake Illawong Retirement Village</p>
            </div>
        </div>
        <div class="header-divider"></div>
    </div>

    <!-- Back button -->
    <button class="portal-back-btn" onclick="window.location.href='ResidentPortal.html'">
        &#8592; Back to Resident Portal
    </button>

    <!-- Complaints section -->
    <div class="section-heading">My Complaints</div>
    <div id="complaintList">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="state-text">Loading your complaints...</div>
        </div>
    </div>

    <!-- Disputes section -->
    <div class="section-heading disputes">My Disputes</div>
    <div id="disputeList">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="state-text">Loading dispute records...</div>
        </div>
    </div>

</div>
<script>
    const CONFIG = {
        COMPLAINTS_URL: 'https://script.google.com/macros/s/AKfycbwkD2K1B8hTdMHwXGNajyRr2FBR_abqhWP33rIM7LgkQzIBIPcJsDQhGOvZxXdxuQuiTA/exec',
        DISPUTES_URL:   'https://script.google.com/macros/s/AKfycbx2dwG5mP6Cv-UAqii38FAINvaUvrR2oq-6uv6U_mnKqG8Rzjq56C35lOVHFS9ZsCvw/exec',
        SESSION_KEY:    'lakeIllawongVerified'
    };

    var currentUnit = '';

    // ── AUTH ──────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function () {
        const alreadyVerified = VerificationModal.init({
            moduleName: 'My Complaints & Disputes',
            moduleIcon: '📋',
            sessionKey: CONFIG.SESSION_KEY,
            smsOnly:    false,
            onSuccess:  handleVerificationSuccess
        });
        if (!alreadyVerified) { VerificationModal.show(); }
    });

    function handleVerificationSuccess(userData) {
        currentUnit = (userData.unit || '').trim();
        if (!currentUnit) {
            document.getElementById('complaintList').innerHTML =
                '<div class="empty-state"><div class="state-icon">&#9888;</div><div class="state-text">No unit number found for your account. Please contact the Board.</div></div>';
            document.getElementById('disputeList').innerHTML = '';
            return;
        }
        loadComplaints();
        loadDisputes();
    }

    // ── JSONP HELPER ──────────────────────────────────────────────────────

    function jsonp(backendUrl, params, onSuccess, onError) {
        const callbackName = 'cs_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const qs = Object.keys(params).map(function(k) {
            return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
        }).join('&');
        const url = backendUrl + '?' + qs + '&callback=' + callbackName;

        const timer = setTimeout(function () {
            delete window[callbackName];
            if (onError) onError('Server did not respond. Please try refreshing.');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timer);
            delete window[callbackName];
            if (onSuccess) onSuccess(data);
        };

        const s = document.createElement('script');
        s.onerror = function () {
            clearTimeout(timer);
            delete window[callbackName];
            if (onError) onError('Could not reach the server.');
        };
        s.src = url;
        document.head.appendChild(s);
    }

    // ── LOAD COMPLAINTS ───────────────────────────────────────────────────

    function loadComplaints() {
        jsonp(CONFIG.COMPLAINTS_URL,
            { action: 'getComplaintsByUnit', unit: currentUnit },
            function(data) {
                if (!data.success) {
                    showListError('complaintList', data.error || 'Could not load complaints.');
                    return;
                }
                renderComplaints(data.complaints || []);
            },
            function(err) { showListError('complaintList', err); }
        );
    }

    function renderComplaints(complaints) {
        const list = document.getElementById('complaintList');
        if (complaints.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="state-icon">&#128203;</div><div class="state-text">No complaints found for your unit.</div></div>';
            return;
        }
        list.innerHTML = complaints.map(function(c) { return buildComplaintCard(c); }).join('');
    }

    // ── LOAD DISPUTES ─────────────────────────────────────────────────────

    function loadDisputes() {
        jsonp(CONFIG.DISPUTES_URL,
            { action: 'getDisputesByUnit', unit: currentUnit },
            function(data) {
                if (!data.success) {
                    // Non-fatal -- disputes section may not exist yet
                    document.getElementById('disputeList').innerHTML =
                        '<div class="dispute-empty">No dispute records found for your unit.</div>';
                    return;
                }
                renderDisputes(data.disputes || []);
            },
            function(err) {
                document.getElementById('disputeList').innerHTML =
                    '<div class="dispute-empty">Dispute records unavailable at this time.</div>';
            }
        );
    }

    function renderDisputes(disputes) {
        const list = document.getElementById('disputeList');
        if (disputes.length === 0) {
            list.innerHTML = '<div class="dispute-empty">No dispute records found for your unit.</div>';
            return;
        }
        list.innerHTML = disputes.map(function(d) { return buildDisputeCard(d); }).join('');
    }

    // ── BUILD COMPLAINT CARD ──────────────────────────────────────────────

    function buildComplaintCard(c) {
        const status    = normaliseStatus(c.status);
        const borderCls = complaintCardClass(status);
        const pillCls   = complaintPillClass(status);
        const dateStr   = c.submittedAt ? fmtDate(new Date(c.submittedAt)) : '—';
        const ref       = c.referenceNumber;

        return '<div class="complaint-card ' + borderCls + '" id="cc-' + escHtml(ref) + '">' +
            '<div class="card-summary" onclick="toggleCard(\'cc-\',\'' + escHtml(ref) + '\')">' +
                '<div class="card-ref">' + escHtml(ref) + '</div>' +
                '<div class="card-title">' + escHtml(c.category || '—') + '</div>' +
                '<span class="status-pill ' + pillCls + '">' + escHtml(status) + '</span>' +
                '<div class="card-date">Lodged ' + dateStr + '</div>' +
                '<div class="card-chevron">&#9660;</div>' +
            '</div>' +
            '<div class="card-detail">' +
                buildComplaintDetail(c, status) +
            '</div>' +
        '</div>';
    }

    function buildComplaintDetail(c, status) {
        const dueDateStr = c.responseDue ? fmtDate(new Date(c.responseDue)) : '—';
        const ackDateStr = c.acknowledgedAt ? fmtDate(new Date(c.acknowledgedAt)) : null;
        const resDateStr = c.respondedAt   ? fmtDate(new Date(c.respondedAt))   : null;
        const closeStr   = c.closedAt      ? fmtDate(new Date(c.closedAt))      : null;
        const escStr     = c.escalatedAt   ? fmtDate(new Date(c.escalatedAt))   : null;

        var html = '<div class="detail-grid">';
        html += detailField('Category',    c.category    || '—');
        html += detailField('Submitted',   c.submittedAt ? fmtDateLong(new Date(c.submittedAt)) : '—');
        html += detailField('Respond By',  dueDateStr);
        html += detailField('Status',      status);
        if (ackDateStr) html += detailField('Acknowledged', ackDateStr);
        if (resDateStr) html += detailField('Responded',    resDateStr);
        if (escStr)     html += detailField('Escalated',    escStr);
        if (closeStr)   html += detailField('Closed',       closeStr);
        if (c.description) html += detailField('Your complaint', c.description, true);
        if (c.desiredOutcome) html += detailField('Desired outcome', c.desiredOutcome, true);
        html += '</div>';

        if (c.boardResponse) {
            html += '<div class="board-response-block">' +
                '<div class="detail-label">Board Response</div>' +
                '<div class="detail-value">' + formatBoardResponse(c.boardResponse) + '</div>' +
            '</div>';
        }

        return html;
    }

    // ── BUILD DISPUTE CARD ────────────────────────────────────────────────

    function buildDisputeCard(d) {
        const statusCls = disputeCardClass(d.status);
        const pillCls   = disputePillClass(d.status);
        const dateStr   = d.loggedAt  ? fmtDate(new Date(d.loggedAt))  : '—';
        const dueStr    = d.reviewDue ? fmtDate(new Date(d.reviewDue)) : '—';
        const ref       = d.referenceNumber;

        // Party label -- show "You are Party A" or "Party B" based on unitRole
        const roleLabel = d.unitRole === 'A' ? 'You are Party A' : 'You are Party B';

        return '<div class="dispute-card ' + statusCls + '" id="dc-' + escHtml(ref) + '">' +
            '<div class="card-summary" onclick="toggleCard(\'dc-\',\'' + escHtml(ref) + '\')">' +
                '<div class="card-ref">' + escHtml(ref) + '</div>' +
                '<div class="card-title">Neighbourhood Dispute</div>' +
                '<span class="status-pill ' + pillCls + '">' + escHtml(d.status) + '</span>' +
                '<div class="card-date">Logged ' + dateStr + '</div>' +
                '<div class="card-chevron">&#9660;</div>' +
            '</div>' +
            '<div class="card-detail">' +
                buildDisputeDetail(d, roleLabel, dueStr) +
            '</div>' +
        '</div>';
    }

    function buildDisputeDetail(d, roleLabel, dueStr) {
        var html = '<span class="dispute-type-badge">&#9878; Neighbourhood Dispute</span>';

        html += '<div class="detail-grid">';
        html += detailField('Your role',   roleLabel);
        html += detailField('Status',      d.status || '—');
        html += detailField('Logged',      d.loggedAt  ? fmtDateLong(new Date(d.loggedAt))  : '—');
        html += detailField('Review by',   d.reviewDue ? fmtDateLong(new Date(d.reviewDue)) : '—');
        if (d.acknowledgedAt) html += detailField('Acknowledged', fmtDate(new Date(d.acknowledgedAt)));
        if (d.resolvedAt)     html += detailField('Resolved',     fmtDate(new Date(d.resolvedAt)));
        if (d.referredAt)     html += detailField('Referred to VicAssist', fmtDate(new Date(d.referredAt)));
        if (d.closedAt)       html += detailField('Closed',       fmtDate(new Date(d.closedAt)));
        html += '</div>';

        // Process statement (if sent) -- shown to resident
        if (d.processStatement) {
            html += '<div class="dispute-info-block">' +
                '<div class="detail-label">Board Process Statement</div>' +
                '<div class="detail-value">' + escHtml(d.processStatement) + '</div>' +
            '</div>';
        }

        // Resolution summary (if resolved)
        if (d.resolutionSummary) {
            html += '<div class="dispute-info-block">' +
                '<div class="detail-label">Resolution Summary</div>' +
                '<div class="detail-value">' + escHtml(d.resolutionSummary) + '</div>' +
            '</div>';
        }

        // Referral narrative (if referred to VicAssist)
        if (d.referralNarrative) {
            html += '<div class="dispute-info-block">' +
                '<div class="detail-label">VicAssist Referral — Board Statement</div>' +
                '<div class="detail-value">' + escHtml(d.referralNarrative) + '</div>' +
            '</div>';
        }

        // VicAssist outcome (if closed)
        if (d.vicAssistOutcome) {
            html += '<div class="dispute-info-block">' +
                '<div class="detail-label">VicAssist Outcome</div>' +
                '<div class="detail-value">' + escHtml(d.vicAssistOutcome) + '</div>' +
            '</div>';
        }

        // Explanatory note
        html += '<div style="margin-top:12px;font-size:0.78rem;color:rgba(255,255,255,0.4);line-height:1.5;">' +
            'The Board of Management manages this dispute on behalf of all parties. ' +
            'If you have questions, please contact the Board directly. ' +
            'If the matter remains unresolved after 28 days, the Board is obliged to refer it to ' +
            'VicAssist Retirement Villages for independent conciliation.' +
        '</div>';

        return html;
    }

    // ── UTILITY ───────────────────────────────────────────────────────────

    function toggleCard(prefix, ref) {
        const card = document.getElementById(prefix + ref);
        if (card) card.classList.toggle('expanded');
    }

    function normaliseStatus(status) {
        if (status === 'Closed') return 'Closed - Resolved';
        return status || '—';
    }

    function complaintCardClass(status) {
        const map = {
            'Open':                              'status-open',
            'Acknowledged':                      'status-acknowledged',
            'Responded':                         'status-responded',
            'Escalated':                         'status-escalated',
            'Closed - Resolved':                 'status-closed-resolved',
            'Closed - Unresolved':               'status-closed-unresolved',
            'Closed - Resolved (Escalated)':     'status-closed-resolved-escalated',
            'Closed - Unresolved (Escalated)':   'status-closed-unresolved-escalated'
        };
        return map[status] || 'status-open';
    }

    function complaintPillClass(status) {
        const map = {
            'Open':                              'pill-open',
            'Acknowledged':                      'pill-acknowledged',
            'Responded':                         'pill-responded',
            'Escalated':                         'pill-escalated',
            'Closed - Resolved':                 'pill-closed-resolved',
            'Closed - Unresolved':               'pill-closed-unresolved',
            'Closed - Resolved (Escalated)':     'pill-closed-resolved-escalated',
            'Closed - Unresolved (Escalated)':   'pill-closed-unresolved-escalated'
        };
        return map[status] || 'pill-open';
    }

    function disputeCardClass(status) {
        const map = {
            'Open':                  'status-open',
            'Under Review':          'status-under-review',
            'Resolved':              'status-resolved',
            'Referred to VicAssist': 'status-referred',
            'Closed':                'status-closed'
        };
        return map[status] || 'status-open';
    }

    function disputePillClass(status) {
        const map = {
            'Open':                  'dpill-open',
            'Under Review':          'dpill-under-review',
            'Resolved':              'dpill-resolved',
            'Referred to VicAssist': 'dpill-referred',
            'Closed':                'dpill-closed'
        };
        return map[status] || 'dpill-open';
    }

    function formatBoardResponse(text) {
        if (!text) return '';
        var parts = text.split(/\n\n(?=\[\d{4}-\d{2}-\d{2})/);
        return parts.map(function(part) {
            var clean = part.replace(/\s*\[SENT\]/g, '').trim();
            var lines = clean.split('\n');
            var first = lines[0] || '';
            var rest  = lines.slice(1).join('\n');
            var isHdr = /^\[\d{4}-\d{2}-\d{2} \d{2}:\d{2} \| /.test(first);
            var hdr   = isHdr ? '<span class="br-timestamp">' + escHtml(first) + '</span>' : escHtml(first);
            var body  = rest ? '\n' + escHtml(rest) : '';
            return '<div class="br-entry">' + hdr + body + '</div>';
        }).join('');
    }

    function detailField(label, value, fullWidth) {
        return '<div class="detail-field' + (fullWidth ? ' full-width' : '') + '">' +
            '<div class="detail-label">' + escHtml(label) + '</div>' +
            '<div class="detail-value">' + escHtml(value) + '</div>' +
        '</div>';
    }

    function fmtDate(d) {
        if (!d || isNaN(d)) return '—';
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function fmtDateLong(d) {
        if (!d || isNaN(d)) return '—';
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function escHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function showListError(id, msg) {
        document.getElementById(id).innerHTML =
            '<div class="empty-state"><div class="state-icon">&#9888;</div><div class="state-text">' + escHtml(msg) + '</div></div>';
    }
</script>
</body>
</html>
