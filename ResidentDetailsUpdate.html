<!--
=====================================================================
LAKE ILLAWONG MANAGEMENT CENTRAL SYSTEM - UPDATE MY DETAILS
=====================================================================
PURPOSE: Self-service contact details update for residents
VERSION: 3.3
LAST UPDATED: May 2026
ARCHITECTURE: V5.6

DESIGN SYSTEM: Lake Illawong Unified v2.0
- Background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%)
- Surfaces: Glass panels (rgba(255,255,255,0.08) + backdrop-filter)
- Header: Transparent with logo, white text
- API Protocol: JSONP with proper callback cleanup

AUTHENTICATION: Standalone OTP via VerificationModal_V1_0.js
- VerificationModal.init() fires on DOMContentLoaded
- Session key: lakeIllawongVerified (shared with ResidentDirectory,
  DocumentLibrary, ComplaintForm, ComplaintStatus)
- smsOnly: false
- Verify once per browser session — all shared modules accessible
- onSuccess: handleVerificationSuccess(userData)
  userData contains: name, unit, roleTags (from session or fresh OTP)
  No second verifyIdentity call — userData is sufficient

SECURITY:
- OTP verification via VerificationModal_V1_0.js
- Resident can only update own unit (unit from OTP session)
- Cannot update Stage or Role Tags (admin-controlled)
- Session-based (sessionStorage clears on browser close)

BACKEND DEPENDENCIES:
- ManagementCentral V1.4 (updateContactDetails)
- NotificationServer V3.2.0 (confirmation notifications)

RELATED FILES:
- ResidentPortal.html (navigates here)
- VerificationModal_V1_0.js (OTP component)
- ResidentDirectory.html, DocumentLibrary.html,
  ComplaintForm.html, ComplaintStatus.html (share session)

CHANGE LOG
- V3.3 (May 2026): Full rewrite. Removed multi-step screen flow and
                   second verifyIdentity API call. Now uses userData
                   from VerificationModal session directly, consistent
                   with all other resident portal modules. Glass V2.0
                   design applied throughout.
- V3.2 (May 2026): smsOnly changed to false.
- V3.1 (Mar 2026): Standalone OTP authentication added.
=====================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update My Details - Lake Illawong</title>
    <script src="VerificationModal_V1_0.js"></script>
    <style>
        :root {
            --primary-blue: #667eea;
            --primary-blue-dark: #764ba2;
            --primary-gradient: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            --success-green: #10b981;
            --success-bg: #d1fae5;
            --error-red: #ef4444;
            --error-bg: #fee2e2;
            --glass-bg:           rgba(255, 255, 255, 0.08);
            --glass-bg-hover:     rgba(255, 255, 255, 0.12);
            --glass-bg-strong:    rgba(255, 255, 255, 0.15);
            --glass-border:       rgba(255, 255, 255, 0.15);
            --glass-border-hover: rgba(255, 255, 255, 0.30);
            --glass-blur:         blur(15px);
            --glass-text:         #ffffff;
            --glass-text-muted:   rgba(255, 255, 255, 0.70);
            --glass-text-subtle:  rgba(255, 255, 255, 0.50);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: var(--glass-text);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER */
        .header {
            background: transparent;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-container { flex-shrink: 0; }

        .logo-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: white;
        }

        .header-subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
        }

        .header-divider {
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%, rgba(255,255,255,0.3) 10%,
                rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%,
                transparent 100%);
            border-radius: 2px;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text { align-items: center; text-align: center; }
            .header-title { font-size: 1.8rem; }
            .logo-image { width: 70px; height: 70px; }
        }

        /* GLASS PANELS */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .glass-panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--glass-text);
            margin-bottom: 6px;
        }

        .glass-panel-subtitle {
            font-size: 0.9rem;
            color: var(--glass-text-muted);
            margin-bottom: 24px;
        }

        /* GREETING */
        .greeting {
            font-size: 1rem;
            color: var(--glass-text-muted);
            margin-bottom: 20px;
        }

        .greeting strong {
            color: var(--glass-text);
            font-weight: 600;
        }

        /* OPTION CARDS */
        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        @media (max-width: 400px) {
            .option-grid { grid-template-columns: 1fr; }
        }

        .option-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        .option-card.selected {
            background: var(--glass-bg-strong);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
        }

        .option-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .option-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--glass-text);
        }

        /* FORM */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--glass-text);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.12);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 1rem;
            color: white;
            transition: border-color 0.3s ease;
        }

        .form-input::placeholder { color: var(--glass-text-subtle); }

        .form-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
        }

        /* BUTTONS */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark));
            color: white;
            border: none;
            padding: 13px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--glass-text-muted);
            border: 1px solid var(--glass-border);
            padding: 13px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: var(--glass-bg);
            color: var(--glass-text);
        }

        /* STATUS MESSAGES */
        .status-message {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid;
        }

        .status-message.error {
            background: rgba(239,68,68,0.15);
            border-left-color: var(--error-red);
            color: #fca5a5;
        }

        .status-message.success {
            background: rgba(16,185,129,0.15);
            border-left-color: var(--success-green);
            color: #6ee7b7;
        }

        /* LOADING */
        .loading-panel {
            text-align: center;
            padding: 40px 28px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* SUCCESS */
        .success-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .success-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--glass-text);
            margin-bottom: 8px;
        }

        .success-detail {
            font-size: 0.95rem;
            color: var(--glass-text-muted);
            margin-bottom: 24px;
        }

        /* NAVIGATION */
        .nav-links {
            text-align: center;
            margin-top: 10px;
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-link:hover { color: white; }

        /* HIDDEN */
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="logo.png" alt="Lake Illawong Residential Club" class="logo-image">
                </div>
                <div class="header-text">
                    <div class="header-title">Update My Details</div>
                    <div class="header-subtitle">Lake Illawong Residential Club</div>
                </div>
            </div>
            <div class="header-divider"></div>
        </div>

        <!-- LOADING STATE -->
        <div class="glass-panel" id="panelLoading">
            <div class="loading-panel">
                <div class="loading-spinner"></div>
                <div style="color: var(--glass-text-muted); font-size: 0.95rem;">Loading...</div>
            </div>
        </div>

        <!-- MAIN FORM -->
        <div class="glass-panel hidden" id="panelForm">
            <div class="glass-panel-title">Contact Details</div>
            <div class="glass-panel-subtitle" id="greeting"></div>

            <div id="statusMessage" class="status-message hidden"></div>

            <div class="form-group">
                <div class="form-label">What would you like to update?</div>
                <div class="option-grid">
                    <div class="option-card" id="optionEmail" onclick="selectOption('email')">
                        <div class="option-icon">&#128231;</div>
                        <div class="option-label">Email Address</div>
                    </div>
                    <div class="option-card" id="optionPhone" onclick="selectOption('phone')">
                        <div class="option-icon">&#128241;</div>
                        <div class="option-label">Phone Number</div>
                    </div>
                </div>
            </div>

            <div class="form-group hidden" id="inputGroup">
                <label class="form-label" id="inputLabel" for="newValue">New value</label>
                <input
                    type="text"
                    id="newValue"
                    class="form-input"
                    placeholder=""
                    autocomplete="off">
            </div>

            <button class="btn-primary hidden" id="btnSubmit" onclick="submitUpdate()">Save Changes</button>
            <button class="btn-secondary" onclick="window.location.href='ResidentPortal.html'">Back to Resident Portal</button>
        </div>

        <!-- SUCCESS STATE -->
        <div class="glass-panel hidden" id="panelSuccess">
            <div style="text-align: center;">
                <div class="success-icon">&#10003;</div>
                <div class="success-title">Details Updated</div>
                <div class="success-detail" id="successDetail"></div>
                <button class="btn-primary" onclick="resetForm()">Update Another</button>
                <button class="btn-secondary" onclick="window.location.href='ResidentPortal.html'">Back to Resident Portal</button>
            </div>
        </div>



    </div>

    <script>
// =====================================================================
// UPDATE MY DETAILS V3.3
// =====================================================================
// Authentication: VerificationModal V1.0, session key lakeIllawongVerified
// No second API call post-OTP — unit and name come from userData directly.
// Backend: ManagementCentral V1.4 updateContactDetails action.
// =====================================================================

const API_URL = 'https://script.google.com/macros/s/AKfycbzVF25ss7kEmhE42Sf-i_vpLIL1FpTe2AjNeb0b8MqP_eBXAxV9ghWcuwe25hdEuqBFjw/exec';

let currentUnit = null;
let currentName = null;     // full name — used for API call
let currentFirstName = null; // display only
let selectedOption = null;  // 'email' or 'phone'
let currentOldValue = null;  // current value from sheet, for audit log

// ---------------------------------------------------------------
// INITIALISATION
// ---------------------------------------------------------------

document.addEventListener('DOMContentLoaded', function() {
    const alreadyVerified = VerificationModal.init({
        moduleName: 'Update My Details',
        moduleIcon: '&#127968;',
        sessionKey: 'lakeIllawongVerified',
        smsOnly: false,
        onSuccess: handleVerificationSuccess
    });

    if (!alreadyVerified) {
        showPanel('panelLoading');
        VerificationModal.show();
    }
});

function handleVerificationSuccess(userData) {
    currentUnit = userData.unit;
    currentName = userData.name || '';
    currentFirstName = currentName.split(' ')[0] || 'Resident';

    document.getElementById('greeting').textContent =
        'Hello ' + currentFirstName + '. Select what you would like to update below.';

    showPanel('panelForm');
}

// ---------------------------------------------------------------
// OPTION SELECTION
// ---------------------------------------------------------------

function selectOption(type) {
    selectedOption = type;
    currentOldValue = null;

    document.getElementById('optionEmail').classList.toggle('selected', type === 'email');
    document.getElementById('optionPhone').classList.toggle('selected', type === 'phone');

    const inputGroup = document.getElementById('inputGroup');
    const inputLabel = document.getElementById('inputLabel');
    const input      = document.getElementById('newValue');
    const btnSubmit  = document.getElementById('btnSubmit');

    inputLabel.textContent = type === 'email' ? 'New Email Address' : 'New Phone Number';
    input.type        = type === 'email' ? 'email' : 'tel';
    input.placeholder = type === 'email' ? 'example@email.com' : '0412 345 678';
    input.value = '';

    inputGroup.classList.remove('hidden');
    btnSubmit.classList.remove('hidden');

    clearStatus();
    input.focus();

    // Fetch current value for audit log oldValue
    fetchCurrentValue(type);
}

function fetchCurrentValue(type) {
    const callbackName = 'jsonp_cur_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    const script = document.createElement('script');

    window[callbackName] = function(response) {
        delete window[callbackName];
        try { document.head.removeChild(script); } catch(e) {}
        if (response.success && response.residents && response.residents.length > 0) {
            const resident = response.residents.find(function(r) {
                return r.name === currentName;
            }) || response.residents[0];
            currentOldValue = type === 'email' ? (resident.email || '') : (resident.phone || '');
        }
    };

    script.onerror = function() {
        delete window[callbackName];
        try { document.head.removeChild(script); } catch(e) {}
        // Non-fatal — oldValue will be empty string if fetch fails
    };

    const params = new URLSearchParams({
        action: 'getUnitResidents',
        unitNumber: currentUnit,
        callback: callbackName
    });

    script.src = API_URL + '?' + params.toString();
    document.head.appendChild(script);
}

// ---------------------------------------------------------------
// SUBMISSION
// ---------------------------------------------------------------

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && selectedOption) submitUpdate();
});

function submitUpdate() {
    const newValue = document.getElementById('newValue').value.trim();

    if (!selectedOption) {
        showStatus('Please select what you want to update.', 'error');
        return;
    }

    if (!newValue) {
        showStatus('Please enter a new value.', 'error');
        return;
    }

    if (selectedOption === 'email' && !validateEmail(newValue)) {
        showStatus('Please enter a valid email address.', 'error');
        return;
    }

    if (selectedOption === 'phone' && !validatePhone(newValue)) {
        showStatus('Please enter a valid phone number.', 'error');
        return;
    }

    const btnSubmit = document.getElementById('btnSubmit');
    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Saving...';
    clearStatus();

    const callbackName = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    const script = document.createElement('script');

    window[callbackName] = function(response) {
        delete window[callbackName];
        try { document.head.removeChild(script); } catch(e) {}
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Save Changes';

        if (response.success) {
            const label = selectedOption === 'email' ? 'Email address' : 'Phone number';
            document.getElementById('successDetail').textContent =
                label + ' updated to: ' + newValue;
            showPanel('panelSuccess');
        } else {
            showStatus('Unable to save changes: ' + (response.error || 'Please try again.'), 'error');
        }
    };

    script.onerror = function() {
        delete window[callbackName];
        try { document.head.removeChild(script); } catch(e) {}
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Save Changes';
        showStatus('Connection error. Please try again.', 'error');
    };

    const params = new URLSearchParams({
        action: 'updateContactDetails',
        unitNumber: currentUnit,
        residentName: currentName,
        detailType: selectedOption,
        newValue: newValue,
        oldValue: currentOldValue || '',
        callback: callbackName
    });

    script.src = API_URL + '?' + params.toString();
    document.head.appendChild(script);
}

// ---------------------------------------------------------------
// RESET
// ---------------------------------------------------------------

function resetForm() {
    selectedOption = null;
    document.getElementById('newValue').value = '';
    document.getElementById('inputGroup').classList.add('hidden');
    document.getElementById('btnSubmit').classList.add('hidden');
    document.getElementById('optionEmail').classList.remove('selected');
    document.getElementById('optionPhone').classList.remove('selected');
    clearStatus();
    showPanel('panelForm');
}

// ---------------------------------------------------------------
// HELPERS
// ---------------------------------------------------------------

function showPanel(id) {
    ['panelLoading', 'panelForm', 'panelSuccess'].forEach(function(p) {
        document.getElementById(p).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
}

function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg;
    el.className = 'status-message ' + type;
    el.classList.remove('hidden');
}

function clearStatus() {
    const el = document.getElementById('statusMessage');
    el.classList.add('hidden');
    el.textContent = '';
}

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone) {
    return /^[\d\s\-\(\)\+]+$/.test(phone) && phone.replace(/\D/g, '').length >= 8;
}

    </script>
</body>
</html>
