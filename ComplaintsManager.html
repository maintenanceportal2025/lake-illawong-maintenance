<!--
=====================================================================
ComplaintsManager.html - COMPLAINTS MANAGEMENT MODULE
=====================================================================
DOCUMENT INFORMATION:
  File Name:        ComplaintsManager.html
  System:           Lake Illawong Management Central System
  Component Type:   Admin Module
  Frontend Version: V1.0.0
  Backend:          ComplaintsManager V1.1
  Status:           PRODUCTION
  Created:          May 2026
  Last Modified:    May 2026

VERSION HISTORY:
  V1.0.0 (May 2026): Initial release.
    Full complaint list with status/category filters.
    Overdue flags — acknowledgement (2 business days) and
    response (14 days) deadlines surfaced visually.
    Expandable complaint cards showing all fields including
    internalNotes and peopleInvolved (Admin only).
    Inline update panel — status, Board response, internal notes,
    notify resident checkbox.
    JSONP protocol throughout.
    Accessed from AdminPortal.html.

AUTHENTICATION:
  Session inherited from AdminPortal.html (portalAdminVerified).
  If session absent, redirects to AdminPortal.html.

SYSTEM CONNECTIONS:
  Backend: ComplaintsManager V1.1
  Actions: getComplaints, updateComplaint
  URL:     CONFIG.BACKEND_URL

PORTAL:
  Launched from AdminPortal.html module card.
  Back button returns to AdminPortal.html.

TECHNICAL:
  Technology:   HTML5 + CSS3 + Vanilla JavaScript
  API Protocol: JSONP
  Design:       White background (data-heavy operational module)
  Hosting:      Netlify
=====================================================================

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Manager - Lake Illawong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        /* ── HEADER ─────────────────────────────────────────────── */
        .page-header {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.75);
            margin-top: 2px;
        }

        .btn-back {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 8px 16px;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-back:hover { background: rgba(255,255,255,0.2); }

        /* ── MAIN CONTENT ────────────────────────────────────────── */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* ── SUMMARY STRIP ───────────────────────────────────────── */
        .summary-strip {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .summary-tile {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 2px;
            padding: 14px 20px;
            flex: 1;
            min-width: 120px;
            text-align: center;
        }

        .summary-tile .tile-count {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e40af;
            line-height: 1;
        }

        .summary-tile .tile-count.overdue { color: #dc2626; }
        .summary-tile .tile-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── FILTER BAR ──────────────────────────────────────────── */
        .filter-bar {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 2px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
            white-space: nowrap;
        }

        .filter-bar select {
            border: 1px solid #d1d5db;
            border-radius: 2px;
            padding: 6px 10px;
            font-size: 0.85rem;
            color: #1e293b;
            background: white;
            cursor: pointer;
        }

        .btn-refresh {
            margin-left: auto;
            background: #1e40af;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-refresh:hover { background: #1e3a8a; }

        /* ── COMPLAINT CARDS ─────────────────────────────────────── */
        .complaint-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #94a3b8;
            border-radius: 2px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .complaint-card.overdue-ack   { border-left-color: #dc2626; }
        .complaint-card.overdue-resp  { border-left-color: #f59e0b; }
        .complaint-card.status-responded { border-left-color: #7c3aed; }
        .complaint-card.status-closed    { border-left-color: #94a3b8; }
        .complaint-card.status-acknowledged { border-left-color: #047857; }

        /* Card summary row — always visible, clickable */
        .card-summary {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            flex-wrap: wrap;
        }

        .card-summary:hover { background: #f8fafc; }

        .card-ref {
            font-family: monospace;
            font-size: 0.82rem;
            font-weight: 700;
            color: #64748b;
            white-space: nowrap;
        }

        .card-category {
            font-size: 0.92rem;
            font-weight: 600;
            color: #1e293b;
            flex: 1;
            min-width: 120px;
        }

        .card-resident {
            font-size: 0.82rem;
            color: #64748b;
            white-space: nowrap;
        }

        .card-dates {
            font-size: 0.78rem;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* Overdue badges */
        .overdue-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .badge-ack-overdue  { background: #fee2e2; color: #dc2626; }
        .badge-resp-overdue { background: #fef3c7; color: #92400e; }

        /* Status pills */
        .status-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .status-open         { background: #dbeafe; color: #1d4ed8; }
        .status-acknowledged { background: #bbf7d0; color: #047857; }
        .status-responded    { background: #e9d5ff; color: #7c3aed; }
        .status-closed       { background: #f1f5f9; color: #475569; }

        .card-chevron {
            color: #94a3b8;
            font-size: 0.85rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .complaint-card.expanded .card-chevron {
            transform: rotate(180deg);
        }

        /* ── CARD DETAIL ─────────────────────────────────────────── */
        .card-detail {
            display: none;
            border-top: 1px solid #e2e8f0;
            padding: 0 16px 16px;
        }

        .complaint-card.expanded .card-detail { display: block; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin: 16px 0;
        }

        .detail-field { }

        .detail-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 0.88rem;
            color: #1e293b;
            line-height: 1.5;
        }

        .detail-value.full-width {
            grid-column: 1 / -1;
        }

        .detail-field.full-width {
            grid-column: 1 / -1;
        }

        /* Internal notes — highlighted */
        .internal-notes-block {
            background: #fef9c3;
            border: 1px solid #fde68a;
            border-radius: 2px;
            padding: 10px 12px;
            margin-top: 4px;
        }

        .internal-notes-block .detail-label {
            color: #92400e;
        }

        .internal-notes-block .detail-value {
            color: #78350f;
        }

        /* Board response block */
        .board-response-block {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 2px;
            padding: 10px 12px;
            margin-top: 4px;
        }

        .board-response-block .detail-label { color: #047857; }

        /* Section divider */
        .detail-section-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin: 16px 0 10px;
            padding-top: 14px;
            border-top: 1px solid #f1f5f9;
        }

        /* ── UPDATE PANEL ────────────────────────────────────────── */
        .update-panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 2px;
            padding: 16px;
            margin-top: 16px;
        }

        .update-panel-title {
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #374151;
            margin-bottom: 14px;
        }

        .update-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: flex-start;
        }

        .update-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 180px;
        }

        .update-field label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #374151;
        }

        .update-field select,
        .update-field textarea {
            border: 1px solid #d1d5db;
            border-radius: 2px;
            padding: 8px 10px;
            font-size: 0.85rem;
            font-family: inherit;
            color: #1e293b;
            background: white;
            resize: vertical;
        }

        .update-field textarea {
            min-height: 80px;
        }

        .update-field select:focus,
        .update-field textarea:focus {
            outline: none;
            border-color: #1e40af;
        }

        .notify-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .notify-row input[type=checkbox] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .notify-row label {
            font-size: 0.85rem;
            color: #374151;
            cursor: pointer;
        }

        .btn-save {
            background: #1e40af;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover   { background: #1e3a8a; }
        .btn-save:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* Save feedback */
        .save-feedback {
            display: inline-block;
            margin-left: 12px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .save-feedback.success { color: #047857; }
        .save-feedback.error   { color: #dc2626; }

        /* ── STATES ──────────────────────────────────────────────── */
        .loading-state,
        .empty-state,
        .error-state {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }

        .state-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .state-text { font-size: 0.95rem; }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #1e40af;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        @media (max-width: 640px) {
            .page-header { padding: 14px 16px; }
            .main { padding: 16px; }
            .detail-grid { grid-template-columns: 1fr; }
            .summary-strip { gap: 8px; }
            .summary-tile { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="page-header">
    <div class="header-left">
        <img src="logo.png" alt="Lake Illawong" class="header-logo">
        <div>
            <div class="header-title">Complaints Manager</div>
            <div class="header-subtitle">Lake Illawong Retirement Village — Admin</div>
        </div>
    </div>
    <a href="AdminPortal.html" class="btn-back">&#8592; Admin Portal</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Summary strip -->
    <div class="summary-strip" id="summaryStrip" style="display:none">
        <div class="summary-tile">
            <div class="tile-count" id="countTotal">—</div>
            <div class="tile-label">Total</div>
        </div>
        <div class="summary-tile">
            <div class="tile-count" id="countOpen">—</div>
            <div class="tile-label">Open</div>
        </div>
        <div class="summary-tile">
            <div class="tile-count" id="countAcknowledged">—</div>
            <div class="tile-label">Acknowledged</div>
        </div>
        <div class="summary-tile">
            <div class="tile-count" id="countResponded">—</div>
            <div class="tile-label">Responded</div>
        </div>
        <div class="summary-tile">
            <div class="tile-count" id="countClosed">—</div>
            <div class="tile-label">Closed</div>
        </div>
        <div class="summary-tile">
            <div class="tile-count overdue" id="countOverdue">—</div>
            <div class="tile-label">Overdue</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <label for="filterStatus">Status:</label>
        <select id="filterStatus" onchange="applyFilters()">
            <option value="">All</option>
            <option value="Open">Open</option>
            <option value="Acknowledged">Acknowledged</option>
            <option value="Responded">Responded</option>
            <option value="Closed">Closed</option>
        </select>
        <label for="filterOverdue">Show:</label>
        <select id="filterOverdue" onchange="applyFilters()">
            <option value="">All complaints</option>
            <option value="overdue">Overdue only</option>
        </select>
        <button class="btn-refresh" onclick="loadComplaints()">&#8635; Refresh</button>
    </div>

    <!-- Complaint list -->
    <div id="complaintList">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="state-text">Loading complaints...</div>
        </div>
    </div>

</div>

<script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const CONFIG = {
        BACKEND_URL:     'https://script.google.com/macros/s/AKfycbwqg6BiKYAhLNfpawCC5d5gS2uuc_IxVmPx_Da6HIXuKgSs5zvxHNP3Kr8_ySFqVSx5BQ/exec',
        SESSION_KEY:     'portalAdminVerified',
        PORTAL_URL:      'AdminPortal.html',
        ACK_BUSINESS_DAYS: 2,
        RESP_DAYS:         14
    };

    // All complaints as loaded from backend
    let allComplaints = [];

    // =====================================================================
    // INIT
    // =====================================================================
    document.addEventListener('DOMContentLoaded', function () {
        // Check session
        const session = sessionStorage.getItem(CONFIG.SESSION_KEY);
        if (!session) {
            window.location.href = CONFIG.PORTAL_URL;
            return;
        }
        loadComplaints();
    });

    // =====================================================================
    // LOAD
    // =====================================================================
    function loadComplaints() {
        document.getElementById('complaintList').innerHTML =
            '<div class="loading-state"><div class="spinner"></div><div class="state-text">Loading complaints...</div></div>';
        document.getElementById('summaryStrip').style.display = 'none';

        const callbackName = 'cmCallback_' + Date.now();
        const url = CONFIG.BACKEND_URL
            + '?action=getComplaints'
            + '&callback=' + callbackName;

        const timeout = setTimeout(function () {
            cleanup(callbackName);
            showPageError('Server did not respond. Please try refreshing.');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timeout);
            cleanup(callbackName);
            handleLoaded(data);
        };

        const script = document.createElement('script');
        script.onerror = function () {
            clearTimeout(timeout);
            cleanup(callbackName);
            showPageError('Could not reach the server. Please check your connection.');
        };
        script.src = url;
        document.head.appendChild(script);
    }

    function cleanup(name) { delete window[name]; }

    function handleLoaded(data) {
        if (!data.success) {
            showPageError(data.error || 'Failed to load complaints.');
            return;
        }

        allComplaints = data.complaints || [];
        updateSummary(allComplaints);
        applyFilters();
    }

    // =====================================================================
    // SUMMARY
    // =====================================================================
    function updateSummary(complaints) {
        const counts = { Open: 0, Acknowledged: 0, Responded: 0, Closed: 0, overdue: 0 };
        complaints.forEach(function (c) {
            if (counts[c.status] !== undefined) counts[c.status]++;
            if (isOverdue(c)) counts.overdue++;
        });

        document.getElementById('countTotal').textContent       = complaints.length;
        document.getElementById('countOpen').textContent        = counts.Open;
        document.getElementById('countAcknowledged').textContent= counts.Acknowledged;
        document.getElementById('countResponded').textContent   = counts.Responded;
        document.getElementById('countClosed').textContent      = counts.Closed;
        document.getElementById('countOverdue').textContent     = counts.overdue;
        document.getElementById('summaryStrip').style.display   = 'flex';
    }

    // =====================================================================
    // FILTERS
    // =====================================================================
    function applyFilters() {
        const statusFilter  = document.getElementById('filterStatus').value;
        const overdueFilter = document.getElementById('filterOverdue').value;

        let filtered = allComplaints;

        if (statusFilter) {
            filtered = filtered.filter(c => c.status === statusFilter);
        }

        if (overdueFilter === 'overdue') {
            filtered = filtered.filter(c => isOverdue(c));
        }

        renderComplaints(filtered);
    }

    // =====================================================================
    // OVERDUE LOGIC
    // =====================================================================

    // Acknowledgement overdue: Open, submitted > 2 business days ago, not yet acknowledged
    function isAckOverdue(c) {
        if (c.status !== 'Open') return false;
        if (c.acknowledgedAt)    return false;
        return businessDaysSince(new Date(c.submittedAt)) > CONFIG.ACK_BUSINESS_DAYS;
    }

    // Response overdue: Open or Acknowledged, responseDue date passed
    function isRespOverdue(c) {
        if (c.status === 'Responded' || c.status === 'Closed') return false;
        if (!c.responseDue) return false;
        return new Date(c.responseDue) < new Date();
    }

    function isOverdue(c) {
        return isAckOverdue(c) || isRespOverdue(c);
    }

    function businessDaysSince(date) {
        const now  = new Date();
        let count  = 0;
        let cursor = new Date(date);
        cursor.setHours(0, 0, 0, 0);
        now.setHours(23, 59, 59, 999);
        while (cursor <= now) {
            const day = cursor.getDay();
            if (day !== 0 && day !== 6) count++;
            cursor.setDate(cursor.getDate() + 1);
        }
        return count;
    }

    // =====================================================================
    // RENDER
    // =====================================================================
    function renderComplaints(complaints) {
        const list = document.getElementById('complaintList');

        if (complaints.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="state-icon">&#128196;</div>
                    <div class="state-text">No complaints match the current filter.</div>
                </div>`;
            return;
        }

        list.innerHTML = complaints.map(buildCard).join('');
    }

    function buildCard(c) {
        const ackOverdue  = isAckOverdue(c);
        const respOverdue = isRespOverdue(c);

        // Left border class
        let borderClass = '';
        if      (ackOverdue)              borderClass = 'overdue-ack';
        else if (respOverdue)             borderClass = 'overdue-resp';
        else if (c.status === 'Responded') borderClass = 'status-responded';
        else if (c.status === 'Closed')    borderClass = 'status-closed';
        else if (c.status === 'Acknowledged') borderClass = 'status-acknowledged';

        const statusClass = statusPillClass(c.status);
        const safeRef     = escHtml(c.referenceNumber);

        // Overdue badges
        const badges = [];
        if (ackOverdue)  badges.push('<span class="overdue-badge badge-ack-overdue">Ack overdue</span>');
        if (respOverdue) badges.push('<span class="overdue-badge badge-resp-overdue">Response overdue</span>');

        // Dates line
        const submitted = formatDate(c.submittedAt);
        const datesText = submitted ? 'Submitted ' + submitted : '';

        return `
        <div class="complaint-card ${borderClass}" id="card-${safeRef}">
            <div class="card-summary" onclick="toggleCard('${safeRef}')">
                <div class="card-ref">${safeRef}</div>
                <div class="card-category">${escHtml(c.category)}</div>
                <div class="card-resident">${escHtml(c.residentName)} — Unit ${escHtml(c.unitNumber)}</div>
                ${badges.join('')}
                <span class="status-pill ${statusClass}">${escHtml(c.status)}</span>
                <div class="card-dates">${datesText}</div>
                <div class="card-chevron">&#9660;</div>
            </div>
            <div class="card-detail">
                ${buildDetail(c)}
                ${buildUpdatePanel(c)}
            </div>
        </div>`;
    }

    function buildDetail(c) {
        const fields = [
            { label: 'Resident',         value: c.residentName,     full: false },
            { label: 'Unit',             value: c.unitNumber,       full: false },
            { label: 'Email',            value: c.contactEmail,     full: false },
            { label: 'Mobile',           value: c.contactMobile,    full: false },
            { label: 'Category',         value: c.category,         full: false },
            { label: 'Submitted',        value: formatDate(c.submittedAt), full: false },
            { label: 'Acknowledged',     value: c.acknowledgedAt ? formatDate(c.acknowledgedAt) : 'Not yet acknowledged', full: false },
            { label: 'Response Due',     value: c.responseDue ? formatDate(c.responseDue) : '—', full: false },
            { label: 'Responded',        value: c.respondedAt ? formatDate(c.respondedAt) : '—', full: false },
            { label: 'Closed',           value: c.closedAt    ? formatDate(c.closedAt)    : '—', full: false },
            { label: 'Description',      value: c.description,      full: true  },
            { label: 'Desired Outcome',  value: c.desiredOutcome,   full: true  },
            { label: 'Location',         value: c.location,         full: false },
            { label: 'Incident Date/Time', value: c.incidentDateTime, full: false },
            { label: 'People Involved',  value: c.peopleInvolved,   full: true  },
            { label: 'Previous Actions', value: c.previousActions,  full: true  },
        ];

        const gridItems = fields
            .filter(f => f.value)
            .map(f => `
                <div class="detail-field ${f.full ? 'full-width' : ''}">
                    <div class="detail-label">${f.label}</div>
                    <div class="detail-value">${escHtml(f.value)}</div>
                </div>`).join('');

        // Board response block
        const boardHtml = c.boardResponse
            ? `<div class="board-response-block">
                   <div class="detail-label">Board Response</div>
                   <div class="detail-value">${escHtml(c.boardResponse)}</div>
               </div>`
            : '';

        // Internal notes — amber highlight, admin only
        const notesHtml = c.internalNotes
            ? `<div class="internal-notes-block">
                   <div class="detail-label">Internal Notes (Admin only)</div>
                   <div class="detail-value">${escHtml(c.internalNotes)}</div>
               </div>`
            : '';

        return `
            <div class="detail-grid">${gridItems}</div>
            ${boardHtml}
            ${notesHtml}`;
    }

    function buildUpdatePanel(c) {
        const safeRef = c.referenceNumber.replace(/[^A-Z0-9-]/g, '');
        return `
            <div class="detail-section-title">Update Complaint</div>
            <div class="update-panel">
                <div class="update-row">
                    <div class="update-field">
                        <label for="status-${safeRef}">Status</label>
                        <select id="status-${safeRef}">
                            <option value="">(no change)</option>
                            <option value="Open"         ${c.status === 'Open'         ? 'selected' : ''}>Open</option>
                            <option value="Acknowledged" ${c.status === 'Acknowledged' ? 'selected' : ''}>Acknowledged</option>
                            <option value="Responded"    ${c.status === 'Responded'    ? 'selected' : ''}>Responded</option>
                            <option value="Closed"       ${c.status === 'Closed'       ? 'selected' : ''}>Closed</option>
                        </select>
                    </div>
                </div>
                <div class="update-row">
                    <div class="update-field">
                        <label for="response-${safeRef}">Board Response (shown to resident)</label>
                        <textarea id="response-${safeRef}" placeholder="Enter the Board's formal response...">${escHtml(c.boardResponse)}</textarea>
                    </div>
                </div>
                <div class="update-row">
                    <div class="update-field">
                        <label for="notes-${safeRef}">Internal Notes (not shown to resident)</label>
                        <textarea id="notes-${safeRef}" placeholder="Internal notes, deliberations, context...">${escHtml(c.internalNotes)}</textarea>
                    </div>
                </div>
                <div class="notify-row">
                    <input type="checkbox" id="notify-${safeRef}">
                    <label for="notify-${safeRef}">Send response email to resident</label>
                </div>
                <button class="btn-save" id="save-${safeRef}"
                        onclick="saveUpdate('${safeRef}')">
                    Save Update
                </button>
                <span class="save-feedback" id="feedback-${safeRef}"></span>
            </div>`;
    }

    // =====================================================================
    // CARD TOGGLE
    // =====================================================================
    function toggleCard(ref) {
        const card = document.getElementById('card-' + ref);
        card.classList.toggle('expanded');
    }

    // =====================================================================
    // SAVE UPDATE
    // =====================================================================
    function saveUpdate(ref) {
        const status        = document.getElementById('status-'   + ref).value;
        const boardResponse = document.getElementById('response-' + ref).value.trim();
        const internalNotes = document.getElementById('notes-'    + ref).value.trim();
        const notifyResident = document.getElementById('notify-'  + ref).checked;
        const btn            = document.getElementById('save-'    + ref);
        const feedback       = document.getElementById('feedback-'+ ref);

        if (!status && !boardResponse && !internalNotes) {
            setFeedback(feedback, 'Nothing to save — make a change first.', 'error');
            return;
        }

        if (notifyResident && !boardResponse) {
            setFeedback(feedback, 'Enter a Board response before notifying the resident.', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving...';
        setFeedback(feedback, '', '');

        const callbackName = 'saveCallback_' + Date.now();
        let url = CONFIG.BACKEND_URL
            + '?action=updateComplaint'
            + '&ref='      + encodeURIComponent(ref)
            + '&callback=' + callbackName;

        if (status)        url += '&status='        + encodeURIComponent(status);
        if (boardResponse) url += '&boardResponse=' + encodeURIComponent(boardResponse);
        if (internalNotes) url += '&internalNotes=' + encodeURIComponent(internalNotes);
        if (notifyResident) url += '&notifyResident=true';

        const timeout = setTimeout(function () {
            cleanup(callbackName);
            btn.disabled = false;
            btn.textContent = 'Save Update';
            setFeedback(feedback, 'Timed out — please try again.', 'error');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timeout);
            cleanup(callbackName);
            btn.disabled = false;
            btn.textContent = 'Save Update';

            if (data.success) {
                setFeedback(feedback, 'Saved successfully.', 'success');
                // Update in-memory record so filters reflect new status
                const idx = allComplaints.findIndex(c => c.referenceNumber === ref);
                if (idx !== -1) {
                    if (status)        allComplaints[idx].status        = status;
                    if (boardResponse) allComplaints[idx].boardResponse = boardResponse;
                    if (internalNotes) allComplaints[idx].internalNotes = internalNotes;
                }
                updateSummary(allComplaints);
                // Uncheck notify after send
                document.getElementById('notify-' + ref).checked = false;
            } else {
                setFeedback(feedback, 'Error: ' + (data.error || 'Unknown error.'), 'error');
            }
        };

        const script = document.createElement('script');
        script.onerror = function () {
            clearTimeout(timeout);
            cleanup(callbackName);
            btn.disabled = false;
            btn.textContent = 'Save Update';
            setFeedback(feedback, 'Network error — please try again.', 'error');
        };
        script.src = url;
        document.head.appendChild(script);
    }

    function setFeedback(el, msg, type) {
        el.textContent  = msg;
        el.className    = 'save-feedback ' + type;
    }

    // =====================================================================
    // PAGE ERROR
    // =====================================================================
    function showPageError(msg) {
        document.getElementById('complaintList').innerHTML = `
            <div class="error-state">
                <div class="state-icon">&#9888;&#65039;</div>
                <div class="state-text">${escHtml(msg)}</div>
            </div>`;
    }

    // =====================================================================
    // HELPERS
    // =====================================================================
    function statusPillClass(status) {
        const map = {
            'Open':         'status-open',
            'Acknowledged': 'status-acknowledged',
            'Responded':    'status-responded',
            'Closed':       'status-closed'
        };
        return map[status] || '';
    }

    function formatDate(str) {
        if (!str) return '';
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
        return String(str || '')
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;');
    }
</script>
</body>
</html>
