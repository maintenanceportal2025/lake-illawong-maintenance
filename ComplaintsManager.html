<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Manager - Lake Illawong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(90deg, #1e40af 0%, #1e3a8a 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER - system standard */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            margin: 0 0 5px 0;
            line-height: 1.1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        /* BACK BUTTON - system standard */
        .portal-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 0 auto 20px auto;
            transition: background 0.2s;
        }

        .portal-back-btn:hover { background: rgba(255,255,255,0.25); }

        /* SUMMARY STRIP */
        .summary-strip {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .summary-tile {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 2px;
            padding: 12px 16px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        .tile-count {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .tile-count.overdue { color: #fca5a5; }

        .tile-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* FILTER BAR */
        .filter-bar {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 2px;
            padding: 12px 16px;
            margin-bottom: 14px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar label {
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        .filter-bar select {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 2px;
            padding: 6px 10px;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        .filter-bar select option { background: #1e3a8a; color: white; }

        .btn-refresh {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 7px 16px;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-refresh:hover { background: rgba(255,255,255,0.25); }

        /* COMPLAINT CARDS */
        .complaint-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-left: 4px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            border-radius: 2px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .complaint-card.overdue-ack        { border-left-color: #f87171; }
        .complaint-card.overdue-resp       { border-left-color: #fbbf24; }
        .complaint-card.status-acknowledged{ border-left-color: #34d399; }
        .complaint-card.status-responded   { border-left-color: #c084fc; }
        .complaint-card.status-closed      { border-left-color: rgba(255,255,255,0.2); }

        .card-summary {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            flex-wrap: wrap;
        }

        .card-summary:hover { background: rgba(255,255,255,0.05); }

        .card-ref {
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        .card-category {
            font-size: 0.92rem;
            font-weight: 600;
            color: white;
            flex: 1;
            min-width: 100px;
        }

        .card-resident {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        .card-dates {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
        }

        .overdue-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .badge-ack-overdue  { background: rgba(248,113,113,0.25); color: #fca5a5; border: 1px solid rgba(248,113,113,0.4); }
        .badge-resp-overdue { background: rgba(251,191,36,0.2);   color: #fde68a; border: 1px solid rgba(251,191,36,0.4); }

        .status-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .status-open         { background: rgba(219,234,254,0.2); color: #93c5fd; border: 1px solid rgba(147,197,253,0.3); }
        .status-acknowledged { background: rgba(187,247,208,0.2); color: #6ee7b7; border: 1px solid rgba(110,231,183,0.3); }
        .status-responded    { background: rgba(233,213,255,0.2); color: #d8b4fe; border: 1px solid rgba(216,180,254,0.3); }
        .status-closed       { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); }

        .card-chevron {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .complaint-card.expanded .card-chevron { transform: rotate(180deg); }

        /* CARD DETAIL */
        .card-detail {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 0 16px 16px;
        }

        .complaint-card.expanded .card-detail { display: block; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin: 16px 0;
        }

        .detail-field.full-width { grid-column: 1 / -1; }

        .detail-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.88);
            line-height: 1.5;
        }

        .internal-notes-block {
            background: rgba(251,191,36,0.12);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 2px;
            padding: 10px 12px;
            margin-top: 8px;
        }

        .internal-notes-block .detail-label { color: #fde68a; }
        .internal-notes-block .detail-value { color: #fef9c3; }

        .board-response-block {
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.25);
            border-radius: 2px;
            padding: 10px 12px;
            margin-top: 8px;
        }

        .board-response-block .detail-label { color: #6ee7b7; }
        .board-response-block .detail-value { color: rgba(255,255,255,0.88); }

        .detail-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.45);
            margin: 16px 0 10px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* UPDATE PANEL */
        .update-panel {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            padding: 16px;
            margin-top: 4px;
        }

        .update-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: flex-start;
        }

        .update-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 180px;
        }

        .update-field label {
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }

        .update-field select,
        .update-field textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            padding: 8px 10px;
            font-size: 0.85rem;
            font-family: inherit;
            color: white;
            resize: vertical;
        }

        .update-field select option { background: #1e3a8a; }
        .update-field textarea { min-height: 80px; }
        .update-field textarea::placeholder { color: rgba(255,255,255,0.35); }

        .update-field select:focus,
        .update-field textarea:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
        }

        .notify-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .notify-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

        .notify-row label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
        }

        .btn-save {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover    { background: rgba(255,255,255,0.25); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        .save-feedback {
            display: inline-block;
            margin-left: 12px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .save-feedback.success { color: #6ee7b7; }
        .save-feedback.error   { color: #fca5a5; }

        /* STATES */
        .loading-state,
        .empty-state,
        .error-state {
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.6);
        }

        .state-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .state-text { font-size: 0.95rem; }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .header-content { flex-direction: column; gap: 15px; }
            .header-text    { align-items: center; text-align: center; }
            .header-title   { font-size: 1.8rem; }
            .logo-image     { width: 70px; height: 70px; }
            .detail-grid    { grid-template-columns: 1fr; }
            .summary-strip  { gap: 8px; }
            .summary-tile   { padding: 10px 12px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header - system standard -->
    <div class="header">
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="Lake Illawong Logo" class="logo-image">
            </div>
            <div class="header-text">
                <h1 class="header-title">Complaints Manager</h1>
                <p class="header-subtitle">Lake Illawong Retirement Village — Admin</p>
            </div>
        </div>
    </div>

    <button class="portal-back-btn" onclick="window.location.href='AdminPortal.html'">&#8592; Back to Admin Portal</button>

    <!-- Summary strip -->
    <div class="summary-strip" id="summaryStrip" style="display:none">
        <div class="summary-tile"><div class="tile-count" id="countTotal">—</div><div class="tile-label">Total</div></div>
        <div class="summary-tile"><div class="tile-count" id="countOpen">—</div><div class="tile-label">Open</div></div>
        <div class="summary-tile"><div class="tile-count" id="countAcknowledged">—</div><div class="tile-label">Acknowledged</div></div>
        <div class="summary-tile"><div class="tile-count" id="countResponded">—</div><div class="tile-label">Responded</div></div>
        <div class="summary-tile"><div class="tile-count" id="countClosed">—</div><div class="tile-label">Closed</div></div>
        <div class="summary-tile"><div class="tile-count overdue" id="countOverdue">—</div><div class="tile-label">Overdue</div></div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <label for="filterStatus">Status:</label>
        <select id="filterStatus" onchange="applyFilters()">
            <option value="">All</option>
            <option value="Open">Open</option>
            <option value="Acknowledged">Acknowledged</option>
            <option value="Responded">Responded</option>
            <option value="Closed">Closed</option>
        </select>
        <label for="filterOverdue">Show:</label>
        <select id="filterOverdue" onchange="applyFilters()">
            <option value="">All complaints</option>
            <option value="overdue">Overdue only</option>
        </select>
        <button class="btn-refresh" onclick="loadComplaints()">&#8635; Refresh</button>
    </div>

    <!-- Complaint list -->
    <div id="complaintList">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="state-text">Loading complaints...</div>
        </div>
    </div>

</div>
<script>
    const CONFIG = {
        BACKEND_URL:       'https://script.google.com/macros/s/AKfycbwqg6BiKYAhLNfpawCC5d5gS2uuc_IxVmPx_Da6HIXuKgSs5zvxHNP3Kr8_ySFqVSx5BQ/exec',
        SESSION_KEY:       'portalAdminVerified',
        PORTAL_URL:        'AdminPortal.html',
        ACK_BUSINESS_DAYS: 2,
        RESP_DAYS:         14
    };

    let allComplaints = [];

    document.addEventListener('DOMContentLoaded', function () {
        if (!sessionStorage.getItem(CONFIG.SESSION_KEY)) { window.location.href = CONFIG.PORTAL_URL; return; }
        loadComplaints();
    });

    function loadComplaints() {
        document.getElementById('complaintList').innerHTML =
            '<div class="loading-state"><div class="spinner"></div><div class="state-text">Loading complaints...</div></div>';
        document.getElementById('summaryStrip').style.display = 'none';

        const callbackName = 'cmCallback_' + Date.now();
        const url = CONFIG.BACKEND_URL + '?action=getComplaints&callback=' + callbackName;

        const timeout = setTimeout(function () { cleanup(callbackName); showPageError('Server did not respond. Please try refreshing.'); }, 15000);

        window[callbackName] = function (data) { clearTimeout(timeout); cleanup(callbackName); handleLoaded(data); };

        const script = document.createElement('script');
        script.onerror = function () { clearTimeout(timeout); cleanup(callbackName); showPageError('Could not reach the server.'); };
        script.src = url;
        document.head.appendChild(script);
    }

    function cleanup(name) { delete window[name]; }

    function handleLoaded(data) {
        if (!data.success) { showPageError(data.error || 'Failed to load complaints.'); return; }
        allComplaints = data.complaints || [];
        updateSummary(allComplaints);
        applyFilters();
    }

    function updateSummary(complaints) {
        const counts = { Open: 0, Acknowledged: 0, Responded: 0, Closed: 0, overdue: 0 };
        complaints.forEach(function (c) {
            if (counts[c.status] !== undefined) counts[c.status]++;
            if (isOverdue(c)) counts.overdue++;
        });
        document.getElementById('countTotal').textContent        = complaints.length;
        document.getElementById('countOpen').textContent         = counts.Open;
        document.getElementById('countAcknowledged').textContent = counts.Acknowledged;
        document.getElementById('countResponded').textContent    = counts.Responded;
        document.getElementById('countClosed').textContent       = counts.Closed;
        document.getElementById('countOverdue').textContent      = counts.overdue;
        document.getElementById('summaryStrip').style.display    = 'flex';
    }

    function applyFilters() {
        const statusFilter  = document.getElementById('filterStatus').value;
        const overdueFilter = document.getElementById('filterOverdue').value;
        let filtered = allComplaints;
        if (statusFilter)                filtered = filtered.filter(c => c.status === statusFilter);
        if (overdueFilter === 'overdue') filtered = filtered.filter(c => isOverdue(c));
        renderComplaints(filtered);
    }

    function isAckOverdue(c) {
        if (c.status !== 'Open') return false;
        if (c.acknowledgedAt)    return false;
        return businessDaysSince(new Date(c.submittedAt)) > CONFIG.ACK_BUSINESS_DAYS;
    }

    function isRespOverdue(c) {
        if (c.status === 'Responded' || c.status === 'Closed') return false;
        if (!c.responseDue) return false;
        return new Date(c.responseDue) < new Date();
    }

    function isOverdue(c) { return isAckOverdue(c) || isRespOverdue(c); }

    function businessDaysSince(date) {
        const now = new Date(); let count = 0; let cursor = new Date(date);
        cursor.setHours(0,0,0,0); now.setHours(23,59,59,999);
        while (cursor <= now) { const day = cursor.getDay(); if (day !== 0 && day !== 6) count++; cursor.setDate(cursor.getDate() + 1); }
        return count;
    }

    function renderComplaints(complaints) {
        const list = document.getElementById('complaintList');
        if (complaints.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="state-icon">&#128196;</div><div class="state-text">No complaints match the current filter.</div></div>';
            return;
        }
        list.innerHTML = complaints.map(buildCard).join('');
    }

    function buildCard(c) {
        const ackOverdue  = isAckOverdue(c);
        const respOverdue = isRespOverdue(c);
        let borderClass = '';
        if      (ackOverdue)                  borderClass = 'overdue-ack';
        else if (respOverdue)                 borderClass = 'overdue-resp';
        else if (c.status === 'Responded')    borderClass = 'status-responded';
        else if (c.status === 'Closed')       borderClass = 'status-closed';
        else if (c.status === 'Acknowledged') borderClass = 'status-acknowledged';

        const statusClass = statusPillClass(c.status);
        const safeRef     = escHtml(c.referenceNumber);
        const badges = [];
        if (ackOverdue)  badges.push('<span class="overdue-badge badge-ack-overdue">Ack overdue</span>');
        if (respOverdue) badges.push('<span class="overdue-badge badge-resp-overdue">Response overdue</span>');
        const submitted = formatDate(c.submittedAt);
        const datesText = submitted ? 'Submitted ' + submitted : '';

        return `
        <div class="complaint-card ${borderClass}" id="card-${safeRef}">
            <div class="card-summary" onclick="toggleCard('${safeRef}')">
                <div class="card-ref">${safeRef}</div>
                <div class="card-category">${escHtml(c.category)}</div>
                <div class="card-resident">${escHtml(c.residentName)} — ${escHtml(c.unitNumber)}</div>
                ${badges.join('')}
                <span class="status-pill ${statusClass}">${escHtml(c.status)}</span>
                <div class="card-dates">${datesText}</div>
                <div class="card-chevron">&#9660;</div>
            </div>
            <div class="card-detail">
                ${buildDetail(c)}
                ${buildUpdatePanel(c)}
            </div>
        </div>`;
    }

    function buildDetail(c) {
        const fields = [
            { label: 'Resident',           value: c.residentName,     full: false },
            { label: 'Unit',               value: c.unitNumber,       full: false },
            { label: 'Email',              value: c.contactEmail,     full: false },
            { label: 'Mobile',             value: c.contactMobile,    full: false },
            { label: 'Category',           value: c.category,         full: false },
            { label: 'Submitted',          value: formatDate(c.submittedAt), full: false },
            { label: 'Acknowledged',       value: c.acknowledgedAt ? formatDate(c.acknowledgedAt) : 'Not yet acknowledged', full: false },
            { label: 'Response Due',       value: c.responseDue ? formatDate(c.responseDue) : '—', full: false },
            { label: 'Responded',          value: c.respondedAt ? formatDate(c.respondedAt) : '—', full: false },
            { label: 'Closed',             value: c.closedAt    ? formatDate(c.closedAt)    : '—', full: false },
            { label: 'Description',        value: c.description,      full: true },
            { label: 'Desired Outcome',    value: c.desiredOutcome,   full: true },
            { label: 'Location',           value: c.location,         full: false },
            { label: 'Incident Date/Time', value: c.incidentDateTime, full: false },
            { label: 'People Involved',    value: c.peopleInvolved,   full: true },
            { label: 'Previous Actions',   value: c.previousActions,  full: true },
        ];
        const gridItems = fields.filter(f => f.value).map(f => `
            <div class="detail-field ${f.full ? 'full-width' : ''}">
                <div class="detail-label">${f.label}</div>
                <div class="detail-value">${escHtml(f.value)}</div>
            </div>`).join('');

        const boardHtml = c.boardResponse
            ? `<div class="board-response-block"><div class="detail-label">Board Response</div><div class="detail-value">${escHtml(c.boardResponse)}</div></div>` : '';
        const notesHtml = c.internalNotes
            ? `<div class="internal-notes-block"><div class="detail-label">Internal Notes (Admin only)</div><div class="detail-value">${escHtml(c.internalNotes)}</div></div>` : '';

        return `<div class="detail-grid">${gridItems}</div>${boardHtml}${notesHtml}`;
    }

    function buildUpdatePanel(c) {
        const safeRef = c.referenceNumber.replace(/[^A-Z0-9-]/g, '');
        return `
            <div class="detail-section-title">Update Complaint</div>
            <div class="update-panel">
                <div class="update-row">
                    <div class="update-field">
                        <label for="status-${safeRef}">Status</label>
                        <select id="status-${safeRef}">
                            <option value="">(no change)</option>
                            <option value="Open">Open</option>
                            <option value="Acknowledged">Acknowledged</option>
                            <option value="Responded">Responded</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                </div>
                <div class="update-row">
                    <div class="update-field">
                        <label for="response-${safeRef}">Board Response (shown to resident)</label>
                        <textarea id="response-${safeRef}" placeholder="Enter the Board's formal response...">${escHtml(c.boardResponse)}</textarea>
                    </div>
                </div>
                <div class="update-row">
                    <div class="update-field">
                        <label for="notes-${safeRef}">Internal Notes (not shown to resident)</label>
                        <textarea id="notes-${safeRef}" placeholder="Internal notes, deliberations, context...">${escHtml(c.internalNotes)}</textarea>
                    </div>
                </div>
                <div class="notify-row">
                    <input type="checkbox" id="notify-${safeRef}">
                    <label for="notify-${safeRef}">Send response email to resident</label>
                </div>
                <button class="btn-save" id="save-${safeRef}" onclick="saveUpdate('${safeRef}')">Save Update</button>
                <span class="save-feedback" id="feedback-${safeRef}"></span>
            </div>`;
    }

    function toggleCard(ref) {
        document.getElementById('card-' + ref).classList.toggle('expanded');
    }

    function saveUpdate(ref) {
        const status         = document.getElementById('status-'   + ref).value;
        const boardResponse  = document.getElementById('response-' + ref).value.trim();
        const internalNotes  = document.getElementById('notes-'    + ref).value.trim();
        const notifyResident = document.getElementById('notify-'   + ref).checked;
        const btn            = document.getElementById('save-'     + ref);
        const feedback       = document.getElementById('feedback-' + ref);

        if (!status && !boardResponse && !internalNotes) {
            setFeedback(feedback, 'Nothing to save — make a change first.', 'error'); return;
        }
        if (notifyResident && !boardResponse) {
            setFeedback(feedback, 'Enter a Board response before notifying the resident.', 'error'); return;
        }

        let effectiveStatus = status;
        if (boardResponse && !status) {
            const current = allComplaints.find(c => c.referenceNumber === ref);
            if (current && (current.status === 'Open' || current.status === 'Acknowledged')) {
                effectiveStatus = 'Responded';
            }
        }

        btn.disabled = true;
        btn.textContent = 'Saving...';
        setFeedback(feedback, '', '');

        const callbackName = 'saveCallback_' + Date.now();
        let url = CONFIG.BACKEND_URL
            + '?action=updateComplaint'
            + '&ref='      + encodeURIComponent(ref)
            + '&callback=' + callbackName;

        if (effectiveStatus) url += '&status='        + encodeURIComponent(effectiveStatus);
        if (boardResponse)   url += '&boardResponse=' + encodeURIComponent(boardResponse);
        if (internalNotes)   url += '&internalNotes=' + encodeURIComponent(internalNotes);
        if (notifyResident)  url += '&notifyResident=true';

        const timeout = setTimeout(function () {
            cleanup(callbackName); btn.disabled = false; btn.textContent = 'Save Update';
            setFeedback(feedback, 'Timed out — please try again.', 'error');
        }, 15000);

        window[callbackName] = function (data) {
            clearTimeout(timeout); cleanup(callbackName);
            btn.disabled = false; btn.textContent = 'Save Update';

            if (data.success) {
                setFeedback(feedback, 'Saved successfully.', 'success');
                const idx = allComplaints.findIndex(c => c.referenceNumber === ref);
                if (idx !== -1) {
                    if (effectiveStatus) allComplaints[idx].status        = effectiveStatus;
                    if (boardResponse)   allComplaints[idx].boardResponse = boardResponse;
                    if (internalNotes)   allComplaints[idx].internalNotes = internalNotes;
                    const cardEl = document.getElementById('card-' + ref);
                    if (cardEl) {
                        const wasExpanded = cardEl.classList.contains('expanded');
                        cardEl.outerHTML  = buildCard(allComplaints[idx]);
                        const newCard = document.getElementById('card-' + ref);
                        if (newCard && wasExpanded) newCard.classList.add('expanded');
                        const newFeedback = document.getElementById('feedback-' + ref);
                        const newStatusEl = document.getElementById('status-'   + ref);
                        if (newFeedback) setFeedback(newFeedback, 'Saved successfully.', 'success');
                        if (newStatusEl && effectiveStatus) newStatusEl.value = effectiveStatus;
                    }
                }
                updateSummary(allComplaints);
                const notifyEl = document.getElementById('notify-' + ref);
                if (notifyEl) notifyEl.checked = false;
            } else {
                setFeedback(feedback, 'Error: ' + (data.error || 'Unknown error.'), 'error');
            }
        };

        const script = document.createElement('script');
        script.onerror = function () {
            clearTimeout(timeout); cleanup(callbackName);
            btn.disabled = false; btn.textContent = 'Save Update';
            setFeedback(feedback, 'Network error — please try again.', 'error');
        };
        script.src = url;
        document.head.appendChild(script);
    }

    function setFeedback(el, msg, type) { el.textContent = msg; el.className = 'save-feedback ' + type; }

    function showPageError(msg) {
        document.getElementById('complaintList').innerHTML =
            '<div class="error-state"><div class="state-icon">&#9888;&#65039;</div><div class="state-text">' + escHtml(msg) + '</div></div>';
    }

    function statusPillClass(status) {
        return { 'Open': 'status-open', 'Acknowledged': 'status-acknowledged', 'Responded': 'status-responded', 'Closed': 'status-closed' }[status] || '';
    }

    function formatDate(str) {
        if (!str) return '';
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
