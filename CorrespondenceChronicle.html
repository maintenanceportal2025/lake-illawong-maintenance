// PRINT -- SECTION BUILDERS
// =====================================================================
function buildPrintSubmission(m, isComp, residentOnly) {
    var html = '';
    if (isComp) {
        html += pfb('Description', m.description);
        if (m.desiredOutcome)   html += pfb('Desired Outcome', m.desiredOutcome);
        if (m.incidentDateTime) html += pfr('Incident Date/Time', formatDate(m.incidentDateTime));
        if (m.location)         html += pfr('Location', m.location);
        if (m.peopleInvolved)   html += pfb('People Involved', m.peopleInvolved);
        if (m.previousActions)  html += pfb('Previous Actions Taken', m.previousActions);
        html += pfr('Submitted via', m.howSubmitted || 'Digital');
    } else {
        // Nature of Dispute is internal -- omit in party copies (residentOnly = true for party copies)
        if (!residentOnly) html += pfb('Nature of Dispute (Internal)', m.natureOfDispute);
        if (m.partyDescription) html += pfb('Description Sent to Parties', m.partyDescription);
        html += pfr('Logged by', m.loggedBy || '\u2014');
    }
    return html;
}

function buildPrintBoardResponse(m) {
    if (!m.boardResponse) return '<div style="color:#94a3b8;font-style:italic;">No Board Response recorded.</div>';
    var html = '';
    var parts = m.boardResponse.split(/\n\n(?=\[\d{4}-\d{2}-\d{2})/);
    parts.forEach(function(part) {
        var hasSent = part.indexOf('[SENT]') !== -1;
        var clean   = part.replace(/\s*\[SENT\]/g, '').trim();
        var lines   = clean.split('\n');
        var first   = lines[0] || '';
        var rest    = lines.slice(1).join('\n');
        html += '<div class="br-entry">';
        if (hasSent) html += '<span class="br-sent">Sent</span>';
        html += '<div class="br-ts">' + escHtml(first) + '</div>';
        if (rest) html += '<div class="br-text">' + escHtml(rest) + '</div>';
        html += '</div>';
    });
    return html;
}

function buildPrintEscalation(m) {
    var html = '';
    html += pfr('Escalated', formatDate(m.escalatedAt));
    var escOrg = getEscalationBody(m.activityLog);
    if (escOrg) html += pfr('Escalating Organisation', escOrg);
    var finalNote = m.finalNoteDraft || getFinalNote(m.activityLog);
    if (finalNote) html += pfb('Escalation Closure Note', finalNote);
    return html;
}

function buildPrintClosure(m, residentOnly) {
    var html = '';
    var norm = normaliseStatus(m.status);
    html += pfr('Closed', formatDate(m.closedAt));
    html += pfr('Outcome', norm);
    if (m.closureNarrative) {
        var sm = m.closureNarrative.match(/\[SUMMARY\]([\s\S]*?)\[\/SUMMARY\]/);
        var rm = m.closureNarrative.match(/\[REASON\]([\s\S]*?)\[\/REASON\]/);
        var am = m.closureNarrative.match(/\[ACTIONS\]([\s\S]*?)\[\/ACTIONS\]/);
        if (sm) html += pfb('Resolution Summary', sm[1].trim());
        if (rm) html += pfb('Reason Not Resolved', rm[1].trim());
        if (am) html += pfb('Actions Taken', am[1].trim());
    }
    return html;
}

function buildPrintDisputeClosure(m) {
    var html = '';
    if (m.resolvedAt) {
        html += pfr('Resolved', formatDate(m.resolvedAt));
        if (m.resolutionSummary) html += pfb('Resolution Summary', m.resolutionSummary);
    }
    if (m.referredAt)              html += pfr('Referred', formatDate(m.referredAt));
    if (m.referralNarrative)       html += pfb('External Referral Statement', m.referralNarrative);
    if (m.closedAt)                html += pfr('Closed', formatDate(m.closedAt));
    // V1.0.13: externalReferralOutcome (was vicAssistOutcome -- renamed in backend V3.0.9)
    if (m.externalReferralOutcome) html += pfb('External Body Outcome', m.externalReferralOutcome);
    return html;
}

function buildPrintNotes(m, isComp, party, residentOnly) {
    // Returns a printSection string or empty string if no relevant notes exist.
    // Static note fields -- backward compat for records created before EventEntryModal.
    var html = '';
    if (isComp) {
        if (m.noteToResident)                 html += pfb('Note to Resident', m.noteToResident);
        if (m.internalNotes && !residentOnly) html += pfb('Internal Notes (Board only)', m.internalNotes);
    } else {
        if (!residentOnly) {
            if (m.notePartyA)   html += pfb('Party A Notes', m.notePartyA);
            if (m.notePartyB)   html += pfb('Party B Notes', m.notePartyB);
            if (m.noteShared)   html += pfb('Shared Notes', m.noteShared);
            if (m.noteInternal) html += pfb('Internal Notes (Board only)', m.noteInternal);
        } else if (party === 'A') {
            if (m.notePartyA) html += pfb('Board Notes', m.notePartyA);
            if (m.noteShared) html += pfb('Shared Notes', m.noteShared);
        } else if (party === 'B') {
            if (m.notePartyB) html += pfb('Board Notes', m.notePartyB);
            if (m.noteShared) html += pfb('Shared Notes', m.noteShared);
        }
    }
    return html ? printSection('Saved Notes', html) : '';
}

function renderPrintEntry(e) {
    var cls    = { boardlog:'entry-boardlog', inbound:'entry-inbound', system:'entry-system', comment:'entry-comment' }[e.type] || 'entry-system';
    var tagCls = { boardlog:'tag-boardlog', inbound:'tag-inbound', system:'tag-system', comment:'tag-comment' }[e.type] || 'tag-system';
    var tagLbl = { boardlog:'Board Log', inbound:'Inbound', system:'System', comment:'Board Comment' }[e.type] || 'System';
    var meta = '';
    if (e.date || e.actor) {
        meta = '<div class="entry-meta">' +
               '<span class="entry-tag ' + tagCls + '">' + tagLbl + '</span>' +
               escHtml(e.date || '') +
               (e.actor && e.actor !== 'SYSTEM' ? ' \u2014 ' + escHtml(e.actor) : '') +
               '</div>';
    }
    return '<div class="entry ' + cls + '">' + meta +
           '<div class="entry-body">' + escHtml(e.body) + '</div></div>';
}

// =====================================================================
// PRINT -- EVENT ENTRY RENDERER (Events tab structured events)
// =====================================================================
function renderPrintEvent(ev) {
    var isEmail = ['Email Received', 'Email Sent'].indexOf(ev.eventType) !== -1;
    var detail  = '';
    if (isEmail) {
        if (ev.emailDate)    detail += '<div class="entry-meta" style="margin-top:3px;">Date:    ' + escHtml(ev.emailDate)    + '</div>';
        if (ev.emailFrom)    detail += '<div class="entry-meta">From:    ' + escHtml(ev.emailFrom)    + '</div>';
        if (ev.emailTo)      detail += '<div class="entry-meta">To:      ' + escHtml(ev.emailTo)      + '</div>';
        if (ev.emailSubject) detail += '<div class="entry-meta">Subject: ' + escHtml(ev.emailSubject) + '</div>';
    } else if (ev.reference) {
        detail += '<div class="entry-meta" style="margin-top:3px;">Ref: ' + escHtml(ev.reference) + '</div>';
    }
    if (ev.extendedNotes) detail += '<div class="entry-meta" style="margin-top:3px;font-style:italic;">' + escHtml(ev.extendedNotes) + '</div>';
    var visLabel = (ev.visibility || '').split(',').map(function(v) { return v.trim(); }).join(' + ');
    return '<div class="entry entry-event">' +
        '<div class="entry-meta">' +
            '<span class="entry-tag tag-event">' + escHtml(ev.eventType) + '</span>' +
            escHtml(ev.timestamp) +
            ' \u2014 ' + escHtml(ev.user) +
            ' <span style="font-size:9px;background:#e5e7eb;color:#374151;padding:1px 4px;border-radius:2px;">' + escHtml(visLabel) + '</span>' +
        '</div>' +
        '<div class="entry-body">' + escHtml(ev.summary) + '</div>' +
        detail +
    '</div>';
}

function pfr(label, value) {
    return '<div class="field-row"><span class="fl">' + label + '</span><span class="fv">' + escHtml(value || '\u2014') + '</span></div>';
}
function pfb(label, value) {
    return '<div class="field-block"><div class="fb-label">' + label + '</div><div class="fb-value">' + escHtml(value || '\u2014') + '</div></div>';
}

// =====================================================================
// HELPERS
// =====================================================================
function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(val) {
    if (!val) return '';
    var d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function normaliseStatus(s) {
    if (!s) return '';
    if (s === 'Closed') return 'Closed - Resolved';
    if (s === 'Referred to VicAssist') return 'Referred to External Body';
    return s;
}

function statusPillClass(s, isComp) {
    if (!isComp) {
        var map = {
            'Open': 'status-open', 'Under Review': 'status-under-review',
            'Resolved': 'status-resolved', 'Referred to External Body': 'status-referred',
            'Closed': 'status-closed'
        };
        return map[s] || 'status-closed';
    }
    var map = {
        'Open': 'status-open', 'Acknowledged': 'status-acknowledged', 'Responded': 'status-responded',
        'Escalated': 'status-escalated', 'Closed - Resolved': 'status-closed-resolved',
        'Closed - Unresolved': 'status-closed-unresolved',
        'Closed - Resolved (Escalated)': 'status-closed-resolved-escalated',
        'Closed - Unresolved (Escalated)': 'status-closed-unresolved-escalated',
        'Closed - Converted to Dispute': 'status-closed-converted'
    };
    return map[s] || 'status-closed-resolved';
}

function printStatusBadgeClass(s, isComp) {
    if (!isComp) {
        var map = { 'Open':'badge-dispute-open','Under Review':'badge-under-review','Resolved':'badge-closed','Referred to External Body':'badge-referred','Closed':'badge-closed' };
        return map[s] || 'badge-closed';
    }
    var map = {
        'Open':'badge-open','Acknowledged':'badge-acknowledged','Responded':'badge-responded',
        'Escalated':'badge-escalated','Closed - Resolved':'badge-closed','Closed - Unresolved':'badge-closed',
        'Closed - Resolved (Escalated)':'badge-escalated-closed','Closed - Unresolved (Escalated)':'badge-closed',
        'Closed - Converted to Dispute':'badge-converted'
    };
    return map[s] || 'badge-closed';
}

function fieldRow(label, value) {
    return '<div class="field-row"><span class="field-label">' + escHtml(label) + '</span><span class="field-value">' + escHtml(value || '\u2014') + '</span></div>';
}
function fieldBlock(label, value) {
    return '<div class="field-block"><div class="field-block-label">' + escHtml(label) + '</div><div class="field-block-value">' + escHtml(value || '\u2014') + '</div></div>';
}

function getEscalationBody(actLog) {
    if (!actLog) return '';
    var m = actLog.match(/ESCALATION BODY: (.+)/);
    return m ? m[1].trim() : '';
}

function getFinalNote(actLog) {
    if (!actLog) return '';
    var m = actLog.match(/FINAL NOTE: ([\s\S]+?)(?:\n\d{4}-\d{2}-\d{2}|$)/);
    return m ? m[1].trim() : '';
}
</script>
