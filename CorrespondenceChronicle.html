<!--
=====================================================================
CorrespondenceChronicle.html
Lake Illawong Management Central System
=====================================================================
DOCUMENT INFORMATION:
  File Name:        CorrespondenceChronicle.html
  System:           Lake Illawong Management Central System
  Component Type:   Admin Module
  Frontend Version: V1.0.13
  Status:           PRODUCTION
  Created:          June 2026
  Last Modified:    June 2026

PURPOSE:
  Correspondence Chronicle -- unified, filtered correspondence record
  for a single complaint or dispute matter. Reads from the Activity Log
  (System Events column) and the structured Events tab (Board-recorded
  events via EventEntryModal). Produces print-ready report versions:
    Board Record   -- full record: System Events, Matter History,
                      all Events tab entries, Board Notes, and backward-
                      compatible Saved Notes fields.
    Resident Copy  -- complaints only: Resident Events and Note to
                      Resident only. No Board Notes, no System Events.
    Party A Copy   -- disputes only: Party A Events only.
    Party B Copy   -- disputes only: Party B Events only.
  Accessed via Admin Portal. Requires Complaints-Manager or Developer
  role tag. JSONP architecture -- no POST, no CORS.

VERSION HISTORY:
  V1.0.13 (Jun 2026): Events tab integration. Second JSONP call to
    getEvents fires on matter load; result populates five new sections.
    New screen sections: Matter History (all events), Resident Events /
    Party A Events / Party B Events (visibility-filtered), Board Notes
    (Board-visibility events). "Correspondence Timeline" renamed to
    "System Events" consistent with ComplaintsManager V3.0.12 and
    DisputesManager V3.0.35. Print filtering updated per version:
    Board Record shows all; Resident Copy shows Resident Events only;
    Party copies show only their party's events. visMatch() helper added
    for multi-value visibility strings (e.g. "Party A,Board").
    renderEventEntry() and renderPrintEvent() added matching Manager
    rendering. Guard added: if events still loading when Print clicked,
    user is prompted to wait. .vb-party CSS class added for Party copy
    version badge. Fixes: dispute externalReferralOutcome (was
    vicAssistOutcome -- backend renamed at V3.0.9); referralNarrative
    added to closure section; referredAt added to Resolution/Closure
    trigger condition; print doc subtitle now uses dynamic title string.

  V1.0.12 (Jun 2026): Board Notes fields added to screen view and all
    print versions.
    Complaints -- noteToResident (col Z) and internalNotes (col Y).
      Board Record: both shown. Resident Copy: noteToResident only.
    Disputes -- notePartyA (col Z), notePartyB (col AA), noteShared
      (col AB), noteInternal (col AC).
      Board Record: all four. Party A Copy: notePartyA + noteShared.
      Party B Copy: notePartyB + noteShared.
    Print bar dynamic per matter type. doPrint(residentOnly, party).
    buildPrintNotes(m, isComp, party) added.

  V1.0.11 (Jun 2026): Back to Search Results button moved to alongside
    Load Matter button in the reference panel.

  V1.0.10 (Jun 2026): Back to Search Results button added. Caches last
    search results so returning restores the list without re-querying.

  V1.0.9 (Jun 2026): Search by Name/Unit added. Two-tab lookup panel.
    Requires Complaints backend V3.0.3 and Disputes backend V3.0.11.

  V1.0.8 (Jun 2026): Style fixes -- logo, back button, portal label.

  V1.0.7 (Jun 2026): Remove duplicate "Unit" prefix in party/resident
    display.

  V1.0.6 (Jun 2026): Resident Copy correctly excludes Board Comments.

  V1.0.5 (Jun 2026): Skip bare --- separator lines in parseEntry.

  V1.0.4 (Jun 2026): parseBoardLogBody fully rewritten.

  V1.0.3 (Jun 2026): parseBoardLogBody > and --- stripping fixes.

  V1.0.2 (Jun 2026): parseBoardLogBody shows full email body.

  V1.0.0 (Jun 2026): Initial release.

BACKEND URLS:
  Complaints: https://script.google.com/macros/s/AKfycbwkD2K1B8hTdMHwXGNajyRr2FBR_abqhWP33rIM7LgkQzIBIPcJsDQhGOvZxXdxuQuiTA/exec
  Disputes:   https://script.google.com/macros/s/AKfycbx2dwG5mP6Cv-UAqii38FAINvaUvrR2oq-6uv6U_mnKqG8Rzjq56C35lOVHFS9ZsCvw/exec

DEPENDENCIES:
  VerificationModal_V1_0.js (OTP auth + RBAC)
  ManagementCentral backend (OTP verification)
  ComplaintsManager V3.0.10 (addEvent / getEvents)
  DisputesManager V3.0.16+ (addEvent / getEvents)
=====================================================================

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correspondence Chronicle — Lake Illawong</title>
<script src="verificationmodal_v1_0.js"></script>
<style>
:root {
    --primary-blue:       #667eea;
    --primary-blue-dark:  #764ba2;
    --primary-gradient:   linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
    --bg-primary:         #ffffff;
    --bg-secondary:       #f8fafc;
    --text-primary:       #1e293b;
    --text-secondary:     #64748b;
    --border-primary:     #e2e8f0;
    --success-green:      #10b981;
    --warning-amber:      #f59e0b;
    --error-red:          #ef4444;
    --glass-bg:           rgba(255,255,255,0.08);
    --glass-bg-hover:     rgba(255,255,255,0.12);
    --glass-bg-strong:    rgba(255,255,255,0.15);
    --glass-border:       rgba(255,255,255,0.15);
    --glass-border-hover: rgba(255,255,255,0.30);
    --glass-blur:         blur(15px);
    --glass-text:         #ffffff;
    --glass-text-muted:   rgba(255,255,255,0.70);
    --glass-text-subtle:  rgba(255,255,255,0.50);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
    min-height: 100vh;
    color: var(--glass-text);
    line-height: 1.6;
}

.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

/* ── HEADER ── */
.header { text-align: center; margin-bottom: 28px; }
.header-content { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 14px; }
.logo-image { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; padding: 4px; }
.header-text { display: flex; flex-direction: column; align-items: flex-start; }
.header-title { font-size: 2rem; font-weight: 700; line-height: 1.1; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.header-subtitle { font-size: 0.95rem; font-weight: 500; color: rgba(255,255,255,0.85); }
.header-divider { height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.3) 90%, transparent 100%); border-radius: 2px; margin-top: 14px; }

/* ── BACK BUTTON ── */
.portal-back-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 8px 18px; border-radius: 2px;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    display: block; margin: 0 auto 20px auto; transition: background 0.2s;
}
.portal-back-btn:hover { background: rgba(255,255,255,0.25); }

/* ── GLASS PANEL ── */
.glass-panel {
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: 2px; padding: 20px;
}

/* ── LOOKUP PANEL ── */
.lookup-panel { margin-bottom: 20px; }
.lookup-label { font-size: 0.8rem; font-weight: 600; color: var(--glass-text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.lookup-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.glass-input {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 2px;
    color: var(--glass-text); padding: 10px 16px; font-size: 0.95rem; backdrop-filter: var(--glass-blur);
    min-height: 44px; flex: 1; min-width: 200px; max-width: 320px; font-family: inherit;
}
.glass-input::placeholder { color: var(--glass-text-subtle); }
.glass-input:focus { outline: none; background: var(--glass-bg-strong); border-color: var(--glass-border-hover); }
.btn-load {
    background: rgba(16,185,129,0.3); border: 1px solid rgba(16,185,129,0.6); color: #6ee7b7;
    padding: 10px 24px; border-radius: 2px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
    min-height: 44px; transition: all 0.2s; white-space: nowrap;
}
.btn-load:hover { background: rgba(16,185,129,0.45); }
.btn-load:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── RESULT PANEL ── */
.result-panel { margin-top: 20px; display: none; }

/* ── MATTER HEADER ── */
.matter-header {
    background: var(--glass-bg-strong); border: 1px solid var(--glass-border);
    border-radius: 2px; padding: 18px 20px; margin-bottom: 16px;
}
.matter-ref { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.matter-type-badge {
    display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.72rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
}
.badge-complaint { background: rgba(59,130,246,0.35); color: #bfdbfe; border: 1px solid rgba(96,165,250,0.6); }
.badge-dispute   { background: rgba(13,148,136,0.35); color: #99f6e4; border: 1px solid rgba(13,148,136,0.6); }
.matter-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; margin-top: 12px; }
.meta-item { }
.meta-label { font-size: 0.72rem; color: var(--glass-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.meta-value { font-size: 0.88rem; font-weight: 600; color: white; margin-top: 2px; }

/* ── STATUS PILL ── */
.status-pill {
    display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.72rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.status-open             { background: rgba(59,130,246,0.35);  color: #bfdbfe; border: 1px solid rgba(96,165,250,0.6); }
.status-acknowledged     { background: rgba(16,185,129,0.3);   color: #6ee7b7; border: 1px solid rgba(52,211,153,0.6); }
.status-responded        { background: rgba(168,85,247,0.35);  color: #e9d5ff; border: 1px solid rgba(168,85,247,0.7); }
.status-escalated        { background: rgba(249,115,22,0.3);   color: #fed7aa; border: 1px solid rgba(249,115,22,0.6); }
.status-closed-resolved  { background: rgba(148,163,184,0.25); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.5); }
.status-closed-unresolved{ background: rgba(107,114,128,0.3);  color: #d1d5db; border: 1px solid rgba(107,114,128,0.6); }
.status-closed-resolved-escalated   { background: rgba(139,92,246,0.3);  color: #ddd6fe; border: 1px solid rgba(139,92,246,0.6); }
.status-closed-unresolved-escalated { background: rgba(107,114,128,0.3); color: #d1d5db; border: 1px solid rgba(107,114,128,0.6); }
.status-closed-converted { background: rgba(13,148,136,0.3);  color: #99f6e4; border: 1px solid rgba(13,148,136,0.6); }
.status-under-review { background: rgba(245,158,11,0.3);   color: #fde68a; border: 1px solid rgba(245,158,11,0.6); }
.status-resolved     { background: rgba(148,163,184,0.25); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.5); }
.status-referred     { background: rgba(249,115,22,0.3);   color: #fed7aa; border: 1px solid rgba(249,115,22,0.6); }
.status-closed       { background: rgba(107,114,128,0.3);  color: #d1d5db; border: 1px solid rgba(107,114,128,0.6); }

/* ── CHRONICLE SECTIONS ── */
.chronicle-section { margin-bottom: 14px; }
.section-label {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--glass-text-muted); margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.section-body {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 2px; padding: 14px 16px; font-size: 0.875rem; color: rgba(255,255,255,0.88); line-height: 1.6;
}
.field-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.875rem; }
.field-label { color: var(--glass-text-muted); min-width: 130px; flex-shrink: 0; }
.field-value { color: white; }
.field-block { margin-bottom: 12px; }
.field-block-label { font-size: 0.8rem; color: var(--glass-text-muted); margin-bottom: 4px; }
.field-block-value { color: rgba(255,255,255,0.88); font-size: 0.875rem; white-space: pre-wrap; line-height: 1.6; }

/* ── ACTIVITY LOG ENTRIES (System Events / Activity Log) ── */
.activity-entries { display: flex; flex-direction: column; gap: 8px; }
.activity-entry {
    background: rgba(255,255,255,0.05); border-left: 3px solid rgba(255,255,255,0.2);
    border-radius: 0 2px 2px 0; padding: 10px 12px; font-size: 0.83rem;
}
.activity-entry.entry-board-log { border-left-color: rgba(59,130,246,0.6); }
.activity-entry.entry-inbound   { border-left-color: rgba(245,158,11,0.6); }
.activity-entry.entry-system    { border-left-color: rgba(255,255,255,0.15); opacity: 0.7; }
.activity-entry.entry-comment   { border-left-color: rgba(168,85,247,0.6); }
.entry-meta { font-size: 0.78rem; color: var(--glass-text-muted); margin-bottom: 4px; }
.entry-tag  {
    display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.68rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px;
}
.tag-boardlog { background: rgba(59,130,246,0.3);  color: #bfdbfe; }
.tag-inbound  { background: rgba(245,158,11,0.3);  color: #fde68a; }
.tag-system   { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
.tag-comment  { background: rgba(168,85,247,0.3);  color: #e9d5ff; }
.entry-body   { color: rgba(255,255,255,0.85); white-space: pre-wrap; line-height: 1.5; margin-top: 4px; }
.entry-suppressed { color: var(--glass-text-subtle); font-style: italic; font-size: 0.8rem; margin-top: 2px; }

/* ── EVENT ENTRIES (Events tab -- Board-recorded structured events) ── */
.activity-entry.entry-event { border-left-color: rgba(16,185,129,0.6); }
.event-type-tag {
    display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.68rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px;
    background: rgba(16,185,129,0.3); color: #6ee7b7;
}
.event-vis-tag {
    font-size: 0.68rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 2px; padding: 1px 5px; margin-left: 4px; color: var(--glass-text-subtle);
}
.event-detail { font-size: 0.78rem; color: var(--glass-text-muted); margin-top: 3px; }
.event-detail.event-notes { font-style: italic; }
.events-loading { color: var(--glass-text-muted); font-size: 0.875rem; font-style: italic; }

/* ── PRINT BUTTONS ── */
.print-bar {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px;
    padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);
}
.btn-print-board {
    background: rgba(59,130,246,0.3); border: 1px solid rgba(96,165,250,0.6); color: #bfdbfe;
    padding: 12px 28px; border-radius: 2px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
    min-height: 44px; transition: all 0.2s;
}
.btn-print-board:hover { background: rgba(59,130,246,0.45); }
.btn-print-resident {
    background: rgba(16,185,129,0.25); border: 1px solid rgba(16,185,129,0.5); color: #6ee7b7;
    padding: 12px 28px; border-radius: 2px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
    min-height: 44px; transition: all 0.2s;
}
.btn-print-resident:hover { background: rgba(16,185,129,0.4); }
.print-note { font-size: 0.78rem; color: var(--glass-text-muted); align-self: center; }

/* ── STATES ── */
.loading-state { text-align: center; padding: 30px; color: var(--glass-text-muted); }
.spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-notice {
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
    border-radius: 2px; padding: 12px 16px; color: #fca5a5; font-size: 0.875rem; margin-top: 12px;
}
.info-notice {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px; padding: 12px 16px; color: var(--glass-text-muted); font-size: 0.875rem; margin-top: 12px;
}

/* ── ACCESS DENIED ── */
.hidden { display: none !important; }
#deniedView {
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); border-radius: 2px;
    padding: 30px; text-align: center; margin-top: 20px;
}
#deniedView h2 { color: #fca5a5; margin-bottom: 10px; }
#deniedView p  { color: rgba(255,255,255,0.7); margin-bottom: 16px; font-size: 0.9rem; }
.btn-reverify  {
    background: rgba(239,68,68,0.3); border: 1px solid rgba(239,68,68,0.6); color: #fca5a5;
    padding: 10px 24px; border-radius: 2px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
}

/* ── PRINT VERSION BADGE COLOURS ── */
/* .vb-board and .vb-resident defined in print styles string */
/* .vb-party -- Party A / B copies */

@media (max-width: 480px) {
    .header-content { flex-direction: column; gap: 12px; }
    .header-text    { align-items: center; text-align: center; }
    .header-title   { font-size: 1.6rem; }
    .logo-image     { width: 70px; height: 70px; }
    .lookup-row     { flex-direction: column; }
    .glass-input    { max-width: 100%; }
}
</style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo-container">
                <img src="logo.png" alt="Lake Illawong" class="logo-image"
                     onerror="this.style.display='none'">
            </div>
            <div class="header-text">
                <div class="header-title">Correspondence Chronicle</div>
                <div class="header-subtitle">Lake Illawong Residential Club &mdash; Case Correspondence Record</div>
            </div>
        </div>
        <div class="header-divider"></div>
    </div>

    <!-- Back button -->
    <button class="portal-back-btn" onclick="window.location.href='AdminPortal.html'">
        &#8592; Back to Admin Portal
    </button>

    <!-- Access denied -->
    <div id="deniedView" class="hidden">
        <h2>&#128683; Access Denied</h2>
        <p>Your account (<strong><span id="deniedName"></span></strong>) does not have the
           <strong>Complaints-Manager</strong> role required for this module.</p>
        <p>Assigned roles: <span id="deniedRoles"></span></p>
        <button class="btn-reverify" onclick="reVerify()">Try a Different Account</button>
    </div>

    <!-- Main content -->
    <div id="mainContent" class="hidden">

        <!-- Lookup panel -->
        <div class="glass-panel lookup-panel">
            <!-- Tab row -->
            <div style="display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.15);">
                <button id="tabRef" onclick="switchTab('ref')" style="background:rgba(255,255,255,0.15);border:none;border-bottom:2px solid white;color:white;padding:8px 20px;font-size:0.85rem;font-weight:700;cursor:pointer;border-radius:2px 2px 0 0;">Reference</button>
                <button id="tabSearch" onclick="switchTab('search')" style="background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.55);padding:8px 20px;font-size:0.85rem;font-weight:600;cursor:pointer;border-radius:2px 2px 0 0;">Search by Name / Unit</button>
            </div>

            <!-- Reference lookup -->
            <div id="panelRef">
                <div class="lookup-label">Enter Reference Number</div>
                <div class="lookup-row">
                    <input type="text" id="refInput" class="glass-input"
                           placeholder="e.g. COMP-20260601-001 or DISP-20260601-001"
                           onkeydown="if(event.key==='Enter')loadMatter()">
                    <button id="loadBtn" class="btn-load" onclick="loadMatter()">Load Matter</button>
                    <button id="backToResultsBar" onclick="backToResults()" style="display:none;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:white;padding:10px 18px;border-radius:2px;font-weight:600;cursor:pointer;font-size:0.9rem;min-height:44px;white-space:nowrap;">&#8592; Search Results</button>
                </div>
            </div>

            <!-- Name / unit search -->
            <div id="panelSearch" style="display:none;">
                <div class="lookup-label">Search by Resident Name or Unit Number</div>
                <div class="lookup-row">
                    <input type="text" id="searchInput" class="glass-input"
                           placeholder="e.g. Barnett or Unit 9"
                           onkeydown="if(event.key==='Enter')doSearch()">
                    <button id="searchBtn" class="btn-load" onclick="doSearch()">Search</button>
                </div>
                <div id="searchResults" style="margin-top:12px;"></div>
            </div>

            <div id="lookupError"></div>
        </div>

        <!-- Result panel -->
        <div id="resultPanel" class="result-panel">

            <!-- Matter header -->
            <div id="matterHeader" class="matter-header"></div>

            <!-- Chronicle sections -->
            <div id="chronicleSections"></div>

            <!-- Print bar -- rendered dynamically by renderPrintBar() after matter loads -->
            <div class="print-bar" id="printBar" style="display:none;"></div>

        </div>

    </div><!-- /mainContent -->

</div><!-- /container -->
<script>
// =====================================================================
// CONFIGURATION
// =====================================================================
const CONFIG = {
    COMPLAINTS_BACKEND: 'https://script.google.com/macros/s/AKfycbwkD2K1B8hTdMHwXGNajyRr2FBR_abqhWP33rIM7LgkQzIBIPcJsDQhGOvZxXdxuQuiTA/exec',
    DISPUTES_BACKEND:   'https://script.google.com/macros/s/AKfycbx2dwG5mP6Cv-UAqii38FAINvaUvrR2oq-6uv6U_mnKqG8Rzjq56C35lOVHFS9ZsCvw/exec',
    SESSION_KEY:        'portalAdminVerified',
    PORTAL_URL:         'AdminPortal.html',
    ALLOWED_ROLES:      ['Complaints-Manager', 'Developer']
};

// Current loaded matter
let currentMatter = null;
let currentType   = null;  // 'complaint' | 'dispute'
let currentEvents = null;  // null = loading, [] | [...] = loaded
let lastSearchResults = null;
let lastSearchQuery   = '';

// =====================================================================
// AUTH
// =====================================================================
document.addEventListener('DOMContentLoaded', function() {
    const alreadyVerified = VerificationModal.init({
        moduleName: 'Correspondence Chronicle',
        moduleIcon: '\uD83D\uDCDC',
        sessionKey: CONFIG.SESSION_KEY,
        onSuccess:  handleVerificationSuccess
    });
    if (!alreadyVerified) { VerificationModal.show(); }
});

function handleVerificationSuccess(userData) {
    window._sessionUser = userData;
    const roles    = userData.roleTags || [];
    const hasAccess = CONFIG.ALLOWED_ROLES.some(function(r) { return roles.includes(r); });
    if (!hasAccess) {
        document.getElementById('deniedName').textContent  = userData.name  || 'Unknown';
        document.getElementById('deniedRoles').textContent = roles.join(', ') || 'None';
        document.getElementById('deniedView').classList.remove('hidden');
        return;
    }
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('refInput').focus();
}

function reVerify() {
    document.getElementById('deniedView').classList.add('hidden');
    VerificationModal.clearVerification();
    VerificationModal.show();
}

// =====================================================================
// TAB SWITCHING
// =====================================================================
function switchTab(tab) {
    var isRef = tab === 'ref';
    document.getElementById('panelRef').style.display    = isRef ? '' : 'none';
    document.getElementById('panelSearch').style.display = isRef ? 'none' : '';
    document.getElementById('tabRef').style.background        = isRef ? 'rgba(255,255,255,0.15)' : 'transparent';
    document.getElementById('tabRef').style.borderBottomColor = isRef ? 'white' : 'transparent';
    document.getElementById('tabRef').style.color             = isRef ? 'white' : 'rgba(255,255,255,0.55)';
    document.getElementById('tabSearch').style.background        = isRef ? 'transparent' : 'rgba(255,255,255,0.15)';
    document.getElementById('tabSearch').style.borderBottomColor = isRef ? 'transparent' : 'white';
    document.getElementById('tabSearch').style.color             = isRef ? 'rgba(255,255,255,0.55)' : 'white';
    document.getElementById('lookupError').innerHTML = '';
    document.getElementById('searchResults').innerHTML = '';
}

// =====================================================================
// SEARCH
// =====================================================================
function doSearch() {
    var query = (document.getElementById('searchInput').value || '').trim();
    if (!query) {
        document.getElementById('lookupError').innerHTML = '<div class="error-notice">Please enter a name or unit number to search.</div>';
        return;
    }

    var resultsEl = document.getElementById('searchResults');
    resultsEl.innerHTML = '<div class="events-loading">Searching\u2026</div>';

    var isUnit = /^unit\s*\d+$/i.test(query) || /^\d+$/.test(query);
    var unitQuery = query.replace(/^unit\s*/i, '').trim();

    var complaints = null;
    var disputes   = null;
    var done = 0;

    function onBothDone() {
        var results = [];
        (complaints || []).forEach(function(c) {
            results.push({ ref: c.referenceNumber, type: 'complaint', name: c.residentName,
                           unit: c.unitNumber, date: c.submittedAt, status: c.status, category: c.category });
        });
        (disputes || []).forEach(function(d) {
            var name = [d.partyAName, d.partyBName].filter(Boolean).join(' / ');
            var unit = [d.partyAUnit, d.partyBUnit].filter(Boolean).join(' / ');
            results.push({ ref: d.referenceNumber, type: 'dispute', name: name,
                           unit: unit, date: d.loggedAt, status: d.status, category: '' });
        });
        results.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
        renderSearchResults(results, query);
    }

    function fetchComplaints() {
        var cbName = 'searchCb_comp_' + Date.now();
        var action = isUnit ? 'getComplaintsByUnit' : 'getComplaintsByName';
        var param  = isUnit ? 'unit=' + encodeURIComponent(unitQuery) : 'name=' + encodeURIComponent(query);
        var url = CONFIG.COMPLAINTS_BACKEND + '?action=' + action + '&' + param + '&callback=' + cbName;
        var t = setTimeout(function() { delete window[cbName]; complaints = []; done++; if (done === 2) onBothDone(); }, 10000);
        window[cbName] = function(data) {
            clearTimeout(t); delete window[cbName];
            complaints = (data && data.success && data.complaints) ? data.complaints : [];
            done++; if (done === 2) onBothDone();
        };
        var s = document.createElement('script'); s.src = url; document.head.appendChild(s);
    }

    function fetchDisputes() {
        var cbName = 'searchCb_disp_' + Date.now();
        var action = isUnit ? 'getDisputesByUnit' : 'getDisputesByName';
        var param  = isUnit ? 'unit=' + encodeURIComponent(unitQuery) : 'name=' + encodeURIComponent(query);
        var url = CONFIG.DISPUTES_BACKEND + '?action=' + action + '&' + param + '&callback=' + cbName;
        var t = setTimeout(function() { delete window[cbName]; disputes = []; done++; if (done === 2) onBothDone(); }, 10000);
        window[cbName] = function(data) {
            clearTimeout(t); delete window[cbName];
            disputes = (data && data.success && data.disputes) ? data.disputes : [];
            done++; if (done === 2) onBothDone();
        };
        var s = document.createElement('script'); s.src = url; document.head.appendChild(s);
    }

    fetchComplaints();
    fetchDisputes();
}

function renderSearchResults(results, query) {
    lastSearchResults = results;
    lastSearchQuery   = query;
    var el = document.getElementById('searchResults');
    if (results.length === 0) {
        el.innerHTML = '<div class="info-notice">No matters found matching "' + escHtml(query) + '".</div>';
        return;
    }

    var html = '<div style="font-size:0.78rem;color:var(--glass-text-muted);margin-bottom:8px;">' + results.length + ' matter' + (results.length !== 1 ? 's' : '') + ' found \u2014 click to load Chronicle</div>';
    results.forEach(function(r) {
        var typeColor = r.type === 'complaint' ? '#bfdbfe' : '#99f6e4';
        var typeBg    = r.type === 'complaint' ? 'rgba(59,130,246,0.3)' : 'rgba(13,148,136,0.3)';
        var typeBorder= r.type === 'complaint' ? 'rgba(96,165,250,0.6)' : 'rgba(13,148,136,0.6)';
        html += '<div onclick="loadFromSearch(\u0027' + r.ref + '\u0027)" style="cursor:pointer;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:2px;transition:background 0.15s;">'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
            + '<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:0.68rem;font-weight:700;text-transform:uppercase;background:' + typeBg + ';color:' + typeColor + ';border:1px solid ' + typeBorder + ';">' + r.type + '</span>'
            + '<span style="font-size:0.85rem;font-weight:700;color:white;">' + escHtml(r.ref) + '</span>'
            + '<span style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-left:auto;">' + formatDate(r.date) + '</span>'
            + '</div>'
            + '<div style="font-size:0.82rem;color:rgba(255,255,255,0.85);">' + escHtml(r.name) + ' \u2014 ' + escHtml(r.unit) + '</div>'
            + (r.category ? '<div style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:2px;">' + escHtml(r.category) + '</div>' : '')
            + '<div style="font-size:0.72rem;color:rgba(255,255,255,0.45);margin-top:2px;">' + escHtml(r.status) + '</div>'
            + '</div>';
    });
    el.innerHTML = html;
}

function loadFromSearch(ref) {
    switchTab('ref');
    document.getElementById('refInput').value = ref;
    loadMatter(true);
}

// =====================================================================
// BACK TO RESULTS
// =====================================================================
function backToResults() {
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('backToResultsBar').style.display = 'none';
    switchTab('search');
    if (lastSearchResults !== null) {
        renderSearchResults(lastSearchResults, lastSearchQuery);
    }
}

// =====================================================================
// LOOKUP
// =====================================================================
function loadMatter(fromSearch) {
    const raw = (document.getElementById('refInput').value || '').trim().toUpperCase();
    const errEl = document.getElementById('lookupError');
    errEl.innerHTML = '';

    if (!raw) {
        errEl.innerHTML = '<div class="error-notice">Please enter a reference number.</div>';
        return;
    }

    const isComplaint = raw.startsWith('COMP-');
    const isDispute   = raw.startsWith('DISP-');

    if (!isComplaint && !isDispute) {
        errEl.innerHTML = '<div class="error-notice">Reference must start with COMP- or DISP-.</div>';
        return;
    }

    const btn = document.getElementById('loadBtn');
    btn.disabled = true;
    btn.textContent = 'Loading\u2026';

    document.getElementById('resultPanel').style.display = 'none';
    currentMatter = null;
    currentType   = null;
    currentEvents = null;

    const callbackName = 'chronicleCallback_' + Date.now();
    const backendUrl   = isComplaint ? CONFIG.COMPLAINTS_BACKEND : CONFIG.DISPUTES_BACKEND;
    const action       = isComplaint ? 'getComplaintByRef' : 'getDisputeByRef';
    const url = backendUrl + '?action=' + action + '&ref=' + encodeURIComponent(raw) + '&callback=' + callbackName;

    const timeout = setTimeout(function() {
        cleanup(callbackName);
        btn.disabled = false;
        btn.textContent = 'Load Matter';
        errEl.innerHTML = '<div class="error-notice">Server did not respond. Please try again.</div>';
    }, 15000);

    window[callbackName] = function(data) {
        clearTimeout(timeout);
        cleanup(callbackName);
        btn.disabled = false;
        btn.textContent = 'Load Matter';

        if (!data || !data.success || (!data.complaint && !data.dispute)) {
            errEl.innerHTML = '<div class="error-notice">Matter not found: ' + escHtml(raw) + '</div>';
            return;
        }

        currentMatter = data.complaint || data.dispute;
        currentType   = isComplaint ? 'complaint' : 'dispute';
        currentEvents = null; // events loading -- reset before renderMatter so placeholders show

        document.getElementById('backToResultsBar').style.display = (fromSearch && lastSearchResults) ? '' : 'none';
        renderMatter();
        loadEvents(raw); // fire second JSONP call for Events tab
    };

    const script = document.createElement('script');
    script.onerror = function() {
        clearTimeout(timeout);
        cleanup(callbackName);
        btn.disabled = false;
        btn.textContent = 'Load Matter';
        errEl.innerHTML = '<div class="error-notice">Network error. Please try again.</div>';
    };
    script.src = url;
    document.head.appendChild(script);
}

function cleanup(name) {
    delete window[name];
    var s = document.querySelector('script[src*="' + name + '"]');
    if (s && s.parentNode) s.parentNode.removeChild(s);
}

// =====================================================================
// EVENTS TAB -- LOAD
// =====================================================================
function loadEvents(ref) {
    const isComp  = ref.startsWith('COMP-');
    const backend = isComp ? CONFIG.COMPLAINTS_BACKEND : CONFIG.DISPUTES_BACKEND;
    const cbName  = 'eventsCallback_' + Date.now();

    const timeout = setTimeout(function() {
        delete window[cbName];
        // Guard: discard if user has loaded a different matter since
        if (!currentMatter || currentMatter.referenceNumber !== ref) return;
        currentEvents = [];
        updateEventSections([]);
    }, 12000);

    window[cbName] = function(data) {
        clearTimeout(timeout);
        delete window[cbName];
        if (!currentMatter || currentMatter.referenceNumber !== ref) return;
        currentEvents = (data && data.success && data.events) ? data.events : [];
        updateEventSections(currentEvents);
    };

    const s = document.createElement('script');
    s.onerror = function() {
        clearTimeout(timeout);
        delete window[cbName];
        if (!currentMatter || currentMatter.referenceNumber !== ref) return;
        currentEvents = [];
        updateEventSections([]);
    };
    s.src = backend + '?action=getEvents&matterRef=' + encodeURIComponent(ref) + '&callback=' + cbName;
    document.head.appendChild(s);
}

// =====================================================================
// EVENTS TAB -- UPDATE DOM PLACEHOLDERS
// =====================================================================
function updateEventSections(events) {
    const isComp = currentType === 'complaint';

    function fill(id, filteredEvents, emptyMsg) {
        var el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = filteredEvents.length
            ? filteredEvents.map(renderEventEntry).join('')
            : '<div class="events-loading">' + escHtml(emptyMsg) + '</div>';
    }

    // Matter History -- all events
    fill('evtSection-all', events, 'No events recorded.');

    if (isComp) {
        // Resident Events -- visibility includes Resident
        fill('evtSection-resident', events.filter(function(e) { return visMatch(e.visibility, 'Resident'); }),
             'No resident-visible events recorded.');
    } else {
        // Party A Events
        fill('evtSection-partyA', events.filter(function(e) { return visMatch(e.visibility, 'Party A'); }),
             'No Party A events recorded.');
        // Party B Events
        fill('evtSection-partyB', events.filter(function(e) { return visMatch(e.visibility, 'Party B'); }),
             'No Party B events recorded.');
    }

    // Board Notes -- visibility includes Board
    fill('evtSection-board', events.filter(function(e) { return visMatch(e.visibility, 'Board'); }),
         'No board notes recorded.');
}

// =====================================================================
// visMatch -- multi-value visibility check
// visibility is a comma-separated string e.g. "Party A,Board"
// =====================================================================
function visMatch(visibility, tag) {
    if (!visibility) return false;
    return visibility.split(',').map(function(v) { return v.trim(); }).indexOf(tag) !== -1;
}

// =====================================================================
// RENDER EVENT ENTRY (screen)
// =====================================================================
function renderEventEntry(ev) {
    var isEmail = ['Email Received', 'Email Sent'].indexOf(ev.eventType) !== -1;
    var detail = '';
    if (isEmail) {
        if (ev.emailDate)    detail += '<div class="event-detail">Date: '    + escHtml(ev.emailDate)    + '</div>';
        if (ev.emailFrom)    detail += '<div class="event-detail">From: '    + escHtml(ev.emailFrom)    + '</div>';
        if (ev.emailTo)      detail += '<div class="event-detail">To: '      + escHtml(ev.emailTo)      + '</div>';
        if (ev.emailSubject) detail += '<div class="event-detail">Subject: ' + escHtml(ev.emailSubject) + '</div>';
    } else if (ev.reference) {
        detail += '<div class="event-detail">Ref: ' + escHtml(ev.reference) + '</div>';
    }
    if (ev.extendedNotes) detail += '<div class="event-detail event-notes">' + escHtml(ev.extendedNotes) + '</div>';
    var visLabel = (ev.visibility || '').split(',').map(function(v) { return v.trim(); }).join(' + ');
    return '<div class="activity-entry entry-event">' +
        '<div class="entry-meta">' +
            '<span class="event-type-tag">' + escHtml(ev.eventType) + '</span>' +
            escHtml(ev.timestamp) +
            ' \u2014 ' + escHtml(ev.user) +
            ' <span class="event-vis-tag">' + escHtml(visLabel) + '</span>' +
        '</div>' +
        '<div class="entry-body">' + escHtml(ev.summary) + '</div>' +
        detail +
    '</div>';
}

// =====================================================================
// RENDER
// =====================================================================
function renderMatter() {
    const m = currentMatter;
    const isComp = currentType === 'complaint';

    const status = normaliseStatus(m.status);
    document.getElementById('matterHeader').innerHTML =
        '<div class="matter-ref">' + escHtml(m.referenceNumber) + '</div>' +
        '<span class="matter-type-badge ' + (isComp ? 'badge-complaint' : 'badge-dispute') + '">' +
            (isComp ? 'Complaint' : 'Dispute') +
        '</span> ' +
        '<span class="status-pill ' + statusPillClass(status, isComp) + '">' + escHtml(status) + '</span>' +
        '<div class="matter-meta">' + buildMetaFields(m, isComp) + '</div>';

    document.getElementById('chronicleSections').innerHTML = buildSections(m, isComp);

    renderPrintBar(isComp);

    document.getElementById('lookupError').innerHTML = '';
    const rp = document.getElementById('resultPanel');
    rp.style.display = 'block';
}

function renderPrintBar(isComp) {
    var bar = document.getElementById('printBar');
    if (!bar) return;
    if (isComp) {
        bar.innerHTML =
            '<button class="btn-print-board" onclick="doPrint(false, null)">&#128438; Print Board Record</button>' +
            '<button class="btn-print-resident" onclick="doPrint(true, null)">&#128209; Print Resident Copy</button>' +
            '<span class="print-note">Board Record includes System Events, all Events tab entries, and Board Notes. Resident Copy includes Resident Events and Note to Resident only.</span>';
    } else {
        bar.innerHTML =
            '<button class="btn-print-board" onclick="doPrint(false, null)">&#128438; Print Board Record</button>' +
            '<button class="btn-print-resident" onclick="doPrint(true, \'A\')">&#128209; Print Party A Copy</button>' +
            '<button class="btn-print-resident" onclick="doPrint(true, \'B\')">&#128209; Print Party B Copy</button>' +
            '<span class="print-note">Board Record includes all sections. Party copies include only events visible to that party. Open the matter card to load events before printing.</span>';
    }
    bar.style.display = '';
}

function buildMetaFields(m, isComp) {
    var fields = [];
    if (isComp) {
        fields.push(['Resident',    m.residentName + ' (' + m.unitNumber + ')']);
        fields.push(['Category',    m.category]);
        fields.push(['Lodged',      formatDate(m.submittedAt)]);
        if (m.acknowledgedAt) fields.push(['Acknowledged', formatDate(m.acknowledgedAt)]);
        if (m.respondedAt)    fields.push(['Responded',    formatDate(m.respondedAt)]);
        if (m.escalatedAt)    fields.push(['Escalated',    formatDate(m.escalatedAt)]);
        if (m.closedAt)       fields.push(['Closed',       formatDate(m.closedAt)]);
    } else {
        if (m.partyAName) fields.push(['Party A', m.partyAName + (m.partyAUnit ? ' (' + m.partyAUnit + ')' : '')]);
        if (m.partyBName) fields.push(['Party B', m.partyBName + (m.partyBUnit ? ' (' + m.partyBUnit + ')' : '')]);
        fields.push(['Logged', formatDate(m.loggedAt || m.submittedAt)]);
        if (m.reviewDue)    fields.push(['Review Due', formatDate(m.reviewDue)]);
        if (m.resolvedAt)   fields.push(['Resolved',   formatDate(m.resolvedAt)]);
        if (m.referredAt)   fields.push(['Referred',   formatDate(m.referredAt)]);
        if (m.closedAt)     fields.push(['Closed',     formatDate(m.closedAt)]);
    }
    return fields.map(function(f) {
        return '<div class="meta-item"><div class="meta-label">' + escHtml(f[0]) + '</div><div class="meta-value">' + escHtml(f[1] || '\u2014') + '</div></div>';
    }).join('');
}

function buildSections(m, isComp) {
    var html = '';

    // ── 1. Submission details
    html += section('Original Submission', buildSubmission(m, isComp));

    // ── 2. Board Response (complaints only)
    if (isComp && m.boardResponse) {
        html += section('Board Response', buildBoardResponse(m));
    }

    // ── 3. Process Statement (disputes only)
    if (!isComp && m.processStatement) {
        html += section('Process Statement', '<div class="field-block-value">' + escHtml(m.processStatement) + '</div>');
    }

    // ── 4. Escalation record (complaints only)
    if (isComp && m.escalatedAt) {
        html += section('Escalation Record', buildEscalation(m));
    }

    // ── 5. Closure
    if (isComp && m.closedAt) {
        html += section('Closure', buildClosure(m));
    }
    // referredAt added to trigger condition (V1.0.13 fix)
    if (!isComp && (m.resolvedAt || m.closedAt || m.referredAt)) {
        html += section('Resolution / Closure', buildDisputeClosure(m));
    }

    // ── 6. System Events (Activity Log -- renamed from "Correspondence Timeline")
    var sysEntries = parseActivityLog(m.activityLog, isComp, false);
    if (sysEntries.length > 0) {
        html += section('System Events',
            '<div class="activity-entries">' +
            sysEntries.map(renderEntry).join('') +
            '</div>');
    } else {
        html += section('System Events',
            '<div style="color:var(--glass-text-muted);font-size:0.875rem;font-style:italic;">No system events recorded.</div>');
    }

    // ── 7. Events tab sections (placeholders filled by updateEventSections)

    // Matter History -- all Events tab entries
    html += section('Matter History',
        '<div id="evtSection-all" class="activity-entries">' +
        '<div class="events-loading">Loading events\u2026</div>' +
        '</div>');

    if (isComp) {
        // Resident Events
        html += section('Resident Events',
            '<div id="evtSection-resident" class="activity-entries">' +
            '<div class="events-loading">Loading events\u2026</div>' +
            '</div>');
    } else {
        // Party A Events
        html += section('Party A Events',
            '<div id="evtSection-partyA" class="activity-entries">' +
            '<div class="events-loading">Loading events\u2026</div>' +
            '</div>');
        // Party B Events
        html += section('Party B Events',
            '<div id="evtSection-partyB" class="activity-entries">' +
            '<div class="events-loading">Loading events\u2026</div>' +
            '</div>');
    }

    // Board Notes (Events tab -- Board-visibility events)
    html += section('Board Notes',
        '<div id="evtSection-board" class="activity-entries">' +
        '<div class="events-loading">Loading events\u2026</div>' +
        '</div>');

    // ── 8. Saved Notes (static note fields -- backward compat for pre-EventModal records)
    var savedNotesHtml = '';
    if (isComp) {
        if (m.noteToResident)             savedNotesHtml += fieldBlock('Note to Resident', m.noteToResident);
        if (m.internalNotes)              savedNotesHtml += fieldBlock('Internal Notes (Board only)', m.internalNotes);
    } else {
        if (m.notePartyA)   savedNotesHtml += fieldBlock('Party A Notes', m.notePartyA);
        if (m.notePartyB)   savedNotesHtml += fieldBlock('Party B Notes', m.notePartyB);
        if (m.noteShared)   savedNotesHtml += fieldBlock('Shared Notes', m.noteShared);
        if (m.noteInternal) savedNotesHtml += fieldBlock('Internal Notes (Board only)', m.noteInternal);
    }
    if (savedNotesHtml) {
        html += section('Saved Notes', savedNotesHtml);
    }

    return html;
}

function section(label, body) {
    return '<div class="chronicle-section">' +
               '<div class="section-label">' + escHtml(label) + '</div>' +
               '<div class="section-body">' + body + '</div>' +
           '</div>';
}

function buildSubmission(m, isComp) {
    var html = '';
    if (isComp) {
        html += fieldBlock('Description', m.description);
        if (m.desiredOutcome)   html += fieldBlock('Desired Outcome', m.desiredOutcome);
        if (m.incidentDateTime) html += fieldRow('Incident Date/Time', formatDate(m.incidentDateTime));
        if (m.location)         html += fieldRow('Location', m.location);
        if (m.peopleInvolved)   html += fieldBlock('People Involved', m.peopleInvolved);
        if (m.previousActions)  html += fieldBlock('Previous Actions Taken', m.previousActions);
        html += fieldRow('Submitted via', m.howSubmitted || 'Digital');
    } else {
        html += fieldBlock('Nature of Dispute (Internal)', m.natureOfDispute);
        if (m.partyDescription) html += fieldBlock('Description Sent to Parties', m.partyDescription);
        html += fieldRow('Logged by', m.loggedBy || '\u2014');
    }
    return html;
}

function buildBoardResponse(m) {
    var html = '';
    if (!m.boardResponse) return '<span style="color:var(--glass-text-muted);font-style:italic;">No Board Response recorded.</span>';
    var parts = m.boardResponse.split(/\n\n(?=\[\d{4}-\d{2}-\d{2})/);
    parts.forEach(function(part) {
        var hasSent = part.indexOf('[SENT]') !== -1;
        var clean   = part.replace(/\s*\[SENT\]/g, '').trim();
        var lines   = clean.split('\n');
        var first   = lines[0] || '';
        var rest    = lines.slice(1).join('\n');
        html += '<div style="margin-bottom:10px;padding:10px 12px;background:rgba(255,255,255,0.05);border-left:3px solid rgba(168,85,247,0.5);border-radius:0 2px 2px 0;">';
        if (hasSent) html += '<span style="display:inline-block;background:rgba(110,231,183,0.2);border:1px solid rgba(110,231,183,0.5);color:#6ee7b7;font-size:0.68rem;font-weight:700;padding:1px 7px;border-radius:10px;margin-right:6px;">Sent</span>';
        html += '<span style="font-size:0.78rem;color:var(--glass-text-muted);">' + escHtml(first) + '</span>';
        if (rest) html += '<div style="margin-top:4px;white-space:pre-wrap;font-size:0.875rem;color:rgba(255,255,255,0.88);">' + escHtml(rest) + '</div>';
        html += '</div>';
    });
    return html;
}

function buildEscalation(m) {
    var html = '';
    html += fieldRow('Escalated', formatDate(m.escalatedAt));
    var escOrg = getEscalationBody(m.activityLog);
    if (escOrg) html += fieldRow('Escalating Organisation', escOrg);
    var finalNote = m.finalNoteDraft || getFinalNote(m.activityLog);
    if (finalNote) html += fieldBlock('Escalation Closure Note', finalNote);
    return html;
}

function buildClosure(m) {
    var html = '';
    var norm = normaliseStatus(m.status);
    html += fieldRow('Closed', formatDate(m.closedAt));
    html += fieldRow('Outcome', norm);
    if (m.closureNarrative) {
        var sm = m.closureNarrative.match(/\[SUMMARY\]([\s\S]*?)\[\/SUMMARY\]/);
        var rm = m.closureNarrative.match(/\[REASON\]([\s\S]*?)\[\/REASON\]/);
        var am = m.closureNarrative.match(/\[ACTIONS\]([\s\S]*?)\[\/ACTIONS\]/);
        if (sm) html += fieldBlock('Resolution Summary', sm[1].trim());
        if (rm) html += fieldBlock('Reason Not Resolved', rm[1].trim());
        if (am) html += fieldBlock('Actions Taken', am[1].trim());
    }
    return html;
}

function buildDisputeClosure(m) {
    var html = '';
    if (m.resolvedAt) {
        html += fieldRow('Resolved', formatDate(m.resolvedAt));
        if (m.resolutionSummary) html += fieldBlock('Resolution Summary', m.resolutionSummary);
    }
    if (m.referredAt)              html += fieldRow('Referred', formatDate(m.referredAt));
    if (m.referralNarrative)       html += fieldBlock('External Referral Statement', m.referralNarrative);
    if (m.closedAt)                html += fieldRow('Closed', formatDate(m.closedAt));

    if (m.externalReferralOutcome) html += fieldBlock('External Body Outcome', m.externalReferralOutcome);
    return html;
}

// =====================================================================
// ACTIVITY LOG PARSING (System Events column)
// =====================================================================
// Entry types:
//   [BOARD LOG] -- Board-forwarded email. Board: header + body. Party/Resident: omitted.
//   [INBOUND]   -- Stray inbound reply. Board: shown. Party/Resident: omitted.
//   SYSTEM      -- Automated system events. Board: all. Resident: shown (system only).
//                  Disputes party copies: omitted entirely (caller controls this).
//   userName    -- Board comment. Board: shown. Party/Resident: omitted.

var INTERNAL_KEYWORDS = [
    'Internal note',
    'internal note',
    '[INTERNAL]',
    'Board only',
    'board only'
];

var PATHWAY_PATTERNS = [
    /OUTCOME OF ESCALATION PROCESS[\s\S]*?-{10,}/g,
    /YOUR RIGHTS FOLLOWING[\s\S]*?-{10,}/g,
    /YOUR EXTERNAL OPTIONS[\s\S]*?-{10,}/g,
    /YOUR RIGHTS FOLLOWING RESOLUTION[\s\S]*?-{10,}/g,
    /ESCALATION BODY:.*$/gm
];

function parseActivityLog(raw, isComp, residentOnly) {
    if (!raw) return [];

    // Complaints: entries separated by \n, disputes by \n\n
    var sep     = isComp ? '\n' : '\n\n';
    var entries = raw.split(sep).filter(function(e) { return e.trim(); });

    // Complaints are prepended (newest first in sheet) -- reverse to chronological
    entries = entries.reverse();

    var result = [];
    entries.forEach(function(rawEntry) {
        var e = parseEntry(rawEntry.trim());
        if (!e) return;

        e.body = stripPathwayBlocks(e.body);

        if (residentOnly) {
            if (e.type === 'boardlog')  return;
            if (e.type === 'inbound')   return;
            if (e.type === 'comment')   return;
            if (containsInternalKeyword(e.body)) return;
        }

        result.push(e);
    });

    return result;
}

function parseEntry(raw) {
    if (!raw) return null;
    if (raw.trim() === '---') return null;

    var headerMatch = raw.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2})\s*\|\s*([^|]+)\|\s*([\s\S]*)$/);
    if (!headerMatch) {
        return { date: '', actor: '', body: raw, type: 'system', raw: raw };
    }

    var date  = headerMatch[1].trim();
    var actor = headerMatch[2].trim();
    var body  = headerMatch[3].trim();
    var type  = 'comment';

    if (actor === 'SYSTEM') {
        if (body.indexOf('[BOARD LOG]') !== -1) {
            type = 'boardlog';
            body = parseBoardLogBody(body);
        } else if (body.indexOf('[INBOUND]') !== -1) {
            type = 'inbound';
        } else {
            type = 'system';
        }
    }

    return { date: date, actor: actor, body: body, type: type, raw: raw };
}

function parseBoardLogBody(body) {
    var text = body.replace('[BOARD LOG]', '').trim();
    var lines = text.split('\n');
    var firstDash = -1;
    var lastDash  = -1;
    for (var i = 0; i < lines.length; i++) {
        if (lines[i].trim() === '---') {
            if (firstDash === -1) firstDash = i;
            else lastDash = i;
        }
    }

    var metaLines = firstDash !== -1 ? lines.slice(0, firstDash) : lines;
    var bodyEnd   = lastDash  !== -1 ? lastDash : lines.length;
    var bodyLines = firstDash !== -1 ? lines.slice(firstDash + 1, bodyEnd) : [];

    var fullMeta      = metaLines.join(' ');
    var senderMatch   = fullMeta.match(/Forwarded to log by\s+(.+?)(?:\s+Received:|$)/);
    var receivedLine  = metaLines.find(function(l) { return l.trim().indexOf('Received:') === 0; });
    var subjectLine   = metaLines.find(function(l) { return l.trim().indexOf('Subject:')  === 0; });
    var receivedVal   = receivedLine ? receivedLine.replace('Received:', '').trim() : '';
    var subjectVal    = subjectLine  ? subjectLine.replace('Subject:',  '').trim() : '';

    var cleanLines = [];
    bodyLines.forEach(function(line) {
        line = line.replace(/\r/g, '').trim();
        line = line.replace(/^>+\s*/,  '');
        line = line.replace(/^\s*>\s*/, '');
        cleanLines.push(line);
    });
    while (cleanLines.length && !cleanLines[0])                   cleanLines.shift();
    while (cleanLines.length && !cleanLines[cleanLines.length-1]) cleanLines.pop();
    var cleanBody = cleanLines.join('\n');

    var out = [];
    if (senderMatch) out.push('From:     ' + senderMatch[1].trim());
    if (receivedVal) out.push('Received: ' + receivedVal);
    if (subjectVal)  out.push('Subject:  ' + subjectVal);
    if (cleanBody)   out.push('', cleanBody);
    return out.join('\n');
}

function stripPathwayBlocks(text) {
    if (!text) return text;
    PATHWAY_PATTERNS.forEach(function(pattern) {
        text = text.replace(pattern, '[Pathway notice omitted]');
    });
    text = text.replace(/(\[Pathway notice omitted\]\s*){2,}/g, '[Pathway notice omitted]\n');
    return text.trim();
}

function containsInternalKeyword(text) {
    if (!text) return false;
    return INTERNAL_KEYWORDS.some(function(kw) { return text.indexOf(kw) !== -1; });
}

function renderEntry(e) {
    var typeClass = {
        boardlog: 'entry-board-log',
        inbound:  'entry-inbound',
        system:   'entry-system',
        comment:  'entry-comment'
    }[e.type] || 'entry-system';

    var tagClass = {
        boardlog: 'tag-boardlog',
        inbound:  'tag-inbound',
        system:   'tag-system',
        comment:  'tag-comment'
    }[e.type] || 'tag-system';

    var tagLabel = {
        boardlog: 'Board Log',
        inbound:  'Inbound',
        system:   'System',
        comment:  'Board Comment'
    }[e.type] || 'System';

    var meta = '';
    if (e.date || e.actor) {
        meta = '<div class="entry-meta">' +
               '<span class="entry-tag ' + tagClass + '">' + tagLabel + '</span>' +
               (e.date  ? escHtml(e.date)  : '') +
               (e.actor && e.actor !== 'SYSTEM' ? ' \u2014 ' + escHtml(e.actor) : '') +
               '</div>';
    }

    return '<div class="activity-entry ' + typeClass + '">' +
               meta +
               '<div class="entry-body">' + escHtml(e.body) + '</div>' +
           '</div>';
}

// =====================================================================
// PRINT
// =====================================================================
function doPrint(residentOnly, party) {
    if (!currentMatter) return;

    // Guard: events must be loaded before printing
    if (currentEvents === null) {
        alert('Events are still loading \u2014 please wait a moment and try again.');
        return;
    }

    const m      = currentMatter;
    const isComp = currentType === 'complaint';
    var title;
    if (!residentOnly)       title = 'Board Record';
    else if (party === 'A')  title = 'Party A Copy';
    else if (party === 'B')  title = 'Party B Copy';
    else                     title = 'Resident Copy';
    const norm = normaliseStatus(m.status);

    // Determine version badge class
    var vbClass = !residentOnly ? 'vb-board'
                : (party === 'A' || party === 'B') ? 'vb-party'
                : 'vb-resident';

    // ── System Events (Activity Log) ──────────────────────────────────
    // Complaints: shown in both versions (Resident Copy filtered to system-only entries)
    // Disputes:   shown in Board Record only; party copies omit entirely
    var sysEventsHtml = '';
    if (isComp) {
        var sysEntries = parseActivityLog(m.activityLog, isComp, residentOnly);
        if (sysEntries.length > 0) {
            sysEventsHtml = printSection('System Events',
                sysEntries.map(renderPrintEntry).join(''));
        }
    } else if (!residentOnly) {
        var sysEntries = parseActivityLog(m.activityLog, isComp, false);
        if (sysEntries.length > 0) {
            sysEventsHtml = printSection('System Events',
                sysEntries.map(renderPrintEntry).join(''));
        }
    }

    // ── Events tab sections ───────────────────────────────────────────
    var cachedEvents = currentEvents || [];

    // Matter History -- all events; Board Record only
    var matterHistoryHtml = '';
    if (!residentOnly) {
        matterHistoryHtml = cachedEvents.length
            ? printSection('Matter History', cachedEvents.map(renderPrintEvent).join(''))
            : printSection('Matter History', '<div style="color:#94a3b8;font-style:italic;font-size:12px;">No events recorded.</div>');
    }

    // Filtered event sections
    var eventsHtml = '';
    if (isComp) {
        // Resident Events -- both versions
        var residentEvents = cachedEvents.filter(function(e) { return visMatch(e.visibility, 'Resident'); });
        if (residentEvents.length) {
            eventsHtml += printSection('Resident Events', residentEvents.map(renderPrintEvent).join(''));
        }
        // Board Notes (Events tab) -- Board Record only
        if (!residentOnly) {
            var boardEvents = cachedEvents.filter(function(e) { return visMatch(e.visibility, 'Board'); });
            if (boardEvents.length) {
                eventsHtml += printSection('Board Notes', boardEvents.map(renderPrintEvent).join(''));
            }
        }
    } else {
        // Party A Events -- Full Record and Party A Copy
        var partyAEvents = cachedEvents.filter(function(e) { return visMatch(e.visibility, 'Party A'); });
        if ((!residentOnly || party === 'A') && partyAEvents.length) {
            eventsHtml += printSection('Party A Events', partyAEvents.map(renderPrintEvent).join(''));
        }
        // Party B Events -- Full Record and Party B Copy

        if ((!residentOnly || party === 'B') && partyBEvents.length) {
            eventsHtml += printSection('Party B Events', partyBEvents.map(renderPrintEvent).join(''));
        }

        if (!residentOnly) {
            var boardEvents = cachedEvents.filter(function(e) { return visMatch(e.visibility, 'Board'); });
            if (boardEvents.length) {
                eventsHtml += printSection('Board Notes', boardEvents.map(renderPrintEvent).join(''));

    // ── Party copy banner (disputes only) ────────────────────────────

        partyCopyBanner = '<div style="background:#f0fdfa;border:1px solid #0d9488;padding:8px 12px;margin-bottom:16px;font-size:10px;color:#0f766e;font-weight:700;">'
            + partyLabel + ' \u2014 Board Notes, Matter History and System Events are not included in this copy.'
            + '</div>';
    }

    // ── Build HTML ────────────────────────────────────────────────────
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<title>Correspondence Chronicle \u2014 ' + escHtml(m.referenceNumber) + ' \u2014 ' + title + '</title>' +
    '<style>' +
    'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:12px;color:#1e293b;margin:0;padding:0;}' +
    '.page{max-width:780px;margin:0 auto;padding:30px 32px;}' +
    '.doc-header{border-bottom:3px solid #1e40af;padding-bottom:14px;margin-bottom:20px;}' +
    '.doc-org{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}' +
    '.doc-title{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:2px;}' +
    '.doc-sub{font-size:11px;color:#64748b;}' +
    '.doc-ref{font-size:14px;font-weight:700;color:#1e40af;margin-top:8px;}' +
    '.matter-summary{background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:14px 16px;margin-bottom:18px;}' +
    '.matter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}' +
    '.matter-field{}.mf-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;}' +
    '.mf-value{font-size:12px;font-weight:600;color:#1e293b;margin-top:1px;}' +
    '.version-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}' +
    '.vb-board{background:#dbeafe;color:#1d4ed8;}' +
    '.vb-resident{background:#d1fae5;color:#065f46;}' +
    '.vb-party{background:#e0f2fe;color:#0369a1;}' +
    '.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;margin-left:8px;}' +
    '.badge-open{background:#dbeafe;color:#1d4ed8;} .badge-acknowledged{background:#bbf7d0;color:#047857;}' +
    '.badge-responded{background:#e9d5ff;color:#7c3aed;} .badge-closed{background:#f3f4f6;color:#374151;}' +
    '.badge-escalated{background:#fed7aa;color:#92400e;} .badge-escalated-closed{background:#ede9fe;color:#6d28d9;}' +
    '.badge-converted{background:#ccfbf1;color:#0f766e;} .badge-dispute-open{background:#ccfbf1;color:#0f766e;}' +
    '.badge-under-review{background:#fef3c7;color:#b45309;} .badge-referred{background:#ffedd5;color:#c2410c;}' +
    '.section{margin-bottom:18px;page-break-inside:avoid;}' +
    '.section-heading{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#1e40af;' +
      'border-bottom:1px solid #e2e8f0;padding-bottom:5px;margin-bottom:10px;}' +
    '.field-row{display:flex;gap:8px;margin-bottom:5px;font-size:12px;}' +
    '.fl{color:#64748b;min-width:130px;flex-shrink:0;}' +
    '.fv{color:#1e293b;font-weight:500;}' +
    '.field-block{margin-bottom:10px;}' +
    '.fb-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}' +
    '.fb-value{font-size:12px;color:#1e293b;white-space:pre-wrap;line-height:1.6;background:#f8fafc;border:1px solid #e2e8f0;border-radius:3px;padding:8px 10px;}' +
    '.br-entry{margin-bottom:10px;padding:8px 10px;border-left:3px solid #8b5cf6;background:#f9f7ff;border-radius:0 3px 3px 0;}' +
    '.br-ts{font-size:10px;color:#64748b;margin-bottom:3px;}' +
    '.br-sent{display:inline-block;background:#d1fae5;color:#065f46;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-right:5px;}' +
    '.br-text{font-size:12px;color:#1e293b;white-space:pre-wrap;line-height:1.6;}' +

    '.entry-system  {border-left:3px solid #e2e8f0;background:#f8fafc;}' +
    '.entry-comment {border-left:3px solid #8b5cf6;background:#faf5ff;}' +
    '.entry-event   {border-left:3px solid #10b981;background:#f0fdf4;}' +
    '.entry-meta{font-size:10px;color:#64748b;margin-bottom:3px;}' +
    '.entry-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;text-transform:uppercase;margin-right:5px;}' +
    '.tag-boardlog{background:#dbeafe;color:#1d4ed8;} .tag-inbound{background:#fef3c7;color:#b45309;}' +
    '.tag-system{background:#f1f5f9;color:#64748b;} .tag-comment{background:#ede9fe;color:#6d28d9;}' +
    '.tag-event{background:#d1fae5;color:#065f46;}' +
    '.entry-body{font-size:12px;color:#1e293b;white-space:pre-wrap;line-height:1.5;}' +
    '.doc-footer{border-top:1px solid #e2e8f0;margin-top:24px;padding-top:10px;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between;}' +
    '@media print{.no-print{display:none;} body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}' +
    '</style></head><body><div class="page">';

    // Doc header
    html += '<div class="doc-header">' +
            '<div class="doc-org">Lake Illawong Residential Club \u2014 Board of Management</div>' +
            '<div class="doc-title">Correspondence Chronicle</div>' +
            '<div class="doc-sub">Case correspondence record \u2014 ' + escHtml(title) + (!residentOnly ? ' (Confidential)' : '') + '</div>' +
            '<div class="doc-ref">' + escHtml(m.referenceNumber) + ' \u2014 ' + (isComp ? 'Complaint' : 'Dispute') + '</div>' +
            '</div>';

    // Version badge + status
    html += '<span class="version-badge ' + vbClass + '">' + title + '</span>' +
            '<span class="status-badge ' + printStatusBadgeClass(norm, isComp) + '">' + escHtml(norm) + '</span>';

    html += partyCopyBanner;

    html += '<div class="matter-summary">';
    if (isComp) {
        html += '<div style="font-size:13px;font-weight:600;">' + escHtml(m.residentName) + ' \u2014 ' + escHtml(m.unitNumber) + '</div>';

        html += mf('Lodged',       formatDate(m.submittedAt));
        if (m.acknowledgedAt) html += mf('Acknowledged', formatDate(m.acknowledgedAt));
        if (m.respondedAt)    html += mf('Responded',    formatDate(m.respondedAt));
        if (m.escalatedAt)    html += mf('Escalated',    formatDate(m.escalatedAt));
        if (m.closedAt)       html += mf('Closed',       formatDate(m.closedAt));
        html += mf('How submitted', m.howSubmitted || 'Digital');
        html += '</div>';
    } else {
        if (m.partyAName) html += '<div style="font-size:12px;margin-bottom:4px;"><strong>Party A:</strong> ' + escHtml(m.partyAName) + (m.partyAUnit ? ' (' + escHtml(m.partyAUnit) + ')' : '') + '</div>';
        if (m.partyBName) html += '<div style="font-size:12px;margin-bottom:4px;"><strong>Party B:</strong> ' + escHtml(m.partyBName) + (m.partyBUnit ? ' (' + escHtml(m.partyBUnit) + ')' : '') + '</div>';
        html += '<div class="matter-grid">';
        html += mf('Logged',  formatDate(m.loggedAt || m.submittedAt));
        if (m.reviewDue)  html += mf('Review Due', formatDate(m.reviewDue));
        if (m.resolvedAt) html += mf('Resolved',   formatDate(m.resolvedAt));
        if (m.referredAt) html += mf('Referred',   formatDate(m.referredAt));
        if (m.closedAt)   html += mf('Closed',     formatDate(m.closedAt));
        html += '</div>';
    }
    html += '</div>'; // /matter-summary

    // 1. Submission
    html += printSection('Original Submission', buildPrintSubmission(m, isComp, residentOnly));

    // 2. Board Response (complaints -- both versions)
    if (isComp && m.boardResponse) {
        html += printSection('Board Response', buildPrintBoardResponse(m));
    }

    // 3. Process Statement (disputes -- all versions)
    if (!isComp && m.processStatement) {
        html += printSection('Process Statement', '<div class="fb-value">' + escHtml(m.processStatement) + '</div>');
    }

    // 4. Escalation Record (complaints -- Board Record only)
    if (isComp && m.escalatedAt && !residentOnly) {
        html += printSection('Escalation Record', buildPrintEscalation(m));
    }

    // 5. Closure (complaints -- both versions)
    if (isComp && m.closedAt) {
        html += printSection('Closure', buildPrintClosure(m, residentOnly));
    }
    // 6. Resolution/Closure (disputes -- all versions; referredAt added to trigger)
    if (!isComp && (m.resolvedAt || m.closedAt || m.referredAt)) {
        html += printSection('Resolution / Closure', buildPrintDisputeClosure(m));
    }

    // 7. System Events
    html += sysEventsHtml;

    // 8. Events tab sections (filtered per version)
    html += eventsHtml;

    // 9. Matter History (Board Record only)
    html += matterHistoryHtml;

    // 10. Saved Notes (static note fields -- backward compat)
    html += buildPrintNotes(m, isComp, party, residentOnly);

    // Footer
    var printedBy = (window._sessionUser && window._sessionUser.name) ? window._sessionUser.name : 'Board of Management';
    var now = new Date();
    html += '<div class="doc-footer">' +
            '<span>Lake Illawong Residential Club \u2014 Management Central System</span>' +
            '<span>Printed ' + now.toLocaleDateString('en-AU', {day:'numeric',month:'long',year:'numeric'}) +
            ' by ' + escHtml(printedBy) + '</span>' +
            '</div>';

    if (!residentOnly) {
        html += '<div class="doc-footer" style="margin-top:6px;">' +
                '<span style="color:#ef4444;font-weight:600;">CONFIDENTIAL \u2014 Board of Management use only. Not for distribution.</span>' +
                '</div>';
    }

    html += '</div></body></html>';

    var w = window.open('', '_blank', 'width=860,height=950');
    if (!w) { alert('Please allow pop-ups for this site to print.'); return; }
    w.document.write(html);
    w.document.close();
    setTimeout(function() { w.print(); }, 600);
}

function printSection(label, body) {
    return '<div class="section"><div class="section-heading">' + label + '</div>' + body + '</div>';
}

function mf(label, value) {
    return '<div class="matter-field"><div class="mf-label">' + label + '</div><div class="mf-value">' + escHtml(value || '\u2014') + '</div></div>';
}
